<svg xmlns="http://www.w3.org/2000/svg" width="400" height="180" viewBox="0 0 400 180">
  <defs>
    <linearGradient id="amGauge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f8f8"/>
      <stop offset="100%" stop-color="#e0e4ea"/>
    </linearGradient>
    <linearGradient id="amBezel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b0bdd0"/>
      <stop offset="40%" stop-color="#dce4f0"/>
      <stop offset="100%" stop-color="#8a9ab5"/>
    </linearGradient>
    <filter id="amSh" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="1" stdDeviation="1.5" flood-color="#1a3a6b" flood-opacity="0.15"/>
    </filter>
  </defs>
  <style>
    @keyframes needleWobble {
      0% { transform: rotate(-15deg); }
      25% { transform: rotate(5deg); }
      50% { transform: rotate(-8deg); }
      75% { transform: rotate(2deg); }
      100% { transform: rotate(-15deg); }
    }
    .needle { animation: needleWobble 3s ease-in-out infinite; transform-origin: 200px 78px; }
    .dot { r: 2.5; fill: #c8960a; }
    text { font-family: Arial, sans-serif; }
  </style>
  <!-- Background with grid -->
  <rect width="400" height="180" rx="10" fill="#f0f4fa" stroke="#d0daea" stroke-width="2"/>
  <g stroke="#d8dfe8" stroke-width="0.3">
    <line x1="0" y1="20" x2="400" y2="20"/><line x1="0" y1="40" x2="400" y2="40"/>
    <line x1="0" y1="60" x2="400" y2="60"/><line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="100" x2="400" y2="100"/><line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="140" x2="400" y2="140"/><line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="20" y1="0" x2="20" y2="180"/><line x1="40" y1="0" x2="40" y2="180"/>
    <line x1="60" y1="0" x2="60" y2="180"/><line x1="80" y1="0" x2="80" y2="180"/>
    <line x1="100" y1="0" x2="100" y2="180"/><line x1="120" y1="0" x2="120" y2="180"/>
    <line x1="140" y1="0" x2="140" y2="180"/><line x1="160" y1="0" x2="160" y2="180"/>
    <line x1="180" y1="0" x2="180" y2="180"/><line x1="200" y1="0" x2="200" y2="180"/>
    <line x1="220" y1="0" x2="220" y2="180"/><line x1="240" y1="0" x2="240" y2="180"/>
    <line x1="260" y1="0" x2="260" y2="180"/><line x1="280" y1="0" x2="280" y2="180"/>
    <line x1="300" y1="0" x2="300" y2="180"/><line x1="320" y1="0" x2="320" y2="180"/>
    <line x1="340" y1="0" x2="340" y2="180"/><line x1="360" y1="0" x2="360" y2="180"/>
    <line x1="380" y1="0" x2="380" y2="180"/>
  </g>

  <!-- Circuit wires (IEEE style) -->
  <line x1="60" y1="48" x2="155" y2="48" stroke="#1a3a6b" stroke-width="2"/>
  <line x1="245" y1="48" x2="340" y2="48" stroke="#1a3a6b" stroke-width="2"/>
  <line x1="340" y1="48" x2="340" y2="128" stroke="#1a3a6b" stroke-width="2"/>
  <line x1="340" y1="128" x2="60" y2="128" stroke="#1a3a6b" stroke-width="2"/>
  <line x1="60" y1="128" x2="60" y2="48" stroke="#1a3a6b" stroke-width="2"/>

  <!-- Battery (left side) -->
  <rect x="48" y="70" width="24" height="36" fill="#f0f4fa"/>
  <line x1="60" y1="70" x2="60" y2="76" stroke="#1a3a6b" stroke-width="2"/>
  <!-- Long plate (+) -->
  <line x1="48" y1="76" x2="72" y2="76" stroke="#1a3a6b" stroke-width="3"/>
  <!-- Short plate (-) -->
  <line x1="52" y1="82" x2="68" y2="82" stroke="#1a3a6b" stroke-width="1.5"/>
  <!-- Long plate -->
  <line x1="48" y1="88" x2="72" y2="88" stroke="#1a3a6b" stroke-width="3"/>
  <!-- Short plate -->
  <line x1="52" y1="94" x2="68" y2="94" stroke="#1a3a6b" stroke-width="1.5"/>
  <line x1="60" y1="94" x2="60" y2="106" stroke="#1a3a6b" stroke-width="2"/>
  <text x="34" y="88" text-anchor="middle" font-size="11" font-weight="700" fill="#1a3a6b">V</text>

  <!-- Resistor (right side, zigzag) -->
  <rect x="328" y="70" width="24" height="36" fill="#f0f4fa"/>
  <polyline points="340,70 340,74 348,77 332,83 348,89 332,95 340,98 340,106"
            fill="none" stroke="#1a3a6b" stroke-width="2" stroke-linejoin="round"/>
  <text x="358" y="90" font-size="8" font-weight="600" fill="#5a7090">R</text>

  <!-- Ammeter gauge (center) -->
  <g filter="url(#amSh)">
    <!-- Bezel ring -->
    <circle cx="200" cy="78" r="44" fill="url(#amBezel)" stroke="#1a3a6b" stroke-width="2"/>
    <!-- Gauge face -->
    <circle cx="200" cy="78" r="40" fill="url(#amGauge)" stroke="#5a7090" stroke-width="1"/>
    <!-- Scale arc -->
    <path d="M164,78 A36,36 0 0,1 236,78" fill="none" stroke="#b0c4de" stroke-width="2"/>
    <!-- Tick marks -->
    <line x1="166" y1="78" x2="174" y2="78" stroke="#1a3a6b" stroke-width="1.2"/>
    <line x1="171" y1="60" x2="177" y2="65" stroke="#1a3a6b" stroke-width="1.2"/>
    <line x1="186" y1="48" x2="189" y2="55" stroke="#1a3a6b" stroke-width="1.2"/>
    <line x1="200" y1="44" x2="200" y2="52" stroke="#1a3a6b" stroke-width="1.5"/>
    <line x1="214" y1="48" x2="211" y2="55" stroke="#1a3a6b" stroke-width="1.2"/>
    <line x1="229" y1="60" x2="223" y2="65" stroke="#1a3a6b" stroke-width="1.2"/>
    <line x1="234" y1="78" x2="226" y2="78" stroke="#1a3a6b" stroke-width="1.2"/>
    <!-- Scale numbers -->
    <text x="174" y="82" font-size="6" fill="#5a7090">0</text>
    <text x="199" y="46" text-anchor="middle" font-size="6" fill="#5a7090">5</text>
    <text x="224" y="82" font-size="6" fill="#5a7090">10</text>
    <!-- "A" marking -->
    <text x="200" y="100" text-anchor="middle" font-size="16" font-weight="700" fill="#1a3a6b">A</text>
    <!-- Needle (animated wobble) -->
    <line class="needle" x1="200" y1="78" x2="200" y2="48" stroke="#dc2626" stroke-width="2" stroke-linecap="round"/>
    <!-- Needle pivot -->
    <circle cx="200" cy="78" r="4" fill="#1a3a6b"/>
    <circle cx="200" cy="78" r="2" fill="#5a7090"/>
  </g>

  <!-- Connection wires to ammeter -->
  <line x1="155" y1="48" x2="158" y2="48" stroke="#1a3a6b" stroke-width="2"/>
  <line x1="158" y1="48" x2="158" y2="78" stroke="#1a3a6b" stroke-width="2"/>
  <line x1="242" y1="78" x2="242" y2="48" stroke="#1a3a6b" stroke-width="2"/>
  <line x1="242" y1="48" x2="245" y2="48" stroke="#1a3a6b" stroke-width="2"/>

  <!-- Electron flow dots -->
  <circle class="dot"><animateMotion dur="4s" repeatCount="indefinite" path="M60,48 L155,48 L158,78 L242,78 L242,48 L340,48 L340,128 L60,128 L60,48" begin="0s"/></circle>
  <circle class="dot"><animateMotion dur="4s" repeatCount="indefinite" path="M60,48 L155,48 L158,78 L242,78 L242,48 L340,48 L340,128 L60,128 L60,48" begin="-1s"/></circle>
  <circle class="dot"><animateMotion dur="4s" repeatCount="indefinite" path="M60,48 L155,48 L158,78 L242,78 L242,48 L340,48 L340,128 L60,128 L60,48" begin="-2s"/></circle>
  <circle class="dot"><animateMotion dur="4s" repeatCount="indefinite" path="M60,48 L155,48 L158,78 L242,78 L242,48 L340,48 L340,128 L60,128 L60,48" begin="-3s"/></circle>

  <!-- Labels -->
  <text x="200" y="138" text-anchor="middle" font-size="13" font-weight="700" fill="#1a3a6b">Ammeter</text>
  <text x="200" y="152" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">Measures = ?</text>

  <!-- Title -->
  <text x="200" y="173" text-anchor="middle" font-size="11" font-weight="600" fill="#5a7090">Ammeter -- What Does It Measure?</text>
</svg>