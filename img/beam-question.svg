<svg xmlns="http://www.w3.org/2000/svg" width="400" height="180" viewBox="0 0 400 180">
  <defs>
    <linearGradient id="bqBeam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8d4e2"/>
      <stop offset="50%" stop-color="#dce4f0"/>
      <stop offset="100%" stop-color="#b0bdd0"/>
    </linearGradient>
    <linearGradient id="bqCol" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7a8da5"/>
      <stop offset="50%" stop-color="#a0b0c5"/>
      <stop offset="100%" stop-color="#6a7d95"/>
    </linearGradient>
    <filter id="bqSh" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="1" stdDeviation="1.5" flood-color="#1a3a6b" flood-opacity="0.15"/>
    </filter>
  </defs>
  <style>text { font-family: Arial, sans-serif; }</style>
  <!-- Background with grid -->
  <rect width="400" height="180" rx="10" fill="#f0f4fa" stroke="#d0daea" stroke-width="2"/>
  <g stroke="#d8dfe8" stroke-width="0.3">
    <line x1="0" y1="20" x2="400" y2="20"/><line x1="0" y1="40" x2="400" y2="40"/>
    <line x1="0" y1="60" x2="400" y2="60"/><line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="100" x2="400" y2="100"/><line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="140" x2="400" y2="140"/><line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="20" y1="0" x2="20" y2="180"/><line x1="40" y1="0" x2="40" y2="180"/>
    <line x1="60" y1="0" x2="60" y2="180"/><line x1="80" y1="0" x2="80" y2="180"/>
    <line x1="100" y1="0" x2="100" y2="180"/><line x1="120" y1="0" x2="120" y2="180"/>
    <line x1="140" y1="0" x2="140" y2="180"/><line x1="160" y1="0" x2="160" y2="180"/>
    <line x1="180" y1="0" x2="180" y2="180"/><line x1="200" y1="0" x2="200" y2="180"/>
    <line x1="220" y1="0" x2="220" y2="180"/><line x1="240" y1="0" x2="240" y2="180"/>
    <line x1="260" y1="0" x2="260" y2="180"/><line x1="280" y1="0" x2="280" y2="180"/>
    <line x1="300" y1="0" x2="300" y2="180"/><line x1="320" y1="0" x2="320" y2="180"/>
    <line x1="340" y1="0" x2="340" y2="180"/><line x1="360" y1="0" x2="360" y2="180"/>
    <line x1="380" y1="0" x2="380" y2="180"/>
  </g>

  <!-- Ground line -->
  <line x1="20" y1="145" x2="380" y2="145" stroke="#8a9ab0" stroke-width="1.5"/>
  <!-- Ground hatching -->
  <g stroke="#a0aec2" stroke-width="0.7">
    <line x1="25" y1="148" x2="20" y2="153"/><line x1="35" y1="148" x2="30" y2="153"/>
    <line x1="45" y1="148" x2="40" y2="153"/><line x1="55" y1="148" x2="50" y2="153"/>
    <line x1="65" y1="148" x2="60" y2="153"/><line x1="75" y1="148" x2="70" y2="153"/>
    <line x1="305" y1="148" x2="300" y2="153"/><line x1="315" y1="148" x2="310" y2="153"/>
    <line x1="325" y1="148" x2="320" y2="153"/><line x1="335" y1="148" x2="330" y2="153"/>
    <line x1="345" y1="148" x2="340" y2="153"/><line x1="355" y1="148" x2="350" y2="153"/>
    <line x1="365" y1="148" x2="360" y2="153"/><line x1="375" y1="148" x2="370" y2="153"/>
  </g>

  <!-- Steel I-Beam -->
  <g filter="url(#bqSh)">
    <!-- Top flange -->
    <rect x="35" y="38" width="330" height="5" rx="1" fill="url(#bqBeam)" stroke="#1a3a6b" stroke-width="1.5"/>
    <!-- Web -->
    <rect x="35" y="43" width="330" height="12" fill="url(#bqBeam)" stroke="#1a3a6b" stroke-width="0.6" opacity="0.5"/>
    <!-- Bottom flange -->
    <rect x="35" y="55" width="330" height="5" rx="1" fill="url(#bqBeam)" stroke="#1a3a6b" stroke-width="1.5"/>
  </g>
  <text x="200" y="30" text-anchor="middle" font-size="12" font-weight="700" fill="#1a3a6b">STEEL I-BEAM</text>

  <!-- Column A (left, solid) -->
  <g filter="url(#bqSh)">
    <rect x="56" y="60" width="20" height="85" fill="url(#bqCol)" stroke="#1a3a6b" stroke-width="1.5" rx="1"/>
    <!-- Column cap -->
    <rect x="50" y="56" width="32" height="6" fill="url(#bqCol)" stroke="#1a3a6b" stroke-width="1" rx="1"/>
    <!-- Column base -->
    <rect x="48" y="142" width="36" height="5" fill="url(#bqCol)" stroke="#1a3a6b" stroke-width="1" rx="1"/>
  </g>
  <text x="66" y="168" text-anchor="middle" font-size="10" font-weight="700" fill="#1a3a6b">COL A</text>

  <!-- Column C (center, REMOVED) -->
  <rect x="190" y="60" width="20" height="85" fill="none" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,4" rx="1"/>
  <line x1="186" y1="58" x2="214" y2="145" stroke="#dc2626" stroke-width="2" opacity="0.5"/>
  <line x1="214" y1="58" x2="186" y2="145" stroke="#dc2626" stroke-width="2" opacity="0.5"/>
  <text x="200" y="168" text-anchor="middle" font-size="10" font-weight="800" fill="#dc2626">COL C  REMOVED</text>

  <!-- Column B (right, solid) -->
  <g filter="url(#bqSh)">
    <rect x="322" y="60" width="20" height="85" fill="url(#bqCol)" stroke="#1a3a6b" stroke-width="1.5" rx="1"/>
    <rect x="316" y="56" width="32" height="6" fill="url(#bqCol)" stroke="#1a3a6b" stroke-width="1" rx="1"/>
    <rect x="314" y="142" width="36" height="5" fill="url(#bqCol)" stroke="#1a3a6b" stroke-width="1" rx="1"/>
  </g>
  <text x="332" y="168" text-anchor="middle" font-size="10" font-weight="700" fill="#1a3a6b">COL B</text>

  <!-- Load arrow at center -->
  <polygon points="193,72 200,88 207,72" fill="#c8960a"/>
  <line x1="200" y1="62" x2="200" y2="74" stroke="#c8960a" stroke-width="3"/>
  <!-- Load label with bg -->
  <rect x="155" y="92" width="90" height="16" rx="3" fill="#f0f4fa" opacity="0.9"/>
  <text x="200" y="104" text-anchor="middle" font-size="13" font-weight="800" fill="#c8960a">2,000 lbs</text>
  <rect x="152" y="108" width="96" height="13" rx="3" fill="#f0f4fa" opacity="0.9"/>
  <text x="200" y="118" text-anchor="middle" font-size="9" fill="#8a6000">Load applied at center</text>
</svg>