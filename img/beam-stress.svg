<svg xmlns="http://www.w3.org/2000/svg" width="400" height="180" viewBox="0 0 400 180">
  <defs>
    <linearGradient id="beamFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8d4e2"/>
      <stop offset="50%" stop-color="#dce4f0"/>
      <stop offset="100%" stop-color="#b0bdd0"/>
    </linearGradient>
    <linearGradient id="supportFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a9ab5"/>
      <stop offset="100%" stop-color="#5a7090"/>
    </linearGradient>
    <filter id="bSh" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="1" stdDeviation="1.5" flood-color="#1a3a6b" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowDown" viewBox="0 0 10 10" refX="5" refY="10" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L5,10 L10,0 Z" fill="#1a3a6b"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#dc2626"/>
    </marker>
    <marker id="arrowGoldB" viewBox="0 0 10 10" refX="5" refY="10" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L5,10 L10,0 Z" fill="#c8960a"/>
    </marker>
  </defs>
  <style>
    text { font-family: Arial, sans-serif; }
  </style>
  <!-- Background with grid -->
  <rect width="400" height="180" rx="10" fill="#f0f4fa" stroke="#d0daea" stroke-width="2"/>
  <g stroke="#d8dfe8" stroke-width="0.3">
    <line x1="0" y1="20" x2="400" y2="20"/><line x1="0" y1="40" x2="400" y2="40"/>
    <line x1="0" y1="60" x2="400" y2="60"/><line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="100" x2="400" y2="100"/><line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="140" x2="400" y2="140"/><line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="20" y1="0" x2="20" y2="180"/><line x1="40" y1="0" x2="40" y2="180"/>
    <line x1="60" y1="0" x2="60" y2="180"/><line x1="80" y1="0" x2="80" y2="180"/>
    <line x1="100" y1="0" x2="100" y2="180"/><line x1="120" y1="0" x2="120" y2="180"/>
    <line x1="140" y1="0" x2="140" y2="180"/><line x1="160" y1="0" x2="160" y2="180"/>
    <line x1="180" y1="0" x2="180" y2="180"/><line x1="200" y1="0" x2="200" y2="180"/>
    <line x1="220" y1="0" x2="220" y2="180"/><line x1="240" y1="0" x2="240" y2="180"/>
    <line x1="260" y1="0" x2="260" y2="180"/><line x1="280" y1="0" x2="280" y2="180"/>
    <line x1="300" y1="0" x2="300" y2="180"/><line x1="320" y1="0" x2="320" y2="180"/>
    <line x1="340" y1="0" x2="340" y2="180"/><line x1="360" y1="0" x2="360" y2="180"/>
    <line x1="380" y1="0" x2="380" y2="180"/>
  </g>

  <!-- Support triangles -->
  <g filter="url(#bSh)">
    <!-- Left support -->
    <polygon points="60,108 46,132 74,132" fill="url(#supportFill)" stroke="#1a3a6b" stroke-width="1.8"/>
    <line x1="40" y1="134" x2="80" y2="134" stroke="#1a3a6b" stroke-width="2.5"/>
    <!-- Hatching under support -->
    <line x1="44" y1="137" x2="40" y2="141" stroke="#5a7090" stroke-width="0.8"/>
    <line x1="50" y1="137" x2="46" y2="141" stroke="#5a7090" stroke-width="0.8"/>
    <line x1="56" y1="137" x2="52" y2="141" stroke="#5a7090" stroke-width="0.8"/>
    <line x1="62" y1="137" x2="58" y2="141" stroke="#5a7090" stroke-width="0.8"/>
    <line x1="68" y1="137" x2="64" y2="141" stroke="#5a7090" stroke-width="0.8"/>
    <line x1="74" y1="137" x2="70" y2="141" stroke="#5a7090" stroke-width="0.8"/>
    <!-- Right support -->
    <polygon points="340,108 326,132 354,132" fill="url(#supportFill)" stroke="#1a3a6b" stroke-width="1.8"/>
    <line x1="320" y1="134" x2="360" y2="134" stroke="#1a3a6b" stroke-width="2.5"/>
    <line x1="324" y1="137" x2="320" y2="141" stroke="#5a7090" stroke-width="0.8"/>
    <line x1="330" y1="137" x2="326" y2="141" stroke="#5a7090" stroke-width="0.8"/>
    <line x1="336" y1="137" x2="332" y2="141" stroke="#5a7090" stroke-width="0.8"/>
    <line x1="342" y1="137" x2="338" y2="141" stroke="#5a7090" stroke-width="0.8"/>
    <line x1="348" y1="137" x2="344" y2="141" stroke="#5a7090" stroke-width="0.8"/>
    <line x1="354" y1="137" x2="350" y2="141" stroke="#5a7090" stroke-width="0.8"/>
  </g>

  <!-- I-Beam (animated deflection) -->
  <g filter="url(#bSh)">
    <!-- Top flange -->
    <rect x="48" y="88" width="304" height="5" rx="1" fill="url(#beamFill)" stroke="#1a3a6b" stroke-width="1.5"/>
    <!-- Web -->
    <rect x="192" y="93" width="16" height="10" fill="url(#beamFill)" stroke="none"/>
    <rect x="48" y="93" width="304" height="10" rx="0" fill="url(#beamFill)" stroke="#1a3a6b" stroke-width="0.8" opacity="0.5"/>
    <!-- Bottom flange -->
    <rect x="48" y="103" width="304" height="5" rx="1" fill="url(#beamFill)" stroke="#1a3a6b" stroke-width="1.5"/>

    <!-- Compression arrows on top -->
    <line x1="140" y1="80" x2="140" y2="88" stroke="#1a3a6b" stroke-width="1.5" marker-end="url(#arrowDown)"/>
    <line x1="200" y1="80" x2="200" y2="88" stroke="#1a3a6b" stroke-width="1.5" marker-end="url(#arrowDown)"/>
    <line x1="260" y1="80" x2="260" y2="88" stroke="#1a3a6b" stroke-width="1.5" marker-end="url(#arrowDown)"/>
    <text x="200" y="75" text-anchor="middle" font-size="10" font-weight="700" fill="#1a3a6b">Compression</text>

    <!-- Tension arrows on bottom -->
    <line x1="135" y1="114" x2="110" y2="114" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrowRed)"/>
    <line x1="265" y1="114" x2="290" y2="114" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrowRed)"/>
    <text x="200" y="124" text-anchor="middle" font-size="10" font-weight="700" fill="#dc2626">Tension</text>
  </g>

  <!-- Center load arrow -->
  <line x1="200" y1="28" x2="200" y2="58" stroke="#c8960a" stroke-width="3" marker-end="url(#arrowGoldB)"/>
  <text x="200" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#c8960a">Load</text>

  <!-- Neutral axis -->
  <line x1="55" y1="98" x2="348" y2="98" stroke="#5a7090" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <text x="380" y="101" text-anchor="end" font-size="8" fill="#5a7090" font-style="italic">neutral axis</text>

  <!-- Title -->
  <text x="200" y="160" text-anchor="middle" font-size="11" font-weight="600" fill="#5a7090">Beam Under Load -- Compression &amp; Tension</text>
</svg>