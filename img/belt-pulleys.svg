<svg xmlns="http://www.w3.org/2000/svg" width="400" height="180" viewBox="0 0 400 180">
  <defs>
    <linearGradient id="bpRimS" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c8cdd8"/>
      <stop offset="40%" stop-color="#e0e5ef"/>
      <stop offset="100%" stop-color="#a0aab8"/>
    </linearGradient>
    <linearGradient id="bpRimL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#bcc4d2"/>
      <stop offset="40%" stop-color="#d8dde8"/>
      <stop offset="100%" stop-color="#98a4b5"/>
    </linearGradient>
    <linearGradient id="bpHub" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e4e8f0"/>
      <stop offset="100%" stop-color="#c0c8d5"/>
    </linearGradient>
    <linearGradient id="bpBelt" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#444"/>
      <stop offset="50%" stop-color="#666"/>
      <stop offset="100%" stop-color="#444"/>
    </linearGradient>
    <filter id="bpSh" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="1" stdDeviation="1.5" flood-color="#1a3a6b" flood-opacity="0.18"/>
    </filter>
  </defs>
  <style>
    @keyframes spinFast { to { transform: rotate(360deg); } }
    .smallSpin { animation: spinFast 1s linear infinite; transform-origin: 110px 90px; }
    text { font-family: Arial, sans-serif; }
  </style>
  <!-- Background with grid -->
  <rect width="400" height="180" rx="10" fill="#f0f4fa" stroke="#d0daea" stroke-width="2"/>
  <g stroke="#d8dfe8" stroke-width="0.3">
    <line x1="0" y1="20" x2="400" y2="20"/><line x1="0" y1="40" x2="400" y2="40"/>
    <line x1="0" y1="60" x2="400" y2="60"/><line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="100" x2="400" y2="100"/><line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="140" x2="400" y2="140"/><line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="20" y1="0" x2="20" y2="180"/><line x1="40" y1="0" x2="40" y2="180"/>
    <line x1="60" y1="0" x2="60" y2="180"/><line x1="80" y1="0" x2="80" y2="180"/>
    <line x1="100" y1="0" x2="100" y2="180"/><line x1="120" y1="0" x2="120" y2="180"/>
    <line x1="140" y1="0" x2="140" y2="180"/><line x1="160" y1="0" x2="160" y2="180"/>
    <line x1="180" y1="0" x2="180" y2="180"/><line x1="200" y1="0" x2="200" y2="180"/>
    <line x1="220" y1="0" x2="220" y2="180"/><line x1="240" y1="0" x2="240" y2="180"/>
    <line x1="260" y1="0" x2="260" y2="180"/><line x1="280" y1="0" x2="280" y2="180"/>
    <line x1="300" y1="0" x2="300" y2="180"/><line x1="320" y1="0" x2="320" y2="180"/>
    <line x1="340" y1="0" x2="340" y2="180"/><line x1="360" y1="0" x2="360" y2="180"/>
    <line x1="380" y1="0" x2="380" y2="180"/>
  </g>

  <!-- Belt (behind pulleys) -->
  <line x1="110" y1="58" x2="290" y2="42" stroke="url(#bpBelt)" stroke-width="5" stroke-linecap="round"/>
  <line x1="110" y1="122" x2="290" y2="138" stroke="url(#bpBelt)" stroke-width="5" stroke-linecap="round"/>

  <!-- Small pulley (left) - 6" diameter, animated -->
  <g class="smallSpin" filter="url(#bpSh)">
    <!-- Outer rim -->
    <circle cx="110" cy="90" r="34" fill="url(#bpRimS)" stroke="#1a3a6b" stroke-width="2"/>
    <!-- V-groove -->
    <circle cx="110" cy="90" r="32" fill="none" stroke="#8a9ab0" stroke-width="1.5"/>
    <circle cx="110" cy="90" r="29" fill="none" stroke="#b0bcc8" stroke-width="0.75" stroke-dasharray="2,2"/>
    <!-- Hub -->
    <circle cx="110" cy="90" r="10" fill="url(#bpHub)" stroke="#1a3a6b" stroke-width="2"/>
    <!-- Axle -->
    <circle cx="110" cy="90" r="3.5" fill="#1a3a6b"/>
    <!-- Spokes -->
    <line x1="110" y1="60" x2="110" y2="120" stroke="#1a3a6b" stroke-width="1" opacity="0.2"/>
    <line x1="80" y1="90" x2="140" y2="90" stroke="#1a3a6b" stroke-width="1" opacity="0.2"/>
    <line x1="88" y1="68" x2="132" y2="112" stroke="#1a3a6b" stroke-width="1" opacity="0.2"/>
    <line x1="132" y1="68" x2="88" y2="112" stroke="#1a3a6b" stroke-width="1" opacity="0.2"/>
  </g>

  <!-- Large pulley (right) - 12" diameter, STATIC -->
  <g filter="url(#bpSh)">
    <circle cx="290" cy="90" r="50" fill="url(#bpRimL)" stroke="#1a3a6b" stroke-width="2"/>
    <circle cx="290" cy="90" r="48" fill="none" stroke="#8a9ab0" stroke-width="1.5"/>
    <circle cx="290" cy="90" r="44" fill="none" stroke="#b0bcc8" stroke-width="0.75" stroke-dasharray="2,2"/>
    <!-- Hub -->
    <circle cx="290" cy="90" r="14" fill="url(#bpHub)" stroke="#1a3a6b" stroke-width="2"/>
    <circle cx="290" cy="90" r="5" fill="#1a3a6b"/>
    <!-- Spokes -->
    <line x1="290" y1="44" x2="290" y2="136" stroke="#1a3a6b" stroke-width="1" opacity="0.2"/>
    <line x1="244" y1="90" x2="336" y2="90" stroke="#1a3a6b" stroke-width="1" opacity="0.2"/>
    <line x1="256" y1="56" x2="324" y2="124" stroke="#1a3a6b" stroke-width="1" opacity="0.2"/>
    <line x1="324" y1="56" x2="256" y2="124" stroke="#1a3a6b" stroke-width="1" opacity="0.2"/>
  </g>

  <!-- Labels -->
  <text x="110" y="148" text-anchor="middle" font-size="11" font-weight="700" fill="#1a3a6b">6" dia</text>
  <text x="110" y="162" text-anchor="middle" font-size="11" font-weight="600" fill="#c8960a">1200 RPM</text>
  <text x="290" y="155" text-anchor="middle" font-size="11" font-weight="700" fill="#1a3a6b">12" dia</text>
  <text x="290" y="170" text-anchor="middle" font-size="13" font-weight="700" fill="#dc2626">? RPM</text>

  <!-- Title -->
  <text x="30" y="174" font-size="11" font-weight="600" fill="#5a7090">Belt &amp; Pulleys</text>
</svg>