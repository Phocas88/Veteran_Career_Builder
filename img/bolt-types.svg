<svg xmlns="http://www.w3.org/2000/svg" width="400" height="180" viewBox="0 0 400 180">
  <defs>
    <linearGradient id="btMetal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d0d8e4"/>
      <stop offset="40%" stop-color="#e8ecf4"/>
      <stop offset="100%" stop-color="#b0bdd0"/>
    </linearGradient>
    <linearGradient id="btRecess" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a5070"/>
      <stop offset="100%" stop-color="#1a3050"/>
    </linearGradient>
    <filter id="btSh" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="1" stdDeviation="1.5" flood-color="#1a3a6b" flood-opacity="0.18"/>
    </filter>
  </defs>
  <style>
    text { font-family: Arial, sans-serif; }
  </style>
  <!-- Background with grid -->
  <rect width="400" height="180" rx="10" fill="#f0f4fa" stroke="#d0daea" stroke-width="2"/>
  <g stroke="#d8dfe8" stroke-width="0.3">
    <line x1="0" y1="20" x2="400" y2="20"/><line x1="0" y1="40" x2="400" y2="40"/>
    <line x1="0" y1="60" x2="400" y2="60"/><line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="100" x2="400" y2="100"/><line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="140" x2="400" y2="140"/><line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="20" y1="0" x2="20" y2="180"/><line x1="40" y1="0" x2="40" y2="180"/>
    <line x1="60" y1="0" x2="60" y2="180"/><line x1="80" y1="0" x2="80" y2="180"/>
    <line x1="100" y1="0" x2="100" y2="180"/><line x1="120" y1="0" x2="120" y2="180"/>
    <line x1="140" y1="0" x2="140" y2="180"/><line x1="160" y1="0" x2="160" y2="180"/>
    <line x1="180" y1="0" x2="180" y2="180"/><line x1="200" y1="0" x2="200" y2="180"/>
    <line x1="220" y1="0" x2="220" y2="180"/><line x1="240" y1="0" x2="240" y2="180"/>
    <line x1="260" y1="0" x2="260" y2="180"/><line x1="280" y1="0" x2="280" y2="180"/>
    <line x1="300" y1="0" x2="300" y2="180"/><line x1="320" y1="0" x2="320" y2="180"/>
    <line x1="340" y1="0" x2="340" y2="180"/><line x1="360" y1="0" x2="360" y2="180"/>
    <line x1="380" y1="0" x2="380" y2="180"/>
  </g>

  <!-- Title -->
  <text x="200" y="16" text-anchor="middle" font-size="11" font-weight="600" fill="#5a7090">Bolt Head Types -- Which Uses a Hex Key?</text>

  <!-- Bolt 1: Hex Head (top-down view) - center 55,62 -->
  <g filter="url(#btSh)">
    <!-- Hexagon shape -->
    <polygon points="55,38 76,50 76,74 55,86 34,74 34,50" fill="url(#btMetal)" stroke="#1a3a6b" stroke-width="2"/>
    <!-- Top face highlight -->
    <polygon points="55,42 72,52 72,72 55,82 38,72 38,52" fill="#e8ecf4" opacity="0.3"/>
    <!-- Center circle (bolt shaft visible from top) -->
    <circle cx="55" cy="62" r="10" fill="#c8d0de" stroke="#8a9ab5" stroke-width="1"/>
    <circle cx="55" cy="62" r="3" fill="#8a9ab5"/>
  </g>
  <text x="55" y="108" text-anchor="middle" font-size="9" font-weight="700" fill="#1a3a6b">Hex Head</text>

  <!-- Bolt 2: Carriage (top-down view) - center 150,62 -->
  <g filter="url(#btSh)">
    <!-- Round dome head -->
    <circle cx="150" cy="62" r="24" fill="url(#btMetal)" stroke="#1a3a6b" stroke-width="2"/>
    <!-- Dome highlight -->
    <ellipse cx="146" cy="56" rx="10" ry="7" fill="#f0f4fa" opacity="0.3"/>
    <!-- Square shoulder inset -->
    <rect x="138" y="50" width="24" height="24" rx="1" fill="#c0c8d8" stroke="#8a9ab5" stroke-width="1"/>
    <!-- Center bolt hole -->
    <circle cx="150" cy="62" r="4" fill="#8a9ab5"/>
  </g>
  <text x="150" y="108" text-anchor="middle" font-size="9" font-weight="700" fill="#1a3a6b">Carriage</text>

  <!-- Bolt 3: Socket Head Cap Screw (top-down view) - center 248,62 -->
  <g filter="url(#btSh)">
    <!-- Cylindrical head (circle from top) -->
    <circle cx="248" cy="62" r="24" fill="url(#btMetal)" stroke="#1a3a6b" stroke-width="2"/>
    <!-- Knurling ring -->
    <circle cx="248" cy="62" r="22" fill="none" stroke="#b0bdd0" stroke-width="0.5"/>
    <!-- Hex recess (small hexagon inside) -->
    <polygon points="248,49 259,55.5 259,68.5 248,75 237,68.5 237,55.5" fill="url(#btRecess)" stroke="#1a3a6b" stroke-width="1.5"/>
  </g>
  <text x="248" y="104" text-anchor="middle" font-size="9" font-weight="700" fill="#1a3a6b">Socket Head</text>
  <text x="248" y="115" text-anchor="middle" font-size="8" font-weight="600" fill="#1a3a6b">Cap Screw</text>

  <!-- Allen wrench pointing at Socket Head Cap Screw -->
  <line x1="248" y1="120" x2="248" y2="138" stroke="#444" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="248" y1="138" x2="270" y2="138" stroke="#444" stroke-width="3.5" stroke-linecap="round"/>
  <text x="278" y="141" font-size="8" font-weight="600" fill="#5a7090">Hex Key</text>

  <!-- Bolt 4: Lag Bolt (top-down view with pointed tip shown as side detail) - center 345,62 -->
  <g filter="url(#btSh)">
    <!-- Hex head from top -->
    <polygon points="345,38 366,50 366,74 345,86 324,74 324,50" fill="url(#btMetal)" stroke="#1a3a6b" stroke-width="2"/>
    <!-- Top highlight -->
    <polygon points="345,42 362,52 362,72 345,82 328,72 328,52" fill="#e8ecf4" opacity="0.3"/>
    <!-- Center with pointed-tip indicator -->
    <circle cx="345" cy="62" r="10" fill="#c8d0de" stroke="#8a9ab5" stroke-width="1"/>
    <!-- Point indicator (small triangle) -->
    <polygon points="342,62 345,55 348,62" fill="#8a9ab5"/>
    <circle cx="345" cy="62" r="2.5" fill="#8a9ab5"/>
  </g>
  <text x="345" y="108" text-anchor="middle" font-size="9" font-weight="700" fill="#1a3a6b">Lag Bolt</text>

  <!-- Question mark -->
  <text x="248" y="162" text-anchor="middle" font-size="20" font-weight="800" fill="#dc2626">?</text>

  <!-- Bottom note -->
  <text x="200" y="175" text-anchor="middle" font-size="9" fill="#8a9ab5">Top-down views of bolt heads</text>
</svg>