<svg xmlns="http://www.w3.org/2000/svg" width="400" height="180" viewBox="0 0 400 180">
  <style>
    @keyframes wrenchSpin {
      0%   { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .wrench-rotate { animation: wrenchSpin 6s linear infinite; transform-origin: 345px 52px; }
    text { font-family: Arial, sans-serif; }
  </style>
  <rect width="400" height="180" rx="12" fill="#f0f4fa" stroke="#d0daea" stroke-width="2"/>

  <!-- Bolt 1: Hex Head Bolt -->
  <g>
    <!-- Hex head (top view) -->
    <polygon points="45,38 60,30 75,38 75,56 60,64 45,56" fill="#dce4f0" stroke="#1a3a6b" stroke-width="2"/>
    <!-- Shaft -->
    <rect x="52" y="64" width="16" height="40" fill="#b0c0d4" stroke="#1a3a6b" stroke-width="1.5"/>
    <!-- Threads -->
    <line x1="52" y1="75" x2="68" y2="75" stroke="#8a9ab0" stroke-width="0.8"/>
    <line x1="52" y1="82" x2="68" y2="82" stroke="#8a9ab0" stroke-width="0.8"/>
    <line x1="52" y1="89" x2="68" y2="89" stroke="#8a9ab0" stroke-width="0.8"/>
    <line x1="52" y1="96" x2="68" y2="96" stroke="#8a9ab0" stroke-width="0.8"/>
    <text x="60" y="120" text-anchor="middle" font-size="9" font-weight="700" fill="#1a3a6b">Hex Head</text>
  </g>

  <!-- Bolt 2: Carriage Bolt -->
  <g>
    <!-- Round dome head -->
    <ellipse cx="150" cy="40" rx="16" ry="10" fill="#dce4f0" stroke="#1a3a6b" stroke-width="2"/>
    <!-- Square neck -->
    <rect x="142" y="48" width="16" height="10" fill="#c0d0e4" stroke="#1a3a6b" stroke-width="1.5"/>
    <!-- Shaft -->
    <rect x="143" y="58" width="14" height="46" fill="#b0c0d4" stroke="#1a3a6b" stroke-width="1.5"/>
    <!-- Threads -->
    <line x1="143" y1="72" x2="157" y2="72" stroke="#8a9ab0" stroke-width="0.8"/>
    <line x1="143" y1="79" x2="157" y2="79" stroke="#8a9ab0" stroke-width="0.8"/>
    <line x1="143" y1="86" x2="157" y2="86" stroke="#8a9ab0" stroke-width="0.8"/>
    <line x1="143" y1="93" x2="157" y2="93" stroke="#8a9ab0" stroke-width="0.8"/>
    <text x="150" y="120" text-anchor="middle" font-size="9" font-weight="700" fill="#1a3a6b">Carriage</text>
  </g>

  <!-- Bolt 3: Socket Head Cap Screw (correct answer) -->
  <g>
    <!-- Cylindrical head -->
    <rect x="222" y="30" width="36" height="20" rx="3" fill="#dce4f0" stroke="#1a3a6b" stroke-width="2"/>
    <!-- Hex recess in head -->
    <polygon points="236,36 243,33 250,36 250,44 243,47 236,44" fill="#3a5070" stroke="#1a3a6b" stroke-width="1"/>
    <!-- Shaft -->
    <rect x="232" y="50" width="16" height="54" fill="#b0c0d4" stroke="#1a3a6b" stroke-width="1.5"/>
    <!-- Threads -->
    <line x1="232" y1="65" x2="248" y2="65" stroke="#8a9ab0" stroke-width="0.8"/>
    <line x1="232" y1="72" x2="248" y2="72" stroke="#8a9ab0" stroke-width="0.8"/>
    <line x1="232" y1="79" x2="248" y2="79" stroke="#8a9ab0" stroke-width="0.8"/>
    <line x1="232" y1="86" x2="248" y2="86" stroke="#8a9ab0" stroke-width="0.8"/>
    <line x1="232" y1="93" x2="248" y2="93" stroke="#8a9ab0" stroke-width="0.8"/>
    <text x="240" y="120" text-anchor="middle" font-size="9" font-weight="700" fill="#1a3a6b">Socket Head</text>
    <text x="240" y="130" text-anchor="middle" font-size="8" font-weight="600" fill="#1a3a6b">Cap Screw</text>
  </g>

  <!-- Bolt 4: Lag Bolt -->
  <g>
    <!-- Hex head -->
    <polygon points="310,38 322,30 334,38 334,56 322,64 310,56" fill="#dce4f0" stroke="#1a3a6b" stroke-width="2"/>
    <!-- Tapered shaft -->
    <polygon points="315,64 329,64 325,104 319,104" fill="#b0c0d4" stroke="#1a3a6b" stroke-width="1.5"/>
    <!-- Coarse threads (wood screw style) -->
    <line x1="313" y1="72" x2="331" y2="72" stroke="#8a9ab0" stroke-width="1"/>
    <line x1="314" y1="80" x2="330" y2="80" stroke="#8a9ab0" stroke-width="1"/>
    <line x1="316" y1="88" x2="328" y2="88" stroke="#8a9ab0" stroke-width="1"/>
    <line x1="317" y1="96" x2="327" y2="96" stroke="#8a9ab0" stroke-width="1"/>
    <text x="322" y="120" text-anchor="middle" font-size="9" font-weight="700" fill="#1a3a6b">Lag Bolt</text>
  </g>

  <!-- Allen wrench / hex key floating as reference -->
  <g class="wrench-rotate">
    <line x1="345" y1="52" x2="345" y2="30" stroke="#555" stroke-width="3" stroke-linecap="round"/>
    <line x1="345" y1="52" x2="365" y2="52" stroke="#555" stroke-width="3" stroke-linecap="round"/>
  </g>
  <text x="355" y="22" text-anchor="middle" font-size="8" font-weight="600" fill="#5a7090">Hex Key</text>

  <!-- Question mark -->
  <text x="355" y="80" text-anchor="middle" font-size="22" font-weight="800" fill="#dc2626">?</text>

  <!-- Title -->
  <text x="200" y="168" text-anchor="middle" font-size="12" font-weight="600" fill="#5a7090">Bolt Head Types</text>
</svg>