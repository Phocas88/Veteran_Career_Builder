<svg xmlns="http://www.w3.org/2000/svg" width="400" height="180" viewBox="0 0 400 180">
  <defs>
    <linearGradient id="cqPipe" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8a9ab5"/>
      <stop offset="40%" stop-color="#b0c0d5"/>
      <stop offset="100%" stop-color="#7a8da5"/>
    </linearGradient>
    <linearGradient id="cqPipeInner" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c8d4e2"/>
      <stop offset="100%" stop-color="#dce4f0"/>
    </linearGradient>
    <linearGradient id="cqCaliper" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2a4a6b"/>
      <stop offset="50%" stop-color="#3a6a9b"/>
      <stop offset="100%" stop-color="#1a3a5b"/>
    </linearGradient>
    <filter id="cqSh" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="1" stdDeviation="1.5" flood-color="#1a3a6b" flood-opacity="0.15"/>
    </filter>
  </defs>
  <style>
    text { font-family: Arial, sans-serif; }
  </style>
  <!-- Background with grid -->
  <rect width="400" height="180" rx="10" fill="#f0f4fa" stroke="#d0daea" stroke-width="2"/>
  <g stroke="#d8dfe8" stroke-width="0.3">
    <line x1="0" y1="20" x2="400" y2="20"/><line x1="0" y1="40" x2="400" y2="40"/>
    <line x1="0" y1="60" x2="400" y2="60"/><line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="100" x2="400" y2="100"/><line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="140" x2="400" y2="140"/><line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="20" y1="0" x2="20" y2="180"/><line x1="40" y1="0" x2="40" y2="180"/>
    <line x1="60" y1="0" x2="60" y2="180"/><line x1="80" y1="0" x2="80" y2="180"/>
    <line x1="100" y1="0" x2="100" y2="180"/><line x1="120" y1="0" x2="120" y2="180"/>
    <line x1="140" y1="0" x2="140" y2="180"/><line x1="160" y1="0" x2="160" y2="180"/>
    <line x1="180" y1="0" x2="180" y2="180"/><line x1="200" y1="0" x2="200" y2="180"/>
    <line x1="220" y1="0" x2="220" y2="180"/><line x1="240" y1="0" x2="240" y2="180"/>
    <line x1="260" y1="0" x2="260" y2="180"/><line x1="280" y1="0" x2="280" y2="180"/>
    <line x1="300" y1="0" x2="300" y2="180"/><line x1="320" y1="0" x2="320" y2="180"/>
    <line x1="340" y1="0" x2="340" y2="180"/><line x1="360" y1="0" x2="360" y2="180"/>
    <line x1="380" y1="0" x2="380" y2="180"/>
  </g>

  <!-- Pipe cross-section (thick ring) -->
  <g filter="url(#cqSh)">
    <!-- Outer pipe wall -->
    <circle cx="170" cy="82" r="55" fill="url(#cqPipe)" stroke="#1a3a6b" stroke-width="2"/>
    <!-- Inner bore -->
    <circle cx="170" cy="82" r="42" fill="url(#cqPipeInner)" stroke="#5a7090" stroke-width="1"/>
    <!-- Pipe wall highlight -->
    <circle cx="170" cy="82" r="52" fill="none" stroke="#c0d0e2" stroke-width="0.8" opacity="0.5"/>
  </g>
  <text x="170" y="14" text-anchor="middle" font-size="11" font-weight="600" fill="#5a7090">Pipe Cross-Section</text>

  <!-- Inside calipers - left jaw -->
  <g>
    <line x1="128" y1="82" x2="108" y2="28" stroke="url(#cqCaliper)" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Jaw tip (curved contact point) -->
    <circle cx="128" cy="82" r="3" fill="#c8960a" stroke="#8a6000" stroke-width="1"/>
  </g>

  <!-- Inside calipers - right jaw -->
  <g>
    <line x1="212" y1="82" x2="232" y2="28" stroke="url(#cqCaliper)" stroke-width="3.5" stroke-linecap="round"/>
    <circle cx="212" cy="82" r="3" fill="#c8960a" stroke="#8a6000" stroke-width="1"/>
  </g>

  <!-- Caliper pivot/hinge at top -->
  <circle cx="170" cy="20" r="5" fill="#1a3a6b" stroke="#0a2a4b" stroke-width="1.5"/>
  <circle cx="170" cy="20" r="2" fill="#5a7090"/>
  <!-- Handle extensions above pivot -->
  <line x1="108" y1="28" x2="158" y2="20" stroke="url(#cqCaliper)" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="232" y1="28" x2="182" y2="20" stroke="url(#cqCaliper)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Inner diameter dimension line -->
  <line x1="128" y1="112" x2="212" y2="112" stroke="#c8960a" stroke-width="1.5"/>
  <line x1="128" y1="106" x2="128" y2="118" stroke="#c8960a" stroke-width="1.5"/>
  <line x1="212" y1="106" x2="212" y2="118" stroke="#c8960a" stroke-width="1.5"/>
  <polygon points="128,112 134,109 134,115" fill="#c8960a"/>
  <polygon points="212,112 206,109 206,115" fill="#c8960a"/>
  <text x="170" y="130" text-anchor="middle" font-size="11" font-weight="700" fill="#c8960a">Inner Diameter</text>

  <!-- Tool identification question -->
  <rect x="290" y="38" width="90" height="55" rx="6" fill="#fff5f5" stroke="#dc2626" stroke-width="1.5" opacity="0.9"/>
  <text x="335" y="57" text-anchor="middle" font-size="14" font-weight="800" fill="#dc2626">Which</text>
  <text x="335" y="73" text-anchor="middle" font-size="14" font-weight="800" fill="#dc2626">tool?</text>
  <text x="335" y="90" text-anchor="middle" font-size="18" font-weight="800" fill="#dc2626">?</text>

  <!-- Title -->
  <text x="200" y="168" text-anchor="middle" font-size="11" font-weight="600" fill="#5a7090">Measuring Pipe Inner Diameter</text>
</svg>