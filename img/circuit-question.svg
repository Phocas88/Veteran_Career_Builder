<svg xmlns="http://www.w3.org/2000/svg" width="400" height="180" viewBox="0 0 400 180">
  <defs>
    <filter id="cs" x="-3%" y="-3%" width="108%" height="108%">
      <feDropShadow dx="0.5" dy="0.5" stdDeviation="0.8" flood-color="#1a3a6b" flood-opacity="0.1"/>
    </filter>
    <marker id="cArr" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,1 L8,5 L0,9 Z" fill="#c8960a"/>
    </marker>
  </defs>
  <style>
    .dot { fill: #c8960a; }
    text { font-family: Arial, sans-serif; }
  </style>
  <!-- Background with grid -->
  <rect width="400" height="180" rx="10" fill="#f0f4fa" stroke="#d0daea" stroke-width="2"/>
  <g stroke="#d8dfe8" stroke-width="0.3">
    <line x1="0" y1="20" x2="400" y2="20"/><line x1="0" y1="40" x2="400" y2="40"/>
    <line x1="0" y1="60" x2="400" y2="60"/><line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="100" x2="400" y2="100"/><line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="140" x2="400" y2="140"/><line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="40" y1="0" x2="40" y2="180"/><line x1="80" y1="0" x2="80" y2="180"/>
    <line x1="120" y1="0" x2="120" y2="180"/><line x1="160" y1="0" x2="160" y2="180"/>
    <line x1="200" y1="0" x2="200" y2="180"/><line x1="240" y1="0" x2="240" y2="180"/>
    <line x1="280" y1="0" x2="280" y2="180"/><line x1="320" y1="0" x2="320" y2="180"/>
    <line x1="360" y1="0" x2="360" y2="180"/>
  </g>

  <!-- Circuit wires (thick, proper right angles) -->
  <!-- Top wire: left terminal to right -->
  <line x1="95" y1="38" x2="305" y2="38" stroke="#1a3a6b" stroke-width="2.5"/>
  <!-- Right wire: top to bottom -->
  <line x1="305" y1="38" x2="305" y2="130" stroke="#1a3a6b" stroke-width="2.5"/>
  <!-- Bottom wire: right to left -->
  <line x1="305" y1="130" x2="95" y2="130" stroke="#1a3a6b" stroke-width="2.5"/>
  <!-- Left wire segments (split by battery) -->
  <line x1="95" y1="130" x2="95" y2="100" stroke="#1a3a6b" stroke-width="2.5"/>
  <line x1="95" y1="68" x2="95" y2="38" stroke="#1a3a6b" stroke-width="2.5"/>

  <!-- Battery symbol (IEEE standard) on left side -->
  <g filter="url(#cs)">
    <!-- Clear background behind battery -->
    <rect x="82" y="67" width="26" height="34" fill="#f0f4fa"/>
    <!-- Long line (positive) -->
    <line x1="83" y1="68" x2="107" y2="68" stroke="#1a3a6b" stroke-width="2.8"/>
    <!-- Short line -->
    <line x1="88" y1="74" x2="102" y2="74" stroke="#1a3a6b" stroke-width="1.5"/>
    <!-- Long line -->
    <line x1="83" y1="80" x2="107" y2="80" stroke="#1a3a6b" stroke-width="2.8"/>
    <!-- Short line -->
    <line x1="88" y1="86" x2="102" y2="86" stroke="#1a3a6b" stroke-width="1.5"/>
    <!-- Long line -->
    <line x1="83" y1="92" x2="107" y2="92" stroke="#1a3a6b" stroke-width="2.8"/>
    <!-- Short line (negative) -->
    <line x1="88" y1="98" x2="102" y2="98" stroke="#1a3a6b" stroke-width="1.5"/>
  </g>
  <!-- + and - terminals -->
  <text x="112" y="72" font-size="13" font-weight="700" fill="#1a3a6b">+</text>
  <text x="112" y="102" font-size="15" font-weight="700" fill="#1a3a6b">&#x2212;</text>
  <!-- Voltage label -->
  <text x="62" y="88" text-anchor="middle" font-size="14" font-weight="700" fill="#1a3a6b">12V</text>

  <!-- Resistor (IEEE zigzag) on right side -->
  <g filter="url(#cs)">
    <rect x="293" y="64" width="24" height="40" fill="#f0f4fa"/>
    <polyline points="305,64 305,68 315,72 295,78 315,84 295,90 315,96 305,100 305,104"
              fill="none" stroke="#1a3a6b" stroke-width="2.5" stroke-linejoin="round"/>
  </g>
  <!-- Resistor label -->
  <text x="330" y="86" font-size="14" font-weight="700" fill="#1a3a6b">4&#x03A9;</text>

  <!-- Corner junction dots -->
  <circle cx="95" cy="38" r="3" fill="#1a3a6b"/>
  <circle cx="305" cy="38" r="3" fill="#1a3a6b"/>
  <circle cx="305" cy="130" r="3" fill="#1a3a6b"/>
  <circle cx="95" cy="130" r="3" fill="#1a3a6b"/>

  <!-- Current direction arrow on top wire -->
  <line x1="160" y1="28" x2="220" y2="28" stroke="#c8960a" stroke-width="1.8" marker-end="url(#cArr)"/>
  <text x="190" y="24" text-anchor="middle" font-size="9" fill="#c8960a" font-weight="600">conventional current</text>

  <!-- Animated current flow dots -->
  <circle class="dot" r="3.5">
    <animateMotion dur="3.5s" repeatCount="indefinite" path="M95,38 L305,38 L305,130 L95,130 L95,38"/>
  </circle>
  <circle class="dot" r="3.5">
    <animateMotion dur="3.5s" repeatCount="indefinite" path="M95,38 L305,38 L305,130 L95,130 L95,38" begin="-0.875s"/>
  </circle>
  <circle class="dot" r="3.5">
    <animateMotion dur="3.5s" repeatCount="indefinite" path="M95,38 L305,38 L305,130 L95,130 L95,38" begin="-1.75s"/>
  </circle>
  <circle class="dot" r="3.5">
    <animateMotion dur="3.5s" repeatCount="indefinite" path="M95,38 L305,38 L305,130 L95,130 L95,38" begin="-2.625s"/>
  </circle>

  <!-- Unknown label -->
  <text x="350" y="88" font-size="14" font-weight="700" fill="#dc2626">I = ?</text>

  <!-- Title -->
  <text x="200" y="160" text-anchor="middle" font-size="11" font-weight="600" fill="#5a7090">Series Circuit -- Find the Current</text>
</svg>