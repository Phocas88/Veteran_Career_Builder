<svg xmlns="http://www.w3.org/2000/svg" width="400" height="180" viewBox="0 0 400 180">
  <style>
    @keyframes flow1 { 0% { offset-distance: 0%; } 100% { offset-distance: 100%; } }
    @keyframes flowDot { 0% { opacity: 1; } 50% { opacity: .6; } 100% { opacity: 1; } }
    .dot { r: 3; fill: #c8960a; }
    .d1 { offset-path: path('M100,45 L300,45 L300,135 L100,135 Z'); animation: flow1 3s linear infinite; }
    .d2 { offset-path: path('M100,45 L300,45 L300,135 L100,135 Z'); animation: flow1 3s linear infinite; animation-delay: -0.75s; }
    .d3 { offset-path: path('M100,45 L300,45 L300,135 L100,135 Z'); animation: flow1 3s linear infinite; animation-delay: -1.5s; }
    .d4 { offset-path: path('M100,45 L300,45 L300,135 L100,135 Z'); animation: flow1 3s linear infinite; animation-delay: -2.25s; }
    text { font-family: Arial, sans-serif; }
  </style>
  <rect width="400" height="180" rx="12" fill="#f0f4fa" stroke="#d0daea" stroke-width="2"/>

  <!-- Wires -->
  <line x1="100" y1="45" x2="300" y2="45" stroke="#1a3a6b" stroke-width="2.5"/>
  <line x1="300" y1="45" x2="300" y2="135" stroke="#1a3a6b" stroke-width="2.5"/>
  <line x1="300" y1="135" x2="100" y2="135" stroke="#1a3a6b" stroke-width="2.5"/>
  <line x1="100" y1="135" x2="100" y2="45" stroke="#1a3a6b" stroke-width="2.5"/>

  <!-- Battery on left side -->
  <rect x="88" y="70" width="24" height="40" fill="#f0f4fa" stroke="none"/>
  <line x1="100" y1="70" x2="100" y2="78" stroke="#1a3a6b" stroke-width="2.5"/>
  <line x1="88" y1="78" x2="112" y2="78" stroke="#1a3a6b" stroke-width="3"/>
  <line x1="92" y1="84" x2="108" y2="84" stroke="#1a3a6b" stroke-width="1.5"/>
  <line x1="88" y1="90" x2="112" y2="90" stroke="#1a3a6b" stroke-width="3"/>
  <line x1="92" y1="96" x2="108" y2="96" stroke="#1a3a6b" stroke-width="1.5"/>
  <line x1="100" y1="96" x2="100" y2="110" stroke="#1a3a6b" stroke-width="2.5"/>
  <!-- + and - -->
  <text x="118" y="77" font-size="12" font-weight="700" fill="#1a3a6b">+</text>
  <text x="118" y="100" font-size="14" font-weight="700" fill="#1a3a6b">−</text>
  <!-- Battery label -->
  <text x="56" y="92" text-anchor="middle" font-size="13" font-weight="700" fill="#1a3a6b">12V</text>

  <!-- Resistor on right side (zigzag) -->
  <rect x="288" y="70" width="24" height="40" fill="#f0f4fa" stroke="none"/>
  <polyline points="300,70 300,74 308,77 292,83 308,89 292,95 300,98 300,110"
            fill="none" stroke="#1a3a6b" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Resistor label -->
  <text x="330" y="88" font-size="13" font-weight="700" fill="#1a3a6b">4Ω</text>

  <!-- Current direction arrow on top wire -->
  <polygon points="200,40 210,45 200,50" fill="#c8960a"/>
  <text x="200" y="34" text-anchor="middle" font-size="10" fill="#c8960a" font-weight="600">current →</text>

  <!-- Animated current dots -->
  <circle class="dot d1"><animateMotion dur="3s" repeatCount="indefinite" path="M100,45 L300,45 L300,135 L100,135 L100,45"/></circle>
  <circle class="dot d2"><animateMotion dur="3s" repeatCount="indefinite" path="M100,45 L300,45 L300,135 L100,135 L100,45" begin="-0.75s"/></circle>
  <circle class="dot d3"><animateMotion dur="3s" repeatCount="indefinite" path="M100,45 L300,45 L300,135 L100,135 L100,45" begin="-1.5s"/></circle>
  <circle class="dot d4"><animateMotion dur="3s" repeatCount="indefinite" path="M100,45 L300,45 L300,135 L100,135 L100,45" begin="-2.25s"/></circle>

  <!-- Unknown label -->
  <text x="340" y="100" font-size="14" font-weight="700" fill="#dc2626">I = ?</text>

  <!-- Title -->
  <text x="200" y="168" text-anchor="middle" font-size="12" font-weight="600" fill="#5a7090">Series Circuit — Find the Current</text>
</svg>