<svg xmlns="http://www.w3.org/2000/svg" width="400" height="200" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="cmMirrorGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b0c4de"/>
      <stop offset="30%" stop-color="#e8eef6"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#e8eef6"/>
      <stop offset="100%" stop-color="#b0c4de"/>
    </linearGradient>
    <linearGradient id="cmShimmer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0)">
        <animate attributeName="stop-color" values="rgba(255,255,255,0);rgba(255,255,255,0.7);rgba(255,255,255,0)" dur="3.5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="rgba(255,255,255,0.7)">
        <animate attributeName="stop-color" values="rgba(255,255,255,0.7);rgba(255,255,255,0);rgba(255,255,255,0.7)" dur="3.5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="rgba(255,255,255,0)">
        <animate attributeName="stop-color" values="rgba(255,255,255,0);rgba(255,255,255,0.7);rgba(255,255,255,0)" dur="3.5s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>
  <style>
    @keyframes tick {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .second-hand { animation: tick 60s linear infinite; transform-origin: 290px 105px; }
    text { font-family: Arial, sans-serif; }
  </style>
  <rect width="400" height="200" rx="12" fill="#f0f4fa" stroke="#d0daea" stroke-width="2"/>

  <!-- Title -->
  <text x="200" y="20" text-anchor="middle" font-family="Arial" font-size="11" fill="#5a7090" font-weight="600">Clock in Mirror — What Is the Real Time?</text>

  <!-- Left side: Real time = ? -->
  <rect x="20" y="50" width="100" height="110" rx="8" fill="rgba(220,38,38,.08)" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="70" y="75" text-anchor="middle" font-family="Arial" font-size="11" fill="#5a7090" font-weight="600">Actual Time</text>
  <text x="70" y="120" text-anchor="middle" font-family="Arial" font-size="42" font-weight="700" fill="#dc2626">?</text>
  <text x="70" y="150" text-anchor="middle" font-family="Arial" font-size="10" fill="#dc2626">Real clock</text>

  <!-- Mirror surface -->
  <rect x="155" y="35" width="12" height="140" rx="3" fill="url(#cmMirrorGrad)" stroke="#8a9bb5" stroke-width="1.5"/>
  <rect x="155" y="35" width="12" height="140" rx="3" fill="url(#cmShimmer)" opacity="0.5"/>
  <rect x="152" y="32" width="18" height="5" rx="2" fill="#8a9bb5"/>
  <rect x="152" y="173" width="18" height="5" rx="2" fill="#8a9bb5"/>
  <text x="161" y="190" text-anchor="middle" font-family="Arial" font-size="9" fill="#8a9bb5">Mirror</text>

  <!-- Arrow -->
  <text x="140" y="110" text-anchor="middle" font-family="Arial" font-size="16" fill="#c8960a">←</text>

  <!-- Right side: Mirror clock showing 3:00 -->
  <circle cx="290" cy="105" r="60" fill="#fff" stroke="#1a3a6b" stroke-width="2.5"/>
  <circle cx="290" cy="105" r="56" fill="none" stroke="#d0daea" stroke-width="0.5"/>

  <!-- Clock numbers -->
  <text x="290" y="58" text-anchor="middle" font-family="Arial" font-size="11" font-weight="600" fill="#1a3a6b">12</text>
  <text x="340" y="110" text-anchor="middle" font-family="Arial" font-size="11" font-weight="600" fill="#1a3a6b">3</text>
  <text x="290" y="158" text-anchor="middle" font-family="Arial" font-size="11" font-weight="600" fill="#1a3a6b">6</text>
  <text x="240" y="110" text-anchor="middle" font-family="Arial" font-size="11" font-weight="600" fill="#1a3a6b">9</text>
  <!-- Minor numbers -->
  <text x="315" y="66" text-anchor="middle" font-family="Arial" font-size="8" fill="#8a9bb5">1</text>
  <text x="333" y="83" text-anchor="middle" font-family="Arial" font-size="8" fill="#8a9bb5">2</text>
  <text x="333" y="131" text-anchor="middle" font-family="Arial" font-size="8" fill="#8a9bb5">4</text>
  <text x="315" y="150" text-anchor="middle" font-family="Arial" font-size="8" fill="#8a9bb5">5</text>
  <text x="265" y="150" text-anchor="middle" font-family="Arial" font-size="8" fill="#8a9bb5">7</text>
  <text x="247" y="131" text-anchor="middle" font-family="Arial" font-size="8" fill="#8a9bb5">8</text>
  <text x="247" y="83" text-anchor="middle" font-family="Arial" font-size="8" fill="#8a9bb5">10</text>
  <text x="265" y="66" text-anchor="middle" font-family="Arial" font-size="8" fill="#8a9bb5">11</text>

  <!-- Hour hand pointing to 3 -->
  <line x1="290" y1="105" x2="325" y2="105" stroke="#1a3a6b" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Minute hand pointing to 12 -->
  <line x1="290" y1="105" x2="290" y2="60" stroke="#1a3a6b" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Second hand (animated) -->
  <line x1="290" y1="105" x2="290" y2="65" class="second-hand" stroke="#dc2626" stroke-width="1" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="290" cy="105" r="3" fill="#1a3a6b"/>

  <!-- Label -->
  <text x="290" y="180" text-anchor="middle" font-family="Arial" font-size="10" fill="#5a7090" font-weight="600">Mirror shows 3:00</text>
</svg>