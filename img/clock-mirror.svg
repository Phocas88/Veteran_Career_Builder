<svg xmlns="http://www.w3.org/2000/svg" width="400" height="200" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="cmMirrorGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b0c4de"/>
      <stop offset="30%" stop-color="#e8eef6"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#e8eef6"/>
      <stop offset="100%" stop-color="#b0c4de"/>
    </linearGradient>
    <linearGradient id="cmShimmer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0)">
        <animate attributeName="stop-color" values="rgba(255,255,255,0);rgba(255,255,255,0.7);rgba(255,255,255,0)" dur="3.5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="rgba(255,255,255,0.7)">
        <animate attributeName="stop-color" values="rgba(255,255,255,0.7);rgba(255,255,255,0);rgba(255,255,255,0.7)" dur="3.5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="rgba(255,255,255,0)">
        <animate attributeName="stop-color" values="rgba(255,255,255,0);rgba(255,255,255,0.7);rgba(255,255,255,0)" dur="3.5s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="cmClockFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f2f5"/>
    </linearGradient>
    <filter id="cmShadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#1a3a6b" flood-opacity="0.18"/>
    </filter>
  </defs>
  <style>
    @keyframes tick {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .second-hand { animation: tick 60s linear infinite; transform-origin: 300px 105px; }
    text { font-family: Arial, sans-serif; }
  </style>
  <!-- Background with grid -->
  <rect width="400" height="200" rx="10" fill="#f0f4fa" stroke="#d0daea" stroke-width="2"/>
  <g stroke="#d8dfe8" stroke-width="0.3">
    <line x1="0" y1="20" x2="400" y2="20"/><line x1="0" y1="40" x2="400" y2="40"/>
    <line x1="0" y1="60" x2="400" y2="60"/><line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="100" x2="400" y2="100"/><line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="140" x2="400" y2="140"/><line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="0" y1="180" x2="400" y2="180"/>
    <line x1="20" y1="0" x2="20" y2="200"/><line x1="40" y1="0" x2="40" y2="200"/>
    <line x1="60" y1="0" x2="60" y2="200"/><line x1="80" y1="0" x2="80" y2="200"/>
    <line x1="100" y1="0" x2="100" y2="200"/><line x1="120" y1="0" x2="120" y2="200"/>
    <line x1="140" y1="0" x2="140" y2="200"/><line x1="160" y1="0" x2="160" y2="200"/>
    <line x1="180" y1="0" x2="180" y2="200"/><line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="220" y1="0" x2="220" y2="200"/><line x1="240" y1="0" x2="240" y2="200"/>
    <line x1="260" y1="0" x2="260" y2="200"/><line x1="280" y1="0" x2="280" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/><line x1="320" y1="0" x2="320" y2="200"/>
    <line x1="340" y1="0" x2="340" y2="200"/><line x1="360" y1="0" x2="360" y2="200"/>
    <line x1="380" y1="0" x2="380" y2="200"/>
  </g>

  <!-- Title -->
  <text x="200" y="18" text-anchor="middle" font-size="11" fill="#5a7090" font-weight="600">Clock in Mirror -- What Is the Real Time?</text>

  <!-- Left side: Real time = ? -->
  <rect x="15" y="42" width="110" height="120" rx="8" fill="rgba(220,38,38,0.06)" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="70" y="65" text-anchor="middle" font-size="11" fill="#5a7090" font-weight="600">Actual Time</text>
  <text x="70" y="118" text-anchor="middle" font-size="48" font-weight="700" fill="#dc2626">?</text>
  <text x="70" y="152" text-anchor="middle" font-size="10" fill="#dc2626" font-weight="600">Real clock</text>

  <!-- Arrow -->
  <text x="140" y="108" text-anchor="middle" font-size="18" fill="#c8960a" font-weight="700">&lt;--</text>

  <!-- Mirror surface -->
  <rect x="160" y="32" width="14" height="148" rx="3" fill="url(#cmMirrorGrad)" stroke="#8a9bb5" stroke-width="1.5"/>
  <rect x="160" y="32" width="14" height="148" rx="3" fill="url(#cmShimmer)" opacity="0.5"/>
  <!-- Mirror frame -->
  <rect x="157" y="28" width="20" height="6" rx="2" fill="#8a9bb5"/>
  <rect x="157" y="178" width="20" height="6" rx="2" fill="#8a9bb5"/>
  <text x="167" y="194" text-anchor="middle" font-size="9" fill="#8a9bb5">Mirror</text>

  <!-- Right side: Mirror clock showing 3:00 -->
  <g filter="url(#cmShadow)">
    <!-- Clock outer ring -->
    <circle cx="300" cy="105" r="65" fill="#e0e4ea" stroke="#1a3a6b" stroke-width="2"/>
    <!-- Clock face -->
    <circle cx="300" cy="105" r="60" fill="url(#cmClockFace)" stroke="#1a3a6b" stroke-width="1.5"/>
    <!-- Minute marks -->
    <g stroke="#c0c8d5" stroke-width="0.8">
      <line x1="300" y1="48" x2="300" y2="52"/>
      <line x1="330" y1="52.3" x2="328.3" y2="56"/>
      <line x1="352.7" y1="74.3" x2="349" y2="76"/>
      <line x1="357" y1="105" x2="353" y2="105"/>
      <line x1="352.7" y1="135.7" x2="349" y2="134"/>
      <line x1="330" y1="157.7" x2="328.3" y2="154"/>
      <line x1="300" y1="162" x2="300" y2="158"/>
      <line x1="270" y1="157.7" x2="271.7" y2="154"/>
      <line x1="247.3" y1="135.7" x2="251" y2="134"/>
      <line x1="243" y1="105" x2="247" y2="105"/>
      <line x1="247.3" y1="74.3" x2="251" y2="76"/>
      <line x1="270" y1="52.3" x2="271.7" y2="56"/>
    </g>
    <!-- Hour marks (thicker) -->
    <g stroke="#1a3a6b" stroke-width="2">
      <line x1="300" y1="48" x2="300" y2="56"/>
      <line x1="357" y1="105" x2="349" y2="105"/>
      <line x1="300" y1="162" x2="300" y2="154"/>
      <line x1="243" y1="105" x2="251" y2="105"/>
    </g>

    <!-- Clock numbers -->
    <text x="300" y="67" text-anchor="middle" font-size="12" font-weight="600" fill="#1a3a6b">12</text>
    <text x="346" y="110" text-anchor="middle" font-size="12" font-weight="600" fill="#1a3a6b">3</text>
    <text x="300" y="153" text-anchor="middle" font-size="12" font-weight="600" fill="#1a3a6b">6</text>
    <text x="254" y="110" text-anchor="middle" font-size="12" font-weight="600" fill="#1a3a6b">9</text>
    <!-- Minor numbers -->
    <text x="323" y="73" text-anchor="middle" font-size="9" fill="#8a9bb5">1</text>
    <text x="340" y="88" text-anchor="middle" font-size="9" fill="#8a9bb5">2</text>
    <text x="340" y="126" text-anchor="middle" font-size="9" fill="#8a9bb5">4</text>
    <text x="323" y="143" text-anchor="middle" font-size="9" fill="#8a9bb5">5</text>
    <text x="277" y="143" text-anchor="middle" font-size="9" fill="#8a9bb5">7</text>
    <text x="260" y="126" text-anchor="middle" font-size="9" fill="#8a9bb5">8</text>
    <text x="260" y="88" text-anchor="middle" font-size="9" fill="#8a9bb5">10</text>
    <text x="277" y="73" text-anchor="middle" font-size="9" fill="#8a9bb5">11</text>

    <!-- Hour hand pointing to 3 -->
    <line x1="300" y1="105" x2="332" y2="105" stroke="#1a3a6b" stroke-width="4" stroke-linecap="round"/>
    <!-- Minute hand pointing to 12 -->
    <line x1="300" y1="105" x2="300" y2="62" stroke="#1a3a6b" stroke-width="2.8" stroke-linecap="round"/>
    <!-- Second hand (animated) -->
    <line x1="300" y1="105" x2="300" y2="68" class="second-hand" stroke="#dc2626" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Center cap -->
    <circle cx="300" cy="105" r="4" fill="#1a3a6b"/>
    <circle cx="300" cy="105" r="2" fill="#c8960a"/>
  </g>

  <!-- Label -->
  <text x="300" y="185" text-anchor="middle" font-size="10" fill="#5a7090" font-weight="600">Mirror shows 3:00</text>
</svg>