<svg xmlns="http://www.w3.org/2000/svg" width="400" height="200" viewBox="0 0 400 200">
  <style>
    @keyframes needleWobble {
      0%, 100% { transform: rotate(0deg); }
      20% { transform: rotate(2deg); }
      40% { transform: rotate(-1.5deg); }
      60% { transform: rotate(1deg); }
      80% { transform: rotate(-0.5deg); }
    }
    .needle { animation: needleWobble 3s ease-in-out infinite; transform-origin: 120px 110px; }
    text { font-family: Arial, sans-serif; }
  </style>
  <rect width="400" height="200" rx="12" fill="#f0f4fa" stroke="#d0daea" stroke-width="2"/>

  <!-- Title -->
  <text x="200" y="20" text-anchor="middle" font-family="Arial" font-size="11" fill="#5a7090" font-weight="600">Compass Turns — Which Direction Do You End Up Facing?</text>

  <!-- Compass circle -->
  <circle cx="120" cy="110" r="65" fill="#e8eef6" stroke="#1a3a6b" stroke-width="2"/>
  <circle cx="120" cy="110" r="60" fill="none" stroke="#d0daea" stroke-width="1"/>

  <!-- Compass tick marks -->
  <line x1="120" y1="48" x2="120" y2="55" stroke="#1a3a6b" stroke-width="2"/>
  <line x1="120" y1="165" x2="120" y2="172" stroke="#1a3a6b" stroke-width="2"/>
  <line x1="58" y1="110" x2="65" y2="110" stroke="#1a3a6b" stroke-width="2"/>
  <line x1="175" y1="110" x2="182" y2="110" stroke="#1a3a6b" stroke-width="2"/>

  <!-- N S E W labels -->
  <text x="120" y="44" text-anchor="middle" font-family="Arial" font-size="14" font-weight="700" fill="#dc2626">N</text>
  <text x="120" y="186" text-anchor="middle" font-family="Arial" font-size="14" font-weight="700" fill="#1a3a6b">S</text>
  <text x="190" y="115" text-anchor="middle" font-family="Arial" font-size="14" font-weight="700" fill="#1a3a6b">E</text>
  <text x="50" y="115" text-anchor="middle" font-family="Arial" font-size="14" font-weight="700" fill="#1a3a6b">W</text>

  <!-- Person arrow pointing North (starting position) -->
  <g class="needle">
    <polygon points="120,70 115,115 125,115" fill="#c8960a" stroke="#1a3a6b" stroke-width="1" opacity="0.8"/>
    <circle cx="120" cy="110" r="5" fill="#c8960a" stroke="#1a3a6b" stroke-width="1"/>
  </g>
  <text x="120" y="140" text-anchor="middle" font-family="Arial" font-size="9" fill="#5a7090">Start: facing N</text>

  <!-- Turn instructions on right side -->
  <text x="280" y="52" text-anchor="middle" font-family="Arial" font-size="12" font-weight="700" fill="#1a3a6b">Turn Sequence:</text>

  <rect x="225" y="60" width="110" height="22" rx="4" fill="#dce4f0" stroke="#1a3a6b" stroke-width="1"/>
  <text x="280" y="76" text-anchor="middle" font-family="Arial" font-size="11" fill="#1a3a6b">Start: N</text>

  <text x="280" y="92" text-anchor="middle" font-family="Arial" font-size="12" fill="#5a7090">↓</text>

  <rect x="225" y="96" width="110" height="22" rx="4" fill="#dce4f0" stroke="#1a3a6b" stroke-width="1"/>
  <text x="280" y="112" text-anchor="middle" font-family="Arial" font-size="11" fill="#1a3a6b">90° Clockwise</text>

  <text x="280" y="128" text-anchor="middle" font-family="Arial" font-size="12" fill="#5a7090">↓</text>

  <rect x="225" y="132" width="110" height="22" rx="4" fill="#dce4f0" stroke="#1a3a6b" stroke-width="1"/>
  <text x="280" y="148" text-anchor="middle" font-family="Arial" font-size="11" fill="#1a3a6b">180°</text>

  <text x="280" y="164" text-anchor="middle" font-family="Arial" font-size="12" fill="#5a7090">↓</text>

  <rect x="225" y="168" width="110" height="22" rx="4" fill="#dce4f0" stroke="#1a3a6b" stroke-width="1"/>
  <text x="280" y="184" text-anchor="middle" font-family="Arial" font-size="11" fill="#1a3a6b">90° Counter-CW</text>

  <!-- Final answer question -->
  <rect x="350" y="105" width="40" height="40" rx="6" fill="rgba(220,38,38,.08)" stroke="#dc2626" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="370" y="132" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#dc2626">?</text>
</svg>