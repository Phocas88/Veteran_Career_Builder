<svg xmlns="http://www.w3.org/2000/svg" width="400" height="200" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="ctRing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d8dce5"/>
      <stop offset="100%" stop-color="#b0b8c8"/>
    </linearGradient>
    <linearGradient id="ctFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f9fb"/>
      <stop offset="100%" stop-color="#e8ecf2"/>
    </linearGradient>
    <filter id="ctShadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#1a3a6b" flood-opacity="0.18"/>
    </filter>
  </defs>
  <style>
    @keyframes needleWobble {
      0%, 100% { transform: rotate(0deg); }
      20% { transform: rotate(1.5deg); }
      40% { transform: rotate(-1deg); }
      60% { transform: rotate(0.8deg); }
      80% { transform: rotate(-0.5deg); }
    }
    .needle { animation: needleWobble 3s ease-in-out infinite; transform-origin: 120px 108px; }
    text { font-family: Arial, sans-serif; }
  </style>
  <!-- Background with grid -->
  <rect width="400" height="200" rx="10" fill="#f0f4fa" stroke="#d0daea" stroke-width="2"/>
  <g stroke="#d8dfe8" stroke-width="0.3">
    <line x1="0" y1="20" x2="400" y2="20"/><line x1="0" y1="40" x2="400" y2="40"/>
    <line x1="0" y1="60" x2="400" y2="60"/><line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="100" x2="400" y2="100"/><line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="140" x2="400" y2="140"/><line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="0" y1="180" x2="400" y2="180"/>
    <line x1="20" y1="0" x2="20" y2="200"/><line x1="40" y1="0" x2="40" y2="200"/>
    <line x1="60" y1="0" x2="60" y2="200"/><line x1="80" y1="0" x2="80" y2="200"/>
    <line x1="100" y1="0" x2="100" y2="200"/><line x1="120" y1="0" x2="120" y2="200"/>
    <line x1="140" y1="0" x2="140" y2="200"/><line x1="160" y1="0" x2="160" y2="200"/>
    <line x1="180" y1="0" x2="180" y2="200"/><line x1="200" y1="0" x2="200" y2="200"/>
  </g>

  <!-- Title -->
  <text x="200" y="18" text-anchor="middle" font-size="11" fill="#5a7090" font-weight="600">Compass Turns -- Which Direction Do You End Up Facing?</text>

  <!-- Compass -->
  <g filter="url(#ctShadow)">
    <!-- Outer ring -->
    <circle cx="120" cy="108" r="72" fill="url(#ctRing)" stroke="#1a3a6b" stroke-width="2.5"/>
    <!-- Inner ring -->
    <circle cx="120" cy="108" r="66" fill="url(#ctFace)" stroke="#5a7090" stroke-width="1"/>
    <!-- Degree markings (every 30 degrees) -->
    <g stroke="#8a9ab5" stroke-width="1">
      <!-- N -->  <line x1="120" y1="44" x2="120" y2="52"/>
      <!-- 30 -->  <line x1="153" y1="51" x2="150.4" y2="58.6"/>
      <!-- E -->  <line x1="184" y1="108" x2="176" y2="108"/>
      <!-- 60 -->  <line x1="153" y1="165" x2="150.4" y2="157.4"/>
      <!-- S -->  <line x1="120" y1="172" x2="120" y2="164"/>
      <!-- 210 --> <line x1="87" y1="165" x2="89.6" y2="157.4"/>
      <!-- W -->  <line x1="56" y1="108" x2="64" y2="108"/>
      <!-- 330 --> <line x1="87" y1="51" x2="89.6" y2="58.6"/>
    </g>
    <!-- Shorter tick marks (every 15 degrees) -->
    <g stroke="#c0c8d5" stroke-width="0.6">
      <line x1="136.5" y1="45.7" x2="135" y2="51"/>
      <line x1="169.8" y1="62.3" x2="165.5" y2="66.5"/>
      <line x1="181.3" y1="91.5" x2="175" y2="93"/>
      <line x1="169.8" y1="153.7" x2="165.5" y2="149.5"/>
      <line x1="136.5" y1="170.3" x2="135" y2="165"/>
      <line x1="103.5" y1="170.3" x2="105" y2="165"/>
      <line x1="70.2" y1="153.7" x2="74.5" y2="149.5"/>
      <line x1="58.7" y1="91.5" x2="65" y2="93"/>
      <line x1="70.2" y1="62.3" x2="74.5" y2="66.5"/>
      <line x1="103.5" y1="45.7" x2="105" y2="51"/>
      <line x1="181.3" y1="124.5" x2="175" y2="123"/>
      <line x1="58.7" y1="124.5" x2="65" y2="123"/>
    </g>

    <!-- Decorative compass rose points -->
    <polygon points="120,54 124,98 120,108 116,98" fill="#dc2626" stroke="#1a3a6b" stroke-width="0.5" opacity="0.85"/>
    <polygon points="120,162 116,118 120,108 124,118" fill="#e0e5ee" stroke="#1a3a6b" stroke-width="0.5" opacity="0.7"/>
    <polygon points="178,108 130,104 120,108 130,112" fill="#e0e5ee" stroke="#1a3a6b" stroke-width="0.5" opacity="0.5"/>
    <polygon points="62,108 110,112 120,108 110,104" fill="#e0e5ee" stroke="#1a3a6b" stroke-width="0.5" opacity="0.5"/>

    <!-- N S E W labels -->
    <text x="120" y="47" text-anchor="middle" font-size="14" font-weight="700" fill="#dc2626">N</text>
    <text x="120" y="178" text-anchor="middle" font-size="14" font-weight="700" fill="#1a3a6b">S</text>
    <text x="191" y="113" text-anchor="middle" font-size="14" font-weight="700" fill="#1a3a6b">E</text>
    <text x="49" y="113" text-anchor="middle" font-size="14" font-weight="700" fill="#1a3a6b">W</text>
  </g>

  <!-- Gold needle pointing North (starting position, wobbling) -->
  <g class="needle">
    <polygon points="120,62 116,108 124,108" fill="#c8960a" stroke="#8a6000" stroke-width="0.8" opacity="0.85"/>
    <circle cx="120" cy="108" r="5" fill="#c8960a" stroke="#8a6000" stroke-width="1"/>
  </g>
  <text x="120" y="143" text-anchor="middle" font-size="8" fill="#5a7090">Start: facing N</text>

  <!-- Turn instructions on right side -->
  <text x="300" y="42" text-anchor="middle" font-size="12" font-weight="700" fill="#1a3a6b">Turn Sequence:</text>

  <rect x="235" y="50" width="130" height="22" rx="5" fill="#dce4f0" stroke="#1a3a6b" stroke-width="1"/>
  <text x="300" y="66" text-anchor="middle" font-size="11" fill="#1a3a6b" font-weight="600">Start: N</text>

  <text x="300" y="82" text-anchor="middle" font-size="12" fill="#c8960a" font-weight="700">|</text>

  <rect x="235" y="86" width="130" height="22" rx="5" fill="#dce4f0" stroke="#1a3a6b" stroke-width="1"/>
  <text x="300" y="102" text-anchor="middle" font-size="11" fill="#1a3a6b">90 deg Clockwise</text>

  <text x="300" y="118" text-anchor="middle" font-size="12" fill="#c8960a" font-weight="700">|</text>

  <rect x="235" y="122" width="130" height="22" rx="5" fill="#dce4f0" stroke="#1a3a6b" stroke-width="1"/>
  <text x="300" y="138" text-anchor="middle" font-size="11" fill="#1a3a6b">180 deg</text>

  <text x="300" y="154" text-anchor="middle" font-size="12" fill="#c8960a" font-weight="700">|</text>

  <rect x="235" y="158" width="130" height="22" rx="5" fill="#dce4f0" stroke="#1a3a6b" stroke-width="1"/>
  <text x="300" y="174" text-anchor="middle" font-size="11" fill="#1a3a6b">90 deg Counter-CW</text>

  <!-- Final answer question -->
  <rect x="375" y="88" width="18" height="44" rx="5" fill="rgba(220,38,38,0.08)" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="384" y="116" text-anchor="middle" font-size="20" font-weight="700" fill="#dc2626">?</text>

  <!-- Bottom label -->
  <text x="200" y="196" text-anchor="middle" font-size="9" fill="#8a9ab5">Follow the turn sequence to find the final facing direction</text>
</svg>