<svg xmlns="http://www.w3.org/2000/svg" width="400" height="200" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="cfCard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8d8c0"/>
      <stop offset="100%" stop-color="#d4c4a8"/>
    </linearGradient>
    <filter id="cfShadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="1" stdDeviation="1.5" flood-color="#1a3a6b" flood-opacity="0.12"/>
    </filter>
  </defs>
  <style>
    text { font-family: Arial, sans-serif; }
  </style>
  <!-- Background with grid -->
  <rect width="400" height="200" rx="10" fill="#f0f4fa" stroke="#d0daea" stroke-width="2"/>
  <g stroke="#d8dfe8" stroke-width="0.3">
    <line x1="0" y1="20" x2="400" y2="20"/><line x1="0" y1="40" x2="400" y2="40"/>
    <line x1="0" y1="60" x2="400" y2="60"/><line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="100" x2="400" y2="100"/><line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="140" x2="400" y2="140"/><line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="0" y1="180" x2="400" y2="180"/>
    <line x1="20" y1="0" x2="20" y2="200"/><line x1="40" y1="0" x2="40" y2="200"/>
    <line x1="60" y1="0" x2="60" y2="200"/><line x1="80" y1="0" x2="80" y2="200"/>
    <line x1="100" y1="0" x2="100" y2="200"/><line x1="120" y1="0" x2="120" y2="200"/>
    <line x1="140" y1="0" x2="140" y2="200"/><line x1="160" y1="0" x2="160" y2="200"/>
    <line x1="180" y1="0" x2="180" y2="200"/><line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="220" y1="0" x2="220" y2="200"/><line x1="240" y1="0" x2="240" y2="200"/>
    <line x1="260" y1="0" x2="260" y2="200"/><line x1="280" y1="0" x2="280" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/><line x1="320" y1="0" x2="320" y2="200"/>
    <line x1="340" y1="0" x2="340" y2="200"/><line x1="360" y1="0" x2="360" y2="200"/>
    <line x1="380" y1="0" x2="380" y2="200"/>
  </g>

  <!-- Title -->
  <text x="200" y="18" text-anchor="middle" font-size="11" fill="#5a7090" font-weight="600">Cross-Shaped Cardboard -- What Does It Fold Into?</text>

  <!-- Cross shape made of 6 squares (each 34x34), centered around 115,105 -->
  <g filter="url(#cfShadow)">
    <!-- Top square -->
    <rect x="98" y="36" width="34" height="34" fill="url(#cfCard)" stroke="#1a3a6b" stroke-width="1.5" rx="1"/>
    <!-- Cardboard texture lines -->
    <line x1="105" y1="38" x2="105" y2="68" stroke="#c4b498" stroke-width="0.4"/>
    <line x1="115" y1="38" x2="115" y2="68" stroke="#c4b498" stroke-width="0.4"/>
    <line x1="125" y1="38" x2="125" y2="68" stroke="#c4b498" stroke-width="0.4"/>

    <!-- Left square -->
    <rect x="64" y="70" width="34" height="34" fill="url(#cfCard)" stroke="#1a3a6b" stroke-width="1.5" rx="1"/>
    <line x1="71" y1="72" x2="71" y2="102" stroke="#c4b498" stroke-width="0.4"/>
    <line x1="81" y1="72" x2="81" y2="102" stroke="#c4b498" stroke-width="0.4"/>
    <line x1="91" y1="72" x2="91" y2="102" stroke="#c4b498" stroke-width="0.4"/>

    <!-- Center square -->
    <rect x="98" y="70" width="34" height="34" fill="url(#cfCard)" stroke="#1a3a6b" stroke-width="1.5" rx="1"/>
    <line x1="105" y1="72" x2="105" y2="102" stroke="#c4b498" stroke-width="0.4"/>
    <line x1="115" y1="72" x2="115" y2="102" stroke="#c4b498" stroke-width="0.4"/>
    <line x1="125" y1="72" x2="125" y2="102" stroke="#c4b498" stroke-width="0.4"/>

    <!-- Right square -->
    <rect x="132" y="70" width="34" height="34" fill="url(#cfCard)" stroke="#1a3a6b" stroke-width="1.5" rx="1"/>
    <line x1="139" y1="72" x2="139" y2="102" stroke="#c4b498" stroke-width="0.4"/>
    <line x1="149" y1="72" x2="149" y2="102" stroke="#c4b498" stroke-width="0.4"/>
    <line x1="159" y1="72" x2="159" y2="102" stroke="#c4b498" stroke-width="0.4"/>

    <!-- Bottom square -->
    <rect x="98" y="104" width="34" height="34" fill="url(#cfCard)" stroke="#1a3a6b" stroke-width="1.5" rx="1"/>
    <line x1="105" y1="106" x2="105" y2="136" stroke="#c4b498" stroke-width="0.4"/>
    <line x1="115" y1="106" x2="115" y2="136" stroke="#c4b498" stroke-width="0.4"/>
    <line x1="125" y1="106" x2="125" y2="136" stroke="#c4b498" stroke-width="0.4"/>

    <!-- Far bottom square (6th face) -->
    <rect x="98" y="138" width="34" height="34" fill="url(#cfCard)" stroke="#1a3a6b" stroke-width="1.5" rx="1"/>
    <line x1="105" y1="140" x2="105" y2="170" stroke="#c4b498" stroke-width="0.4"/>
    <line x1="115" y1="140" x2="115" y2="170" stroke="#c4b498" stroke-width="0.4"/>
    <line x1="125" y1="140" x2="125" y2="170" stroke="#c4b498" stroke-width="0.4"/>
  </g>

  <!-- Fold lines (dashed gold, animated pulsing) -->
  <line x1="98" y1="70" x2="132" y2="70" stroke="#c8960a" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="98" y1="104" x2="132" y2="104" stroke="#c8960a" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="98" y1="70" x2="98" y2="104" stroke="#c8960a" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="132" y1="70" x2="132" y2="104" stroke="#c8960a" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="98" y1="138" x2="132" y2="138" stroke="#c8960a" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Fold labels -->
  <text x="115" y="32" text-anchor="middle" font-size="8" fill="#c8960a" font-weight="600">fold</text>
  <text x="54" y="90" text-anchor="end" font-size="8" fill="#c8960a" font-weight="600">fold</text>
  <text x="176" y="90" font-size="8" fill="#c8960a" font-weight="600">fold</text>
  <text x="115" y="184" text-anchor="middle" font-size="8" fill="#c8960a" font-weight="600">fold</text>

  <!-- Label -->
  <text x="115" y="196" text-anchor="middle" font-size="9" fill="#1a3a6b" font-weight="600">6 connected squares</text>

  <!-- Arrow pointing to result -->
  <line x1="200" y1="100" x2="250" y2="100" stroke="#1a3a6b" stroke-width="2"/>
  <polygon points="248,94 260,100 248,106" fill="#1a3a6b"/>

  <!-- Question mark box for result -->
  <rect x="275" y="55" width="105" height="90" rx="10" fill="rgba(220,38,38,0.06)" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,3" filter="url(#cfShadow)"/>
  <text x="327" y="88" text-anchor="middle" font-size="11" fill="#5a7090" font-weight="600">Folds into</text>
  <text x="327" y="126" text-anchor="middle" font-size="40" font-weight="700" fill="#dc2626">?</text>

  <!-- Bottom note -->
  <text x="327" y="162" text-anchor="middle" font-size="9" fill="#8a9ab5">What 3D shape results?</text>
</svg>