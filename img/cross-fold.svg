<svg xmlns="http://www.w3.org/2000/svg" width="400" height="200" viewBox="0 0 400 200">
  <style>
    @keyframes pulseFold {
      0%, 100% { stroke-opacity: 0.4; stroke-width: 1.5; }
      50% { stroke-opacity: 1; stroke-width: 2.5; }
    }
    .fold-line { animation: pulseFold 2s ease-in-out infinite; }
    text { font-family: Arial, sans-serif; }
  </style>
  <rect width="400" height="200" rx="12" fill="#f0f4fa" stroke="#d0daea" stroke-width="2"/>

  <!-- Title -->
  <text x="200" y="20" text-anchor="middle" font-family="Arial" font-size="11" fill="#5a7090" font-weight="600">Cross-Shaped Cardboard — What Does It Fold Into?</text>

  <!-- Cross shape made of 6 squares (each 36x36), centered around 130, 110 -->
  <!-- Center square -->
  <rect x="112" y="92" width="36" height="36" fill="#dce4f0" stroke="#1a3a6b" stroke-width="2" rx="1"/>
  <!-- Top square -->
  <rect x="112" y="56" width="36" height="36" fill="#dce4f0" stroke="#1a3a6b" stroke-width="2" rx="1"/>
  <!-- Bottom square -->
  <rect x="112" y="128" width="36" height="36" fill="#dce4f0" stroke="#1a3a6b" stroke-width="2" rx="1"/>
  <!-- Left square -->
  <rect x="76" y="92" width="36" height="36" fill="#dce4f0" stroke="#1a3a6b" stroke-width="2" rx="1"/>
  <!-- Right square -->
  <rect x="148" y="92" width="36" height="36" fill="#dce4f0" stroke="#1a3a6b" stroke-width="2" rx="1"/>
  <!-- Far bottom (arm of cross) -->
  <rect x="112" y="164" width="36" height="36" fill="#dce4f0" stroke="#1a3a6b" stroke-width="2" rx="1"/>

  <!-- Fold lines (dashed, animated) -->
  <line x1="112" y1="92" x2="148" y2="92" class="fold-line" stroke="#c8960a" stroke-dasharray="4,3"/>
  <line x1="112" y1="128" x2="148" y2="128" class="fold-line" stroke="#c8960a" stroke-dasharray="4,3"/>
  <line x1="112" y1="92" x2="112" y2="128" class="fold-line" stroke="#c8960a" stroke-dasharray="4,3"/>
  <line x1="148" y1="92" x2="148" y2="128" class="fold-line" stroke="#c8960a" stroke-dasharray="4,3"/>
  <line x1="112" y1="164" x2="148" y2="164" class="fold-line" stroke="#c8960a" stroke-dasharray="4,3"/>

  <!-- Fold arrows (small curved arrows near fold lines) -->
  <text x="130" y="88" text-anchor="middle" font-family="Arial" font-size="10" fill="#c8960a">↑ fold</text>
  <text x="130" y="142" text-anchor="middle" font-family="Arial" font-size="10" fill="#c8960a">fold</text>
  <text x="68" y="114" text-anchor="middle" font-family="Arial" font-size="10" fill="#c8960a">fold →</text>
  <text x="194" y="114" text-anchor="middle" font-family="Arial" font-size="10" fill="#c8960a">← fold</text>
  <text x="130" y="178" text-anchor="middle" font-family="Arial" font-size="10" fill="#c8960a">fold ↑</text>

  <!-- Arrow pointing to result -->
  <text x="230" y="112" font-family="Arial" font-size="28" fill="#1a3a6b" font-weight="300">→</text>

  <!-- Question mark box for result -->
  <rect x="270" y="75" width="90" height="70" rx="8" fill="rgba(220,38,38,.08)" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="315" y="100" text-anchor="middle" font-family="Arial" font-size="12" fill="#5a7090" font-weight="600">Folds into</text>
  <text x="315" y="130" text-anchor="middle" font-family="Arial" font-size="32" font-weight="700" fill="#dc2626">?</text>

  <!-- Label -->
  <text x="130" y="30" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a3a6b" font-weight="600">6 connected squares</text>
</svg>