<svg xmlns="http://www.w3.org/2000/svg" width="400" height="180" viewBox="0 0 400 180">
  <style>
    @keyframes cubeWobble {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(1.2deg); }
      75% { transform: rotate(-1.2deg); }
    }
    .cube-wire { animation: cubeWobble 4.5s ease-in-out infinite; transform-origin: 160px 95px; }
    text { font-family: Arial, sans-serif; }
  </style>
  <rect width="400" height="180" rx="12" fill="#f0f4fa" stroke="#d0daea" stroke-width="2"/>

  <!-- Title -->
  <text x="200" y="20" text-anchor="middle" font-family="Arial" font-size="11" fill="#5a7090" font-weight="600">Cube — Count the Edges</text>

  <g class="cube-wire">
    <!-- Isometric cube wireframe -->
    <!-- Front face (visible) -->
    <!-- Bottom-left to bottom-right -->
    <line x1="85" y1="140" x2="185" y2="140" stroke="#1a3a6b" stroke-width="3" stroke-linecap="round"/>
    <!-- Bottom-left to top-left -->
    <line x1="85" y1="140" x2="85" y2="60" stroke="#1a3a6b" stroke-width="3" stroke-linecap="round"/>
    <!-- Top-left to top-right -->
    <line x1="85" y1="60" x2="185" y2="60" stroke="#1a3a6b" stroke-width="3" stroke-linecap="round"/>
    <!-- Top-right to bottom-right -->
    <line x1="185" y1="60" x2="185" y2="140" stroke="#1a3a6b" stroke-width="3" stroke-linecap="round"/>

    <!-- Top face (visible) -->
    <!-- Top-left front to top-left back -->
    <line x1="85" y1="60" x2="135" y2="35" stroke="#4a7ec8" stroke-width="3" stroke-linecap="round"/>
    <!-- Top-right front to top-right back -->
    <line x1="185" y1="60" x2="235" y2="35" stroke="#4a7ec8" stroke-width="3" stroke-linecap="round"/>
    <!-- Top-left back to top-right back -->
    <line x1="135" y1="35" x2="235" y2="35" stroke="#4a7ec8" stroke-width="3" stroke-linecap="round"/>

    <!-- Right face (visible) -->
    <!-- Bottom-right front to bottom-right back -->
    <line x1="185" y1="140" x2="235" y2="115" stroke="#4a7ec8" stroke-width="3" stroke-linecap="round"/>
    <!-- Top-right back to bottom-right back -->
    <line x1="235" y1="35" x2="235" y2="115" stroke="#4a7ec8" stroke-width="3" stroke-linecap="round"/>

    <!-- Hidden edges (dashed, lighter) -->
    <!-- Bottom-left front to bottom-left back -->
    <line x1="85" y1="140" x2="135" y2="115" stroke="#8a9bb5" stroke-width="2" stroke-dasharray="5,4" stroke-linecap="round"/>
    <!-- Bottom-left back to bottom-right back -->
    <line x1="135" y1="115" x2="235" y2="115" stroke="#8a9bb5" stroke-width="2" stroke-dasharray="5,4" stroke-linecap="round"/>
    <!-- Top-left back to bottom-left back -->
    <line x1="135" y1="35" x2="135" y2="115" stroke="#8a9bb5" stroke-width="2" stroke-dasharray="5,4" stroke-linecap="round"/>

    <!-- Vertex dots -->
    <circle cx="85" cy="140" r="3" fill="#1a3a6b"/>
    <circle cx="185" cy="140" r="3" fill="#1a3a6b"/>
    <circle cx="85" cy="60" r="3" fill="#1a3a6b"/>
    <circle cx="185" cy="60" r="3" fill="#1a3a6b"/>
    <circle cx="135" cy="35" r="3" fill="#4a7ec8"/>
    <circle cx="235" cy="35" r="3" fill="#4a7ec8"/>
    <circle cx="235" cy="115" r="3" fill="#4a7ec8"/>
    <circle cx="135" cy="115" r="3" fill="#8a9bb5"/>
  </g>

  <!-- Legend -->
  <line x1="290" y1="55" x2="310" y2="55" stroke="#1a3a6b" stroke-width="3"/>
  <text x="315" y="59" font-family="Arial" font-size="10" fill="#1a3a6b">Visible edges</text>

  <line x1="290" y1="73" x2="310" y2="73" stroke="#8a9bb5" stroke-width="2" stroke-dasharray="5,4"/>
  <text x="315" y="77" font-family="Arial" font-size="10" fill="#8a9bb5">Hidden edges</text>

  <!-- Question box -->
  <rect x="290" y="95" width="95" height="50" rx="6" fill="rgba(220,38,38,.08)" stroke="#dc2626" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="337" y="115" text-anchor="middle" font-family="Arial" font-size="13" fill="#5a7090" font-weight="600">Edges =</text>
  <text x="337" y="138" text-anchor="middle" font-family="Arial" font-size="26" font-weight="700" fill="#dc2626">?</text>

  <!-- Hint -->
  <text x="337" y="165" text-anchor="middle" font-family="Arial" font-size="9" fill="#c8960a" font-weight="600">Count all 3D edges</text>
</svg>