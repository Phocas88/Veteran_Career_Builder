<svg xmlns="http://www.w3.org/2000/svg" width="400" height="200" viewBox="0 0 400 200">
  <defs>
    <filter id="ceShadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="1" stdDeviation="1.5" flood-color="#1a3a6b" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="ceVertex" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c8960a"/>
      <stop offset="100%" stop-color="#a07800"/>
    </linearGradient>
  </defs>
  <style>
    text { font-family: Arial, sans-serif; }
  </style>
  <!-- Background with grid -->
  <rect width="400" height="200" rx="10" fill="#f0f4fa" stroke="#d0daea" stroke-width="2"/>
  <g stroke="#d8dfe8" stroke-width="0.3">
    <line x1="0" y1="20" x2="400" y2="20"/><line x1="0" y1="40" x2="400" y2="40"/>
    <line x1="0" y1="60" x2="400" y2="60"/><line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="100" x2="400" y2="100"/><line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="140" x2="400" y2="140"/><line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="0" y1="180" x2="400" y2="180"/>
    <line x1="20" y1="0" x2="20" y2="200"/><line x1="40" y1="0" x2="40" y2="200"/>
    <line x1="60" y1="0" x2="60" y2="200"/><line x1="80" y1="0" x2="80" y2="200"/>
    <line x1="100" y1="0" x2="100" y2="200"/><line x1="120" y1="0" x2="120" y2="200"/>
    <line x1="140" y1="0" x2="140" y2="200"/><line x1="160" y1="0" x2="160" y2="200"/>
    <line x1="180" y1="0" x2="180" y2="200"/><line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="220" y1="0" x2="220" y2="200"/><line x1="240" y1="0" x2="240" y2="200"/>
    <line x1="260" y1="0" x2="260" y2="200"/><line x1="280" y1="0" x2="280" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/><line x1="320" y1="0" x2="320" y2="200"/>
    <line x1="340" y1="0" x2="340" y2="200"/><line x1="360" y1="0" x2="360" y2="200"/>
    <line x1="380" y1="0" x2="380" y2="200"/>
  </g>

  <!-- Title -->
  <text x="200" y="18" text-anchor="middle" font-size="11" fill="#5a7090" font-weight="600">Cube Wireframe -- Count the Edges</text>

  <g filter="url(#ceShadow)">
    <!-- Isometric cube wireframe -->
    <!-- Front face (visible) - thick navy lines -->
    <line x1="80" y1="150" x2="180" y2="150" stroke="#1a3a6b" stroke-width="3" stroke-linecap="round"/>
    <line x1="80" y1="150" x2="80" y2="65" stroke="#1a3a6b" stroke-width="3" stroke-linecap="round"/>
    <line x1="80" y1="65" x2="180" y2="65" stroke="#1a3a6b" stroke-width="3" stroke-linecap="round"/>
    <line x1="180" y1="65" x2="180" y2="150" stroke="#1a3a6b" stroke-width="3" stroke-linecap="round"/>

    <!-- Top face (visible) -->
    <line x1="80" y1="65" x2="130" y2="38" stroke="#4a7ec8" stroke-width="3" stroke-linecap="round"/>
    <line x1="180" y1="65" x2="230" y2="38" stroke="#4a7ec8" stroke-width="3" stroke-linecap="round"/>
    <line x1="130" y1="38" x2="230" y2="38" stroke="#4a7ec8" stroke-width="3" stroke-linecap="round"/>

    <!-- Right face (visible) -->
    <line x1="180" y1="150" x2="230" y2="123" stroke="#4a7ec8" stroke-width="3" stroke-linecap="round"/>
    <line x1="230" y1="38" x2="230" y2="123" stroke="#4a7ec8" stroke-width="3" stroke-linecap="round"/>

    <!-- Hidden edges (dashed, lighter) -->
    <line x1="80" y1="150" x2="130" y2="123" stroke="#8a9bb5" stroke-width="2" stroke-dasharray="5,4" stroke-linecap="round"/>
    <line x1="130" y1="123" x2="230" y2="123" stroke="#8a9bb5" stroke-width="2" stroke-dasharray="5,4" stroke-linecap="round"/>
    <line x1="130" y1="38" x2="130" y2="123" stroke="#8a9bb5" stroke-width="2" stroke-dasharray="5,4" stroke-linecap="round"/>

    <!-- Vertex dots at all 8 corners -->
    <circle cx="80" cy="150" r="4" fill="url(#ceVertex)" stroke="#1a3a6b" stroke-width="1"/>
    <circle cx="180" cy="150" r="4" fill="url(#ceVertex)" stroke="#1a3a6b" stroke-width="1"/>
    <circle cx="80" cy="65" r="4" fill="url(#ceVertex)" stroke="#1a3a6b" stroke-width="1"/>
    <circle cx="180" cy="65" r="4" fill="url(#ceVertex)" stroke="#1a3a6b" stroke-width="1"/>
    <circle cx="130" cy="38" r="4" fill="url(#ceVertex)" stroke="#4a7ec8" stroke-width="1"/>
    <circle cx="230" cy="38" r="4" fill="url(#ceVertex)" stroke="#4a7ec8" stroke-width="1"/>
    <circle cx="230" cy="123" r="4" fill="url(#ceVertex)" stroke="#4a7ec8" stroke-width="1"/>
    <circle cx="130" cy="123" r="4" fill="#c0c8d5" stroke="#8a9bb5" stroke-width="1"/>
  </g>

  <!-- Legend -->
  <rect x="275" y="42" width="110" height="55" rx="6" fill="rgba(26,58,107,0.04)" stroke="#d0daea" stroke-width="1"/>
  <text x="290" y="58" font-size="10" fill="#1a3a6b" font-weight="600">Legend:</text>
  <line x1="290" y1="70" x2="315" y2="70" stroke="#1a3a6b" stroke-width="3"/>
  <text x="320" y="74" font-size="9" fill="#1a3a6b">Visible edges</text>
  <line x1="290" y1="86" x2="315" y2="86" stroke="#8a9bb5" stroke-width="2" stroke-dasharray="5,4"/>
  <text x="320" y="90" font-size="9" fill="#8a9bb5">Hidden edges</text>

  <!-- Question box -->
  <rect x="275" y="110" width="110" height="55" rx="6" fill="rgba(220,38,38,0.06)" stroke="#dc2626" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="330" y="132" text-anchor="middle" font-size="13" fill="#5a7090" font-weight="600">Edges =</text>
  <text x="330" y="155" text-anchor="middle" font-size="28" font-weight="700" fill="#dc2626">?</text>

  <!-- Hint -->
  <text x="330" y="185" text-anchor="middle" font-size="9" fill="#c8960a" font-weight="600">Count all 3D edges</text>
  <text x="330" y="196" text-anchor="middle" font-size="8" fill="#8a9ab5">(visible + hidden)</text>
</svg>