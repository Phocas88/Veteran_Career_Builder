<svg xmlns="http://www.w3.org/2000/svg" width="400" height="200" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="cpTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6a9ee0"/>
      <stop offset="100%" stop-color="#5b8dd9"/>
    </linearGradient>
    <linearGradient id="cpLeft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3a6aaa"/>
      <stop offset="100%" stop-color="#3d6fb5"/>
    </linearGradient>
    <linearGradient id="cpRight" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#4878c0"/>
      <stop offset="100%" stop-color="#4a7ec8"/>
    </linearGradient>
    <filter id="cpShadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="2" stdDeviation="2.5" flood-color="#1a3a6b" flood-opacity="0.2"/>
    </filter>
  </defs>
  <style>
    @keyframes wobble {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(1.2deg); }
      75% { transform: rotate(-1.2deg); }
    }
    .cube-group { animation: wobble 4s ease-in-out infinite; transform-origin: 155px 105px; }
    text { font-family: Arial, sans-serif; }
  </style>
  <!-- Background with grid -->
  <rect width="400" height="200" rx="10" fill="#f0f4fa" stroke="#d0daea" stroke-width="2"/>
  <g stroke="#d8dfe8" stroke-width="0.3">
    <line x1="0" y1="20" x2="400" y2="20"/><line x1="0" y1="40" x2="400" y2="40"/>
    <line x1="0" y1="60" x2="400" y2="60"/><line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="100" x2="400" y2="100"/><line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="140" x2="400" y2="140"/><line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="0" y1="180" x2="400" y2="180"/>
    <line x1="20" y1="0" x2="20" y2="200"/><line x1="40" y1="0" x2="40" y2="200"/>
    <line x1="60" y1="0" x2="60" y2="200"/><line x1="80" y1="0" x2="80" y2="200"/>
    <line x1="100" y1="0" x2="100" y2="200"/><line x1="120" y1="0" x2="120" y2="200"/>
    <line x1="140" y1="0" x2="140" y2="200"/><line x1="160" y1="0" x2="160" y2="200"/>
    <line x1="180" y1="0" x2="180" y2="200"/><line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="220" y1="0" x2="220" y2="200"/><line x1="240" y1="0" x2="240" y2="200"/>
    <line x1="260" y1="0" x2="260" y2="200"/><line x1="280" y1="0" x2="280" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/><line x1="320" y1="0" x2="320" y2="200"/>
    <line x1="340" y1="0" x2="340" y2="200"/><line x1="360" y1="0" x2="360" y2="200"/>
    <line x1="380" y1="0" x2="380" y2="200"/>
  </g>

  <!-- Title -->
  <text x="200" y="18" text-anchor="middle" font-size="11" fill="#5a7090" font-weight="600">Painted Cube -- How Many Small Cubes Have 2 Blue Faces?</text>

  <!-- Isometric 3x3x3 Cube -->
  <g class="cube-group" filter="url(#cpShadow)">
    <!-- Top face -->
    <polygon points="155,28 245,58 155,88 65,58" fill="url(#cpTop)" stroke="#1a3a6b" stroke-width="1.5"/>
    <!-- Top face grid lines -->
    <line x1="95" y1="48" x2="185" y2="78" stroke="#1a3a6b" stroke-width="0.7" opacity="0.4"/>
    <line x1="125" y1="38" x2="215" y2="68" stroke="#1a3a6b" stroke-width="0.7" opacity="0.4"/>
    <line x1="125" y1="78" x2="215" y2="48" stroke="#1a3a6b" stroke-width="0.7" opacity="0.4"/>
    <line x1="95" y1="68" x2="185" y2="38" stroke="#1a3a6b" stroke-width="0.7" opacity="0.4"/>

    <!-- Left face -->
    <polygon points="65,58 155,88 155,168 65,138" fill="url(#cpLeft)" stroke="#1a3a6b" stroke-width="1.5"/>
    <!-- Left face grid lines -->
    <line x1="65" y1="84.7" x2="155" y2="114.7" stroke="#1a3a6b" stroke-width="0.7" opacity="0.4"/>
    <line x1="65" y1="111.3" x2="155" y2="141.3" stroke="#1a3a6b" stroke-width="0.7" opacity="0.4"/>
    <line x1="95" y1="67" x2="95" y2="147" stroke="#1a3a6b" stroke-width="0.7" opacity="0.4"/>
    <line x1="125" y1="76" x2="125" y2="156" stroke="#1a3a6b" stroke-width="0.7" opacity="0.4"/>

    <!-- Right face -->
    <polygon points="155,88 245,58 245,138 155,168" fill="url(#cpRight)" stroke="#1a3a6b" stroke-width="1.5"/>
    <!-- Right face grid lines -->
    <line x1="155" y1="114.7" x2="245" y2="84.7" stroke="#1a3a6b" stroke-width="0.7" opacity="0.4"/>
    <line x1="155" y1="141.3" x2="245" y2="111.3" stroke="#1a3a6b" stroke-width="0.7" opacity="0.4"/>
    <line x1="185" y1="76" x2="185" y2="156" stroke="#1a3a6b" stroke-width="0.7" opacity="0.4"/>
    <line x1="215" y1="67" x2="215" y2="147" stroke="#1a3a6b" stroke-width="0.7" opacity="0.4"/>

    <!-- Edge ? markers (cubes with exactly 2 painted faces) -->
    <text x="125" y="52" text-anchor="middle" font-size="10" font-weight="700" fill="#dc2626">?</text>
    <text x="185" y="52" text-anchor="middle" font-size="10" font-weight="700" fill="#dc2626">?</text>
    <text x="100" y="74" text-anchor="middle" font-size="10" font-weight="700" fill="#dc2626">?</text>
    <text x="210" y="74" text-anchor="middle" font-size="10" font-weight="700" fill="#dc2626">?</text>
    <text x="73" y="100" text-anchor="middle" font-size="10" font-weight="700" fill="#dc2626">?</text>
    <text x="148" y="132" text-anchor="middle" font-size="10" font-weight="700" fill="#dc2626">?</text>
    <text x="237" y="100" text-anchor="middle" font-size="10" font-weight="700" fill="#dc2626">?</text>
    <text x="163" y="132" text-anchor="middle" font-size="10" font-weight="700" fill="#dc2626">?</text>
    <text x="100" y="155" text-anchor="middle" font-size="10" font-weight="700" fill="#dc2626">?</text>
    <text x="210" y="155" text-anchor="middle" font-size="10" font-weight="700" fill="#dc2626">?</text>
  </g>

  <!-- Info labels -->
  <rect x="280" y="38" width="105" height="50" rx="6" fill="rgba(26,58,107,0.05)" stroke="#1a3a6b" stroke-width="1"/>
  <text x="332" y="55" text-anchor="middle" font-size="12" fill="#1a3a6b" font-weight="700">3 x 3 x 3</text>
  <text x="332" y="70" text-anchor="middle" font-size="10" fill="#5a7090">All sides painted blue</text>
  <text x="332" y="82" text-anchor="middle" font-size="10" fill="#5a7090">Cut into 27 cubes</text>

  <!-- Question box -->
  <rect x="280" y="100" width="105" height="45" rx="6" fill="rgba(220,38,38,0.06)" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="332" y="118" text-anchor="middle" font-size="10" fill="#dc2626" font-weight="600">2 blue faces</text>
  <text x="332" y="138" text-anchor="middle" font-size="18" font-weight="700" fill="#dc2626">= ?</text>

  <!-- Legend -->
  <text x="332" y="168" text-anchor="middle" font-size="9" fill="#c8960a" font-weight="600">? = edge cubes</text>

  <!-- Bottom note -->
  <text x="200" y="192" text-anchor="middle" font-size="9" fill="#8a9ab5">Count the cubes that sit on an edge (not corner, not face)</text>
</svg>