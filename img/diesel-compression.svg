<svg xmlns="http://www.w3.org/2000/svg" width="400" height="180" viewBox="0 0 400 180">
  <defs>
    <linearGradient id="dcWall" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8a9ab5"/>
      <stop offset="30%" stop-color="#b0bdd0"/>
      <stop offset="70%" stop-color="#c8d4e2"/>
      <stop offset="100%" stop-color="#7a8da5"/>
    </linearGradient>
    <linearGradient id="dcPiston" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c0cce0"/>
      <stop offset="100%" stop-color="#8a9ab5"/>
    </linearGradient>
    <linearGradient id="dcRod" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9aacbf"/>
      <stop offset="50%" stop-color="#c8d4e0"/>
      <stop offset="100%" stop-color="#8a9ab0"/>
    </linearGradient>
    <radialGradient id="dcHeat" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6b00" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#ff9500" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffcc00" stop-opacity="0.05"/>
    </radialGradient>
    <filter id="dcSh" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="1" stdDeviation="1.5" flood-color="#1a3a6b" flood-opacity="0.15"/>
    </filter>
  </defs>
  <style>
    @keyframes pistonUp {
      0% { transform: translateY(0); }
      50% { transform: translateY(-28px); }
      100% { transform: translateY(0); }
    }
    @keyframes heatPulse {
      0% { opacity: 0.15; }
      50% { opacity: 0.55; }
      100% { opacity: 0.15; }
    }
    .piston-group { animation: pistonUp 2.5s ease-in-out infinite; }
    .heat-glow { animation: heatPulse 2.5s ease-in-out infinite; }
    text { font-family: Arial, sans-serif; }
  </style>
  <!-- Background with grid -->
  <rect width="400" height="180" rx="10" fill="#f0f4fa" stroke="#d0daea" stroke-width="2"/>
  <g stroke="#d8dfe8" stroke-width="0.3">
    <line x1="0" y1="20" x2="400" y2="20"/><line x1="0" y1="40" x2="400" y2="40"/>
    <line x1="0" y1="60" x2="400" y2="60"/><line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="100" x2="400" y2="100"/><line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="140" x2="400" y2="140"/><line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="20" y1="0" x2="20" y2="180"/><line x1="40" y1="0" x2="40" y2="180"/>
    <line x1="60" y1="0" x2="60" y2="180"/><line x1="80" y1="0" x2="80" y2="180"/>
    <line x1="100" y1="0" x2="100" y2="180"/><line x1="120" y1="0" x2="120" y2="180"/>
    <line x1="140" y1="0" x2="140" y2="180"/><line x1="160" y1="0" x2="160" y2="180"/>
    <line x1="180" y1="0" x2="180" y2="180"/><line x1="200" y1="0" x2="200" y2="180"/>
    <line x1="220" y1="0" x2="220" y2="180"/><line x1="240" y1="0" x2="240" y2="180"/>
    <line x1="260" y1="0" x2="260" y2="180"/><line x1="280" y1="0" x2="280" y2="180"/>
    <line x1="300" y1="0" x2="300" y2="180"/><line x1="320" y1="0" x2="320" y2="180"/>
    <line x1="340" y1="0" x2="340" y2="180"/><line x1="360" y1="0" x2="360" y2="180"/>
    <line x1="380" y1="0" x2="380" y2="180"/>
  </g>

  <!-- Cylinder assembly -->
  <g filter="url(#dcSh)">
    <!-- Left wall -->
    <rect x="115" y="18" width="10" height="125" fill="url(#dcWall)" stroke="#1a3a6b" stroke-width="1.5"/>
    <!-- Right wall -->
    <rect x="205" y="18" width="10" height="125" fill="url(#dcWall)" stroke="#1a3a6b" stroke-width="1.5"/>
    <!-- Cylinder head (top) -->
    <rect x="113" y="14" width="104" height="10" rx="2" fill="url(#dcWall)" stroke="#1a3a6b" stroke-width="1.5"/>
    <!-- Head bolts -->
    <circle cx="120" cy="19" r="2.5" fill="#5a7090" stroke="#1a3a6b" stroke-width="0.8"/>
    <circle cx="210" cy="19" r="2.5" fill="#5a7090" stroke="#1a3a6b" stroke-width="0.8"/>
  </g>

  <!-- Heat glow in compression chamber -->
  <rect x="125" y="24" width="80" height="35" fill="url(#dcHeat)" class="heat-glow"/>
  <!-- Heat wavy lines -->
  <path d="M140,32 Q145,28 150,32 Q155,36 160,32" fill="none" stroke="#c8960a" stroke-width="1" opacity="0.4" stroke-dasharray="2,2"/>
  <path d="M170,38 Q175,34 180,38 Q185,42 190,38" fill="none" stroke="#c8960a" stroke-width="1" opacity="0.4" stroke-dasharray="2,2"/>
  <path d="M145,45 Q150,41 155,45 Q160,49 165,45" fill="none" stroke="#c8960a" stroke-width="1" opacity="0.4" stroke-dasharray="2,2"/>

  <!-- Fuel injector at top -->
  <g filter="url(#dcSh)">
    <rect x="157" y="5" width="16" height="14" rx="2" fill="#1a3a6b" stroke="#0a2a4b" stroke-width="1"/>
    <rect x="160" y="2" width="10" height="5" rx="1" fill="#5a7090"/>
  </g>
  <!-- Fuel spray lines -->
  <line x1="165" y1="19" x2="165" y2="32" stroke="#c8960a" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="165" y1="32" x2="155" y2="42" stroke="#c8960a" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="165" y1="32" x2="175" y2="42" stroke="#c8960a" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- Piston (animated upward) -->
  <g class="piston-group">
    <!-- Piston head -->
    <rect x="126" y="62" width="78" height="18" rx="2" fill="url(#dcPiston)" stroke="#1a3a6b" stroke-width="1.8"/>
    <!-- Piston rings -->
    <line x1="126" y1="66" x2="204" y2="66" stroke="#5a7090" stroke-width="1"/>
    <line x1="126" y1="72" x2="204" y2="72" stroke="#5a7090" stroke-width="1"/>
    <!-- Piston rod -->
    <rect x="158" y="80" width="14" height="38" rx="2" fill="url(#dcRod)" stroke="#1a3a6b" stroke-width="1.5"/>
    <!-- Connecting rod pin -->
    <circle cx="165" cy="120" r="5" fill="#b0bdd0" stroke="#1a3a6b" stroke-width="1.5"/>
    <circle cx="165" cy="120" r="2" fill="#1a3a6b"/>
  </g>

  <!-- Labels: Fuel injection -->
  <line x1="175" y1="10" x2="235" y2="10" stroke="#c8960a" stroke-width="1"/>
  <text x="238" y="14" font-size="10" font-weight="600" fill="#c8960a">Fuel injection</text>

  <!-- Label: Compressed air -->
  <line x1="215" y1="40" x2="245" y2="40" stroke="#1a3a6b" stroke-width="1"/>
  <text x="248" y="44" font-size="10" font-weight="600" fill="#1a3a6b">Compressed air</text>

  <!-- Label: Piston -->
  <line x1="215" y1="71" x2="245" y2="71" stroke="#1a3a6b" stroke-width="1"/>
  <text x="248" y="75" font-size="10" font-weight="600" fill="#1a3a6b">Piston</text>

  <!-- Question label -->
  <rect x="14" y="40" width="80" height="45" rx="5" fill="#fff5f5" stroke="#dc2626" stroke-width="1.5" opacity="0.9"/>
  <text x="54" y="56" text-anchor="middle" font-size="16" font-weight="800" fill="#dc2626">?</text>
  <text x="54" y="69" text-anchor="middle" font-size="9" font-weight="600" fill="#dc2626">ignites</text>
  <text x="54" y="80" text-anchor="middle" font-size="9" font-weight="600" fill="#dc2626">fuel</text>

  <!-- Title -->
  <text x="200" y="165" text-anchor="middle" font-size="11" font-weight="600" fill="#5a7090">Diesel Engine -- What Ignites the Fuel?</text>
</svg>