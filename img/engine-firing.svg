<svg xmlns="http://www.w3.org/2000/svg" width="400" height="180" viewBox="0 0 400 180">
  <defs>
    <linearGradient id="blockG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8ced8"/>
      <stop offset="100%" stop-color="#a0a8b8"/>
    </linearGradient>
    <linearGradient id="cylG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e2e6ee"/>
      <stop offset="50%" stop-color="#f0f2f6"/>
      <stop offset="100%" stop-color="#d8dce6"/>
    </linearGradient>
    <linearGradient id="pistonG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8894a8"/>
      <stop offset="100%" stop-color="#6a7690"/>
    </linearGradient>
    <filter id="es" x="-2%" y="-2%" width="106%" height="106%">
      <feDropShadow dx="1" dy="1" stdDeviation="1" flood-color="#1a3a6b" flood-opacity="0.15"/>
    </filter>
  </defs>
  <style>
    text { font-family: Arial, sans-serif; }
  </style>
  <!-- Background with grid -->
  <rect width="400" height="180" rx="10" fill="#f0f4fa" stroke="#d0daea" stroke-width="2"/>
  <g stroke="#d8dfe8" stroke-width="0.3">
    <line x1="0" y1="20" x2="400" y2="20"/><line x1="0" y1="40" x2="400" y2="40"/>
    <line x1="0" y1="60" x2="400" y2="60"/><line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="100" x2="400" y2="100"/><line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="140" x2="400" y2="140"/><line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="40" y1="0" x2="40" y2="180"/><line x1="80" y1="0" x2="80" y2="180"/>
    <line x1="120" y1="0" x2="120" y2="180"/><line x1="160" y1="0" x2="160" y2="180"/>
    <line x1="200" y1="0" x2="200" y2="180"/><line x1="240" y1="0" x2="240" y2="180"/>
    <line x1="280" y1="0" x2="280" y2="180"/><line x1="320" y1="0" x2="320" y2="180"/>
    <line x1="360" y1="0" x2="360" y2="180"/>
  </g>

  <!-- Engine block outline -->
  <g filter="url(#es)">
    <rect x="42" y="22" width="316" height="95" rx="5" fill="url(#blockG)" stroke="#1a3a6b" stroke-width="2"/>
    <!-- Block detail lines (head bolts) -->
    <line x1="42" y1="30" x2="358" y2="30" stroke="#8a96aa" stroke-width="0.6"/>
    <!-- Crankcase bottom -->
    <rect x="50" y="110" width="300" height="12" rx="2" fill="#b0b8c8" stroke="#1a3a6b" stroke-width="1.2"/>
  </g>

  <!-- Cylinder 1 -->
  <g>
    <rect x="56" y="32" width="60" height="78" rx="2" fill="#e8940a" opacity="0.85" stroke="#e8940a" stroke-width="2.5"/>
    <!-- Cylinder wall thickness -->
    <rect x="58" y="34" width="56" height="74" rx="1" fill="none" stroke="#9aa4b6" stroke-width="0.5"/>
    <!-- Piston -->
    <rect x="60" y="82" width="48" height="10" rx="2" fill="url(#pistonG)" stroke="#5a6a82" stroke-width="1"/>
    <!-- Connecting rod hint -->
    <line x1="84" y1="92" x2="84" y2="108" stroke="#5a6a82" stroke-width="2.5"/>
    <circle cx="84" cy="108" r="3" fill="none" stroke="#5a6a82" stroke-width="1.2"/>
    <!-- Spark plug -->
    <rect x="80" y="26" width="8" height="10" rx="1" fill="#e8e0c8" stroke="#1a3a6b" stroke-width="1"/>
    <line x1="84" y1="36" x2="84" y2="40" stroke="#c8960a" stroke-width="1.5"/>
    <text x="84" y="22" text-anchor="middle" font-size="9" font-weight="700" fill="#c8960a">1st</text>
    <text x="84" y="72" text-anchor="middle" font-size="20" font-weight="700" fill="#1a3a6b">1</text>
  </g>

  <!-- Cylinder 2 -->
  <g>
    <rect x="122" y="32" width="60" height="78" rx="2" fill="#e2e6ee" stroke="#1a3a6b" stroke-width="1.5"/>
    <rect x="124" y="34" width="56" height="74" rx="1" fill="none" stroke="#9aa4b6" stroke-width="0.5"/>
    <rect x="126" y="82" width="48" height="10" rx="2" fill="url(#pistonG)" stroke="#5a6a82" stroke-width="1"/>
    <line x1="150" y1="92" x2="150" y2="108" stroke="#5a6a82" stroke-width="2.5"/>
    <circle cx="150" cy="108" r="3" fill="none" stroke="#5a6a82" stroke-width="1.2"/>
    <rect x="146" y="26" width="8" height="10" rx="1" fill="#e8e0c8" stroke="#1a3a6b" stroke-width="1"/>
    <line x1="150" y1="36" x2="150" y2="40" stroke="#c8960a" stroke-width="1.5"/>
    <text x="150" y="22" text-anchor="middle" font-size="9" font-weight="700" fill="#c8960a">4th</text>
    <text x="150" y="72" text-anchor="middle" font-size="20" font-weight="700" fill="#1a3a6b">2</text>
  </g>

  <!-- Cylinder 3 -->
  <g>
    <rect x="188" y="32" width="60" height="78" rx="2" fill="#e2e6ee" stroke="#1a3a6b" stroke-width="1.5"/>
    <rect x="190" y="34" width="56" height="74" rx="1" fill="none" stroke="#9aa4b6" stroke-width="0.5"/>
    <rect x="192" y="82" width="48" height="10" rx="2" fill="url(#pistonG)" stroke="#5a6a82" stroke-width="1"/>
    <line x1="216" y1="92" x2="216" y2="108" stroke="#5a6a82" stroke-width="2.5"/>
    <circle cx="216" cy="108" r="3" fill="none" stroke="#5a6a82" stroke-width="1.2"/>
    <rect x="212" y="26" width="8" height="10" rx="1" fill="#e8e0c8" stroke="#1a3a6b" stroke-width="1"/>
    <line x1="216" y1="36" x2="216" y2="40" stroke="#c8960a" stroke-width="1.5"/>
    <text x="216" y="22" text-anchor="middle" font-size="9" font-weight="700" fill="#c8960a">2nd</text>
    <text x="216" y="72" text-anchor="middle" font-size="20" font-weight="700" fill="#1a3a6b">3</text>
  </g>

  <!-- Cylinder 4 -->
  <g>
    <rect x="254" y="32" width="60" height="78" rx="2" fill="#e2e6ee" stroke="#1a3a6b" stroke-width="1.5"/>
    <rect x="256" y="34" width="56" height="74" rx="1" fill="none" stroke="#9aa4b6" stroke-width="0.5"/>
    <rect x="258" y="82" width="48" height="10" rx="2" fill="url(#pistonG)" stroke="#5a6a82" stroke-width="1"/>
    <line x1="282" y1="92" x2="282" y2="108" stroke="#5a6a82" stroke-width="2.5"/>
    <circle cx="282" cy="108" r="3" fill="none" stroke="#5a6a82" stroke-width="1.2"/>
    <rect x="278" y="26" width="8" height="10" rx="1" fill="#e8e0c8" stroke="#1a3a6b" stroke-width="1"/>
    <line x1="282" y1="36" x2="282" y2="40" stroke="#c8960a" stroke-width="1.5"/>
    <text x="282" y="22" text-anchor="middle" font-size="9" font-weight="700" fill="#c8960a">3rd</text>
    <text x="282" y="72" text-anchor="middle" font-size="20" font-weight="700" fill="#1a3a6b">4</text>
  </g>

  <!-- Divider lines between cylinders -->
  <line x1="120" y1="32" x2="120" y2="110" stroke="#1a3a6b" stroke-width="1.5"/>
  <line x1="186" y1="32" x2="186" y2="110" stroke="#1a3a6b" stroke-width="1.5"/>
  <line x1="252" y1="32" x2="252" y2="110" stroke="#1a3a6b" stroke-width="1.5"/>

  <!-- Firing order -->
  <text x="200" y="140" text-anchor="middle" font-size="14" font-weight="700" fill="#c8960a">Firing Order: 1 &#x2192; 3 &#x2192; 4 &#x2192; 2</text>

  <!-- Title -->
  <text x="200" y="168" text-anchor="middle" font-size="11" font-weight="600" fill="#5a7090">4-Cylinder Engine -- Firing Order Sequence</text>
</svg>