  <!-- Labels -->
  <text x="110" y="178" text-anchor="middle" font-size="14" font-weight="700" fill="#1a3a6b">GEAR A</text>
  <text x="110" y="193" text-anchor="middle" font-size="11" fill="#5a7090">20 teeth · 80 RPM ↻</text>
  <text x="270" y="185" text-anchor="middle" font-size="14" font-weight="700" fill="#1a3a6b">GEAR B</text>
  <text x="270" y="198" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">40 teeth · ? RPM · ?</text>

  <!-- Mesh indicator -->
  <line x1="150" y1="100" x2="210" y2="100" stroke="#c8960a" stroke-width="1.5" stroke-dasharray="4"/>
  <text x="180" y="93" text-anchor="middle" font-size="9" fill="#c8960a" font-weight="600">meshed</text>
</svg>