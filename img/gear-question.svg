<svg xmlns="http://www.w3.org/2000/svg" width="400" height="200" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="gearAFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d8dce5"/>
      <stop offset="100%" stop-color="#c0c8d5"/>
    </linearGradient>
    <linearGradient id="gearBFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#cdd3df"/>
      <stop offset="100%" stop-color="#b5bfcf"/>
    </linearGradient>
    <filter id="gShadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="1" stdDeviation="1.5" flood-color="#1a3a6b" flood-opacity="0.15"/>
    </filter>
    <marker id="meshArr" viewBox="0 0 8 8" refX="4" refY="4" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,1 L7,4 L0,7 Z" fill="#c8960a"/>
    </marker>
  </defs>
  <style>
    @keyframes rotateCW { to { transform: rotate(360deg); } }
    .gear-a { animation: rotateCW 4s linear infinite; transform-origin: 105px 90px; }
    text { font-family: Arial, sans-serif; }
  </style>
  <!-- Background with grid -->
  <rect width="400" height="200" rx="10" fill="#f0f4fa" stroke="#d0daea" stroke-width="2"/>
  <g stroke="#d8dfe8" stroke-width="0.3">
    <line x1="0" y1="20" x2="400" y2="20"/><line x1="0" y1="40" x2="400" y2="40"/>
    <line x1="0" y1="60" x2="400" y2="60"/><line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="100" x2="400" y2="100"/><line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="140" x2="400" y2="140"/><line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="0" y1="180" x2="400" y2="180"/>
    <line x1="20" y1="0" x2="20" y2="200"/><line x1="40" y1="0" x2="40" y2="200"/>
    <line x1="60" y1="0" x2="60" y2="200"/><line x1="80" y1="0" x2="80" y2="200"/>
    <line x1="100" y1="0" x2="100" y2="200"/><line x1="120" y1="0" x2="120" y2="200"/>
    <line x1="140" y1="0" x2="140" y2="200"/><line x1="160" y1="0" x2="160" y2="200"/>
    <line x1="180" y1="0" x2="180" y2="200"/><line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="220" y1="0" x2="220" y2="200"/><line x1="240" y1="0" x2="240" y2="200"/>
    <line x1="260" y1="0" x2="260" y2="200"/><line x1="280" y1="0" x2="280" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/><line x1="320" y1="0" x2="320" y2="200"/>
    <line x1="340" y1="0" x2="340" y2="200"/><line x1="360" y1="0" x2="360" y2="200"/>
    <line x1="380" y1="0" x2="380" y2="200"/>
  </g>

  <!-- GEAR A: 20 teeth, center 105,90, outer R=44, root R=36 -->
  <g class="gear-a" filter="url(#gShadow)">
    <!-- Gear body with teeth - 20 teeth, each 18 degrees -->
    <path d="
      M149,90 L148.2,83.8 L143.2,79 L147.8,75.2 L146,69.4 L140,67.8 L142.6,62.4
      L136.2,62.6 L136.8,56.8 L130.6,58.8 L129.2,53.2 L123.6,57 L120.4,52.2
      L115.8,57.4 L111,53.8 L108,59.8 L102,57.4 L101,63.4 L94.8,63 L95.8,69
      L90,70.6 L93,76.2 L87.8,79.6 L92.4,84 L88.8,88.6 L94.2,91.4 L92.2,96.6
      L98,97.4 L97.8,103 L103.6,101.8 L105.4,107.4 L110.6,104 L114,109 L118.2,104.4
      L122.8,108.2 L125.4,102.6 L131,105.2 L131.8,99.2 L137.6,100 L136.4,94
      L142.2,92.8 L139.4,87.6 L144.8,84.6 Z
    " fill="url(#gearAFill)" stroke="#1a3a6b" stroke-width="1.8"/>
    <!-- Outer ring -->
    <circle cx="105" cy="90" r="34" fill="none" stroke="#8a9ab5" stroke-width="0.8" stroke-dasharray="2,3"/>
    <!-- Lightening holes (4) -->
    <circle cx="105" cy="72" r="5" fill="#e8ecf2" stroke="#9aa8bf" stroke-width="0.8"/>
    <circle cx="123" cy="90" r="5" fill="#e8ecf2" stroke="#9aa8bf" stroke-width="0.8"/>
    <circle cx="105" cy="108" r="5" fill="#e8ecf2" stroke="#9aa8bf" stroke-width="0.8"/>
    <circle cx="87" cy="90" r="5" fill="#e8ecf2" stroke="#9aa8bf" stroke-width="0.8"/>
    <!-- Hub -->
    <circle cx="105" cy="90" r="11" fill="#e0e4ec" stroke="#1a3a6b" stroke-width="1.8"/>
    <!-- Keyway -->
    <rect x="103" y="80" width="4" height="10" fill="#1a3a6b" rx="0.5"/>
    <!-- Center bore -->
    <circle cx="105" cy="90" r="4" fill="#1a3a6b"/>
  </g>

  <!-- GEAR B: 40 teeth, center 268,90, outer R=66, root R=56 -->
  <g filter="url(#gShadow)">
    <path d="
      M334,90 L333.4,85.2 L331.6,80.6 L334,76.4 L330.8,72.4 L332.2,68 L328,65
      L328.2,60.4 L323.4,58.6 L322.2,54.2 L317.2,54 L314.4,50 L309.4,51.4
      L305.4,48.2 L300.8,51 L296,49 L292,52.8 L287,52 L284,56.6 L279,57.2
      L277.2,62.2 L272.4,64.2 L272,69.4 L268,72.4 L269,77.6 L266,81.4 L268.4,86.2
      L266.6,90.6 L269.8,94.6 L268.4,99 L272.4,101.8 L272.4,106.4 L277,108.6
      L278.4,113 L283.2,113.6 L285.8,117.4 L290.8,116.4 L294.4,119.4 L299,117
      L303.4,119 L307.2,115.4 L312,116.2 L314.8,112 L319.6,111.4 L321.2,106.8
      L325.8,104.8 L325.8,99.8 L330,97 L328.6,92 Z
    " fill="url(#gearBFill)" stroke="#1a3a6b" stroke-width="1.8"/>
    <circle cx="268" cy="90" r="48" fill="none" stroke="#8a9ab5" stroke-width="0.8" stroke-dasharray="2,3"/>
    <!-- Lightening holes (6) -->
    <circle cx="268" cy="64" r="6.5" fill="#dde2eb" stroke="#9aa8bf" stroke-width="0.8"/>
    <circle cx="290" cy="77" r="6.5" fill="#dde2eb" stroke="#9aa8bf" stroke-width="0.8"/>
    <circle cx="290" cy="103" r="6.5" fill="#dde2eb" stroke="#9aa8bf" stroke-width="0.8"/>
    <circle cx="268" cy="116" r="6.5" fill="#dde2eb" stroke="#9aa8bf" stroke-width="0.8"/>
    <circle cx="246" cy="103" r="6.5" fill="#dde2eb" stroke="#9aa8bf" stroke-width="0.8"/>
    <circle cx="246" cy="77" r="6.5" fill="#dde2eb" stroke="#9aa8bf" stroke-width="0.8"/>
    <!-- Hub -->
    <circle cx="268" cy="90" r="14" fill="#d4d9e4" stroke="#1a3a6b" stroke-width="1.8"/>
    <rect x="266" y="77" width="4" height="13" fill="#1a3a6b" rx="0.5"/>
    <circle cx="268" cy="90" r="5.5" fill="#1a3a6b"/>
  </g>

  <!-- Mesh point indicator -->
  <line x1="148" y1="82" x2="204" y2="82" stroke="#c8960a" stroke-width="1.2" stroke-dasharray="3,2"/>
  <line x1="148" y1="98" x2="204" y2="98" stroke="#c8960a" stroke-width="1.2" stroke-dasharray="3,2"/>
  <line x1="170" y1="78" x2="170" y2="90" stroke="#c8960a" stroke-width="1.5" marker-end="url(#meshArr)"/>
  <line x1="185" y1="102" x2="185" y2="90" stroke="#c8960a" stroke-width="1.5" marker-end="url(#meshArr)"/>
  <text x="177" y="76" text-anchor="middle" font-size="7.5" fill="#c8960a" font-weight="600">MESH</text>

  <!-- Labels -->
  <text x="105" y="170" text-anchor="middle" font-size="12" font-weight="700" fill="#1a3a6b">GEAR A</text>
  <text x="105" y="183" text-anchor="middle" font-size="9.5" fill="#5a7090">20 TEETH</text>
  <text x="105" y="195" text-anchor="middle" font-size="9.5" font-weight="600" fill="#1a3a6b">80 RPM &#x21bb;</text>

  <text x="268" y="170" text-anchor="middle" font-size="12" font-weight="700" fill="#1a3a6b">GEAR B</text>
  <text x="268" y="183" text-anchor="middle" font-size="9.5" fill="#5a7090">40 TEETH</text>
  <text x="268" y="195" text-anchor="middle" font-size="11" font-weight="700" fill="#dc2626">? RPM  ?</text>
</svg>