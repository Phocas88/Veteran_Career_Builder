<svg xmlns="http://www.w3.org/2000/svg" width="400" height="180" viewBox="0 0 400 180">
  <defs>
    <linearGradient id="gsF" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d8dce5"/>
      <stop offset="100%" stop-color="#c0c8d5"/>
    </linearGradient>
    <linearGradient id="glF" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#cdd3df"/>
      <stop offset="100%" stop-color="#b5bfcf"/>
    </linearGradient>
    <filter id="gs" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="1" stdDeviation="1.5" flood-color="#1a3a6b" flood-opacity="0.15"/>
    </filter>
    <marker id="ma" viewBox="0 0 8 8" refX="4" refY="4" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,1 L7,4 L0,7 Z" fill="#c8960a"/>
    </marker>
  </defs>
  <style>
    @keyframes rotateCW { to { transform: rotate(360deg); } }
    .gear-small { animation: rotateCW 3s linear infinite; transform-origin: 120px 78px; }
    text { font-family: Arial, sans-serif; }
  </style>
  <!-- Background with grid -->
  <rect width="400" height="180" rx="10" fill="#f0f4fa" stroke="#d0daea" stroke-width="2"/>
  <g stroke="#d8dfe8" stroke-width="0.3">
    <line x1="0" y1="20" x2="400" y2="20"/><line x1="0" y1="40" x2="400" y2="40"/>
    <line x1="0" y1="60" x2="400" y2="60"/><line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="100" x2="400" y2="100"/><line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="140" x2="400" y2="140"/><line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="20" y1="0" x2="20" y2="180"/><line x1="40" y1="0" x2="40" y2="180"/>
    <line x1="60" y1="0" x2="60" y2="180"/><line x1="80" y1="0" x2="80" y2="180"/>
    <line x1="100" y1="0" x2="100" y2="180"/><line x1="120" y1="0" x2="120" y2="180"/>
    <line x1="140" y1="0" x2="140" y2="180"/><line x1="160" y1="0" x2="160" y2="180"/>
    <line x1="180" y1="0" x2="180" y2="180"/><line x1="200" y1="0" x2="200" y2="180"/>
    <line x1="220" y1="0" x2="220" y2="180"/><line x1="240" y1="0" x2="240" y2="180"/>
    <line x1="260" y1="0" x2="260" y2="180"/><line x1="280" y1="0" x2="280" y2="180"/>
    <line x1="300" y1="0" x2="300" y2="180"/><line x1="320" y1="0" x2="320" y2="180"/>
    <line x1="340" y1="0" x2="340" y2="180"/><line x1="360" y1="0" x2="360" y2="180"/>
    <line x1="380" y1="0" x2="380" y2="180"/>
  </g>

  <!-- Title -->
  <text x="200" y="16" text-anchor="middle" font-size="11" font-weight="600" fill="#5a7090">Gear Ratio -- Find the Speed</text>

  <!-- SMALL GEAR: 12 teeth, center 120,78, body radius 32 -->
  <g class="gear-small" filter="url(#gs)">
    <!-- Teeth as rectangles rotated around center -->
    <rect x="116.5" y="40" width="7" height="10" rx="1" fill="url(#gsF)" stroke="#1a3a6b" stroke-width="1.5" transform="rotate(0,120,78)"/>
    <rect x="116.5" y="40" width="7" height="10" rx="1" fill="url(#gsF)" stroke="#1a3a6b" stroke-width="1.5" transform="rotate(30,120,78)"/>
    <rect x="116.5" y="40" width="7" height="10" rx="1" fill="url(#gsF)" stroke="#1a3a6b" stroke-width="1.5" transform="rotate(60,120,78)"/>
    <rect x="116.5" y="40" width="7" height="10" rx="1" fill="url(#gsF)" stroke="#1a3a6b" stroke-width="1.5" transform="rotate(90,120,78)"/>
    <rect x="116.5" y="40" width="7" height="10" rx="1" fill="url(#gsF)" stroke="#1a3a6b" stroke-width="1.5" transform="rotate(120,120,78)"/>
    <rect x="116.5" y="40" width="7" height="10" rx="1" fill="url(#gsF)" stroke="#1a3a6b" stroke-width="1.5" transform="rotate(150,120,78)"/>
    <rect x="116.5" y="40" width="7" height="10" rx="1" fill="url(#gsF)" stroke="#1a3a6b" stroke-width="1.5" transform="rotate(180,120,78)"/>
    <rect x="116.5" y="40" width="7" height="10" rx="1" fill="url(#gsF)" stroke="#1a3a6b" stroke-width="1.5" transform="rotate(210,120,78)"/>
    <rect x="116.5" y="40" width="7" height="10" rx="1" fill="url(#gsF)" stroke="#1a3a6b" stroke-width="1.5" transform="rotate(240,120,78)"/>
    <rect x="116.5" y="40" width="7" height="10" rx="1" fill="url(#gsF)" stroke="#1a3a6b" stroke-width="1.5" transform="rotate(270,120,78)"/>
    <rect x="116.5" y="40" width="7" height="10" rx="1" fill="url(#gsF)" stroke="#1a3a6b" stroke-width="1.5" transform="rotate(300,120,78)"/>
    <rect x="116.5" y="40" width="7" height="10" rx="1" fill="url(#gsF)" stroke="#1a3a6b" stroke-width="1.5" transform="rotate(330,120,78)"/>
    <!-- Gear body -->
    <circle cx="120" cy="78" r="32" fill="url(#gsF)" stroke="#1a3a6b" stroke-width="2"/>
    <!-- Dashed inner ring -->
    <circle cx="120" cy="78" r="24" fill="none" stroke="#8a9ab5" stroke-width="0.6" stroke-dasharray="2,3"/>
    <!-- Lightening holes -->
    <circle cx="120" cy="62" r="4.5" fill="#e8ecf2" stroke="#9aa8bf" stroke-width="0.7"/>
    <circle cx="136" cy="78" r="4.5" fill="#e8ecf2" stroke="#9aa8bf" stroke-width="0.7"/>
    <circle cx="120" cy="94" r="4.5" fill="#e8ecf2" stroke="#9aa8bf" stroke-width="0.7"/>
    <circle cx="104" cy="78" r="4.5" fill="#e8ecf2" stroke="#9aa8bf" stroke-width="0.7"/>
    <!-- Hub -->
    <circle cx="120" cy="78" r="10" fill="#e0e4ec" stroke="#1a3a6b" stroke-width="1.6"/>
    <rect x="118.5" y="69" width="3" height="9" fill="#1a3a6b" rx="0.4"/>
    <circle cx="120" cy="78" r="3.5" fill="#1a3a6b"/>
  </g>

  <!-- LARGE GEAR: 20 teeth, center 280,78, body radius 55 (STATIC) -->
  <g filter="url(#gs)">
    <!-- Teeth as rectangles rotated around center -->
    <rect x="276" y="17" width="8" height="12" rx="1" fill="url(#glF)" stroke="#1a3a6b" stroke-width="1.5" transform="rotate(0,280,78)"/>
    <rect x="276" y="17" width="8" height="12" rx="1" fill="url(#glF)" stroke="#1a3a6b" stroke-width="1.5" transform="rotate(18,280,78)"/>
    <rect x="276" y="17" width="8" height="12" rx="1" fill="url(#glF)" stroke="#1a3a6b" stroke-width="1.5" transform="rotate(36,280,78)"/>
    <rect x="276" y="17" width="8" height="12" rx="1" fill="url(#glF)" stroke="#1a3a6b" stroke-width="1.5" transform="rotate(54,280,78)"/>
    <rect x="276" y="17" width="8" height="12" rx="1" fill="url(#glF)" stroke="#1a3a6b" stroke-width="1.5" transform="rotate(72,280,78)"/>
    <rect x="276" y="17" width="8" height="12" rx="1" fill="url(#glF)" stroke="#1a3a6b" stroke-width="1.5" transform="rotate(90,280,78)"/>
    <rect x="276" y="17" width="8" height="12" rx="1" fill="url(#glF)" stroke="#1a3a6b" stroke-width="1.5" transform="rotate(108,280,78)"/>
    <rect x="276" y="17" width="8" height="12" rx="1" fill="url(#glF)" stroke="#1a3a6b" stroke-width="1.5" transform="rotate(126,280,78)"/>
    <rect x="276" y="17" width="8" height="12" rx="1" fill="url(#glF)" stroke="#1a3a6b" stroke-width="1.5" transform="rotate(144,280,78)"/>
    <rect x="276" y="17" width="8" height="12" rx="1" fill="url(#glF)" stroke="#1a3a6b" stroke-width="1.5" transform="rotate(162,280,78)"/>
    <rect x="276" y="17" width="8" height="12" rx="1" fill="url(#glF)" stroke="#1a3a6b" stroke-width="1.5" transform="rotate(180,280,78)"/>
    <rect x="276" y="17" width="8" height="12" rx="1" fill="url(#glF)" stroke="#1a3a6b" stroke-width="1.5" transform="rotate(198,280,78)"/>
    <rect x="276" y="17" width="8" height="12" rx="1" fill="url(#glF)" stroke="#1a3a6b" stroke-width="1.5" transform="rotate(216,280,78)"/>
    <rect x="276" y="17" width="8" height="12" rx="1" fill="url(#glF)" stroke="#1a3a6b" stroke-width="1.5" transform="rotate(234,280,78)"/>
    <rect x="276" y="17" width="8" height="12" rx="1" fill="url(#glF)" stroke="#1a3a6b" stroke-width="1.5" transform="rotate(252,280,78)"/>
    <rect x="276" y="17" width="8" height="12" rx="1" fill="url(#glF)" stroke="#1a3a6b" stroke-width="1.5" transform="rotate(270,280,78)"/>
    <rect x="276" y="17" width="8" height="12" rx="1" fill="url(#glF)" stroke="#1a3a6b" stroke-width="1.5" transform="rotate(288,280,78)"/>
    <rect x="276" y="17" width="8" height="12" rx="1" fill="url(#glF)" stroke="#1a3a6b" stroke-width="1.5" transform="rotate(306,280,78)"/>
    <rect x="276" y="17" width="8" height="12" rx="1" fill="url(#glF)" stroke="#1a3a6b" stroke-width="1.5" transform="rotate(324,280,78)"/>
    <rect x="276" y="17" width="8" height="12" rx="1" fill="url(#glF)" stroke="#1a3a6b" stroke-width="1.5" transform="rotate(342,280,78)"/>
    <!-- Gear body -->
    <circle cx="280" cy="78" r="55" fill="url(#glF)" stroke="#1a3a6b" stroke-width="2"/>
    <!-- Dashed inner ring -->
    <circle cx="280" cy="78" r="42" fill="none" stroke="#8a9ab5" stroke-width="0.6" stroke-dasharray="2,3"/>
    <!-- Lightening holes (6) -->
    <circle cx="280" cy="56" r="6" fill="#dde2eb" stroke="#9aa8bf" stroke-width="0.7"/>
    <circle cx="299" cy="67" r="6" fill="#dde2eb" stroke="#9aa8bf" stroke-width="0.7"/>
    <circle cx="299" cy="89" r="6" fill="#dde2eb" stroke="#9aa8bf" stroke-width="0.7"/>
    <circle cx="280" cy="100" r="6" fill="#dde2eb" stroke="#9aa8bf" stroke-width="0.7"/>
    <circle cx="261" cy="89" r="6" fill="#dde2eb" stroke="#9aa8bf" stroke-width="0.7"/>
    <circle cx="261" cy="67" r="6" fill="#dde2eb" stroke="#9aa8bf" stroke-width="0.7"/>
    <!-- Hub -->
    <circle cx="280" cy="78" r="13" fill="#d4d9e4" stroke="#1a3a6b" stroke-width="1.6"/>
    <rect x="278.5" y="67" width="3" height="11" fill="#1a3a6b" rx="0.4"/>
    <circle cx="280" cy="78" r="5" fill="#1a3a6b"/>
  </g>

  <!-- Mesh indicator -->
  <line x1="155" y1="72" x2="220" y2="72" stroke="#c8960a" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="155" y1="84" x2="220" y2="84" stroke="#c8960a" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="178" y1="69" x2="178" y2="78" stroke="#c8960a" stroke-width="1.3" marker-end="url(#ma)"/>
  <line x1="197" y1="87" x2="197" y2="78" stroke="#c8960a" stroke-width="1.3" marker-end="url(#ma)"/>
  <text x="188" y="67" text-anchor="middle" font-size="7" fill="#c8960a" font-weight="600">MESH</text>

  <!-- Labels -->
  <text x="120" y="145" text-anchor="middle" font-size="11" font-weight="700" fill="#1a3a6b">20 teeth</text>
  <text x="120" y="158" text-anchor="middle" font-size="10" font-weight="600" fill="#1a3a6b">100 RPM &#x21bb;</text>

  <text x="280" y="145" text-anchor="middle" font-size="11" font-weight="700" fill="#1a3a6b">40 teeth</text>
  <text x="280" y="158" text-anchor="middle" font-size="11" font-weight="700" fill="#dc2626">? RPM</text>
</svg>