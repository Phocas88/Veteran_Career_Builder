<svg xmlns="http://www.w3.org/2000/svg" width="400" height="180" viewBox="0 0 400 180">
  <defs>
    <linearGradient id="gsF" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d8dce5"/>
      <stop offset="100%" stop-color="#c0c8d5"/>
    </linearGradient>
    <linearGradient id="glF" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#cdd3df"/>
      <stop offset="100%" stop-color="#b5bfcf"/>
    </linearGradient>
    <filter id="gs" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="1" stdDeviation="1.5" flood-color="#1a3a6b" flood-opacity="0.15"/>
    </filter>
    <marker id="ma" viewBox="0 0 8 8" refX="4" refY="4" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,1 L7,4 L0,7 Z" fill="#c8960a"/>
    </marker>
  </defs>
  <style>
    @keyframes rotateCW { to { transform: rotate(360deg); } }
    .gear-small { animation: rotateCW 3s linear infinite; transform-origin: 108px 78px; }
    text { font-family: Arial, sans-serif; }
  </style>
  <!-- Background with grid -->
  <rect width="400" height="180" rx="10" fill="#f0f4fa" stroke="#d0daea" stroke-width="2"/>
  <g stroke="#d8dfe8" stroke-width="0.3">
    <line x1="0" y1="20" x2="400" y2="20"/><line x1="0" y1="40" x2="400" y2="40"/>
    <line x1="0" y1="60" x2="400" y2="60"/><line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="100" x2="400" y2="100"/><line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="140" x2="400" y2="140"/><line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="20" y1="0" x2="20" y2="180"/><line x1="40" y1="0" x2="40" y2="180"/>
    <line x1="60" y1="0" x2="60" y2="180"/><line x1="80" y1="0" x2="80" y2="180"/>
    <line x1="100" y1="0" x2="100" y2="180"/><line x1="120" y1="0" x2="120" y2="180"/>
    <line x1="140" y1="0" x2="140" y2="180"/><line x1="160" y1="0" x2="160" y2="180"/>
    <line x1="180" y1="0" x2="180" y2="180"/><line x1="200" y1="0" x2="200" y2="180"/>
    <line x1="220" y1="0" x2="220" y2="180"/><line x1="240" y1="0" x2="240" y2="180"/>
    <line x1="260" y1="0" x2="260" y2="180"/><line x1="280" y1="0" x2="280" y2="180"/>
    <line x1="300" y1="0" x2="300" y2="180"/><line x1="320" y1="0" x2="320" y2="180"/>
    <line x1="340" y1="0" x2="340" y2="180"/><line x1="360" y1="0" x2="360" y2="180"/>
    <line x1="380" y1="0" x2="380" y2="180"/>
  </g>

  <!-- Title -->
  <text x="200" y="16" text-anchor="middle" font-size="11" font-weight="600" fill="#5a7090">Gear Ratio -- Find the Speed</text>

  <!-- SMALL GEAR: 20 teeth, center 108,78, R outer ~40, root ~32 -->
  <g class="gear-small" filter="url(#gs)">
    <path d="
      M148,78 L147,72.5 L143.8,68 L147,64 L144,59.8 L146,55.6 L141.6,52.8
      L142,48.4 L137.4,47 L136,42.8 L131.2,43 L128.4,39.6 L124,41.6 L120,39.2
      L116.4,42.4 L112,41.6 L109.6,45.8 L105.2,46.6 L104,51 L99.8,53.2 L100,58
      L96.6,61.2 L98.2,65.6 L96,69.6 L99,73.6 L98.2,78 L101.4,81 L101.6,85.4
      L105.2,87.6 L106.6,91.6 L110.8,92.2 L113.4,95.6 L117.4,94.2 L121.2,96.6
      L124.8,93.8 L128.8,95 L131.4,91.2 L135.6,90.8 L136.8,86.6 L140.8,84.8
      L140.4,80.4 L144.2,77.4 Z
    " fill="url(#gsF)" stroke="#1a3a6b" stroke-width="1.6"/>
    <circle cx="108" cy="78" r="28" fill="none" stroke="#8a9ab5" stroke-width="0.6" stroke-dasharray="2,3"/>
    <!-- Lightening holes -->
    <circle cx="108" cy="62" r="4.5" fill="#e8ecf2" stroke="#9aa8bf" stroke-width="0.7"/>
    <circle cx="124" cy="78" r="4.5" fill="#e8ecf2" stroke="#9aa8bf" stroke-width="0.7"/>
    <circle cx="108" cy="94" r="4.5" fill="#e8ecf2" stroke="#9aa8bf" stroke-width="0.7"/>
    <circle cx="92" cy="78" r="4.5" fill="#e8ecf2" stroke="#9aa8bf" stroke-width="0.7"/>
    <!-- Hub -->
    <circle cx="108" cy="78" r="10" fill="#e0e4ec" stroke="#1a3a6b" stroke-width="1.6"/>
    <rect x="106.5" y="69" width="3" height="9" fill="#1a3a6b" rx="0.4"/>
    <circle cx="108" cy="78" r="3.5" fill="#1a3a6b"/>
  </g>

  <!-- LARGE GEAR: 40 teeth, center 268,78, R outer ~62, root ~52 -->
  <g filter="url(#gs)">
    <path d="
      M330,78 L329.4,73.4 L327.8,69 L330,65 L327,61.2 L328.2,57 L324.2,54.4
      L324.2,50 L319.8,48.4 L318.4,44.2 L313.8,44 L311,40.4 L306.6,41.6 L302.8,38.8
      L298.6,41.2 L294.2,39.6 L291,43.2 L286.4,43 L284.2,47.2 L279.6,48.2
      L278.4,52.6 L274.2,55 L274.4,59.6 L270.8,63 L272.4,67.4 L270,71.4 L273,75.4
      L272.4,80 L275.4,82.8 L275.6,87.2 L279.4,89.2 L280.6,93.4 L284.8,94.2
      L287.2,97.6 L291.2,96.2 L295,98.6 L298.4,95.6 L302.6,96.4 L305.2,92.6
      L309.6,92 L311,87.6 L315.4,85.4 L315,80.6 L319.2,77.4 L317.6,73.2
      L320.2,69.6 L318,65.8 L321,62.4 L320,58 L323.6,55.6 L324,51.2 L328.2,50
      L329.6,46 L333,45 L333,49.2 L329.4,51 L329.8,55.4 L326,57.4 L325,61.4
      L328,64 L326.2,68.4 L328.6,72 L326,75.6 Z
    " fill="url(#glF)" stroke="#1a3a6b" stroke-width="1.6"/>
    <circle cx="268" cy="78" r="46" fill="url(#glF)" stroke="#1a3a6b" stroke-width="1.6"/>
    <circle cx="268" cy="78" r="42" fill="none" stroke="#8a9ab5" stroke-width="0.6" stroke-dasharray="2,3"/>
    <!-- Lightening holes (6) -->
    <circle cx="268" cy="56" r="6" fill="#dde2eb" stroke="#9aa8bf" stroke-width="0.7"/>
    <circle cx="287" cy="67" r="6" fill="#dde2eb" stroke="#9aa8bf" stroke-width="0.7"/>
    <circle cx="287" cy="89" r="6" fill="#dde2eb" stroke="#9aa8bf" stroke-width="0.7"/>
    <circle cx="268" cy="100" r="6" fill="#dde2eb" stroke="#9aa8bf" stroke-width="0.7"/>
    <circle cx="249" cy="89" r="6" fill="#dde2eb" stroke="#9aa8bf" stroke-width="0.7"/>
    <circle cx="249" cy="67" r="6" fill="#dde2eb" stroke="#9aa8bf" stroke-width="0.7"/>
    <!-- Hub -->
    <circle cx="268" cy="78" r="13" fill="#d4d9e4" stroke="#1a3a6b" stroke-width="1.6"/>
    <rect x="266.5" y="66" width="3" height="12" fill="#1a3a6b" rx="0.4"/>
    <circle cx="268" cy="78" r="5" fill="#1a3a6b"/>
  </g>

  <!-- Mesh indicator -->
  <line x1="148" y1="72" x2="206" y2="72" stroke="#c8960a" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="148" y1="84" x2="206" y2="84" stroke="#c8960a" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="170" y1="69" x2="170" y2="78" stroke="#c8960a" stroke-width="1.3" marker-end="url(#ma)"/>
  <line x1="184" y1="87" x2="184" y2="78" stroke="#c8960a" stroke-width="1.3" marker-end="url(#ma)"/>
  <text x="177" y="67" text-anchor="middle" font-size="7" fill="#c8960a" font-weight="600">MESH</text>

  <!-- Labels -->
  <text x="108" y="145" text-anchor="middle" font-size="11" font-weight="700" fill="#1a3a6b">20 teeth</text>
  <text x="108" y="158" text-anchor="middle" font-size="10" font-weight="600" fill="#1a3a6b">100 RPM &#x21bb;</text>

  <text x="268" y="145" text-anchor="middle" font-size="11" font-weight="700" fill="#1a3a6b">40 teeth</text>
  <text x="268" y="158" text-anchor="middle" font-size="11" font-weight="700" fill="#dc2626">? RPM</text>
</svg>