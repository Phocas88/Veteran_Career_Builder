<svg xmlns="http://www.w3.org/2000/svg" width="400" height="180" viewBox="0 0 400 180">
  <defs>
    <linearGradient id="gtCab" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c0392b"/>
      <stop offset="100%" stop-color="#962d22"/>
    </linearGradient>
    <linearGradient id="gtTrailer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f0f0"/>
      <stop offset="50%" stop-color="#e0e4ea"/>
      <stop offset="100%" stop-color="#c8ccd4"/>
    </linearGradient>
    <linearGradient id="gtTire" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a4a4a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="gtRim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0e0e0"/>
      <stop offset="100%" stop-color="#aaa"/>
    </linearGradient>
    <linearGradient id="gtGrill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#666"/>
      <stop offset="50%" stop-color="#444"/>
      <stop offset="100%" stop-color="#333"/>
    </linearGradient>
    <linearGradient id="gtGlass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a8d8f0"/>
      <stop offset="50%" stop-color="#78b8e0"/>
      <stop offset="100%" stop-color="#5898c0"/>
    </linearGradient>
    <linearGradient id="gtFuel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bbb"/>
      <stop offset="100%" stop-color="#888"/>
    </linearGradient>
    <filter id="gtSh" x="-2%" y="-2%" width="106%" height="106%">
      <feDropShadow dx="1" dy="1" stdDeviation="1" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  <style>text { font-family: Arial, sans-serif; }</style>

  <!-- Background -->
  <rect width="400" height="180" rx="10" fill="#f0f4fa" stroke="#d0daea" stroke-width="2"/>
  <g stroke="#d8dfe8" stroke-width="0.3">
    <line x1="0" y1="20" x2="400" y2="20"/><line x1="0" y1="40" x2="400" y2="40"/>
    <line x1="0" y1="60" x2="400" y2="60"/><line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="100" x2="400" y2="100"/><line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="140" x2="400" y2="140"/><line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="20" y1="0" x2="20" y2="180"/><line x1="40" y1="0" x2="40" y2="180"/>
    <line x1="60" y1="0" x2="60" y2="180"/><line x1="80" y1="0" x2="80" y2="180"/>
    <line x1="100" y1="0" x2="100" y2="180"/><line x1="120" y1="0" x2="120" y2="180"/>
    <line x1="140" y1="0" x2="140" y2="180"/><line x1="160" y1="0" x2="160" y2="180"/>
    <line x1="180" y1="0" x2="180" y2="180"/><line x1="200" y1="0" x2="200" y2="180"/>
    <line x1="220" y1="0" x2="220" y2="180"/><line x1="240" y1="0" x2="240" y2="180"/>
    <line x1="260" y1="0" x2="260" y2="180"/><line x1="280" y1="0" x2="280" y2="180"/>
    <line x1="300" y1="0" x2="300" y2="180"/><line x1="320" y1="0" x2="320" y2="180"/>
    <line x1="340" y1="0" x2="340" y2="180"/><line x1="360" y1="0" x2="360" y2="180"/>
    <line x1="380" y1="0" x2="380" y2="180"/>
  </g>

  <!-- Road surface (10% grade = ~5.7 degrees, slopes up to right) -->
  <polygon points="0,155 400,115 400,180 0,180" fill="#7a7a7a" opacity="0.15"/>
  <line x1="0" y1="155" x2="400" y2="115" stroke="#6a6a6a" stroke-width="2"/>
  <!-- Center line dashes -->
  <line x1="10" y1="153.5" x2="390" y2="113.8" stroke="#e8c020" stroke-width="1.5" stroke-dasharray="12,10"/>
  <!-- Road edge line -->
  <line x1="0" y1="157" x2="400" y2="117" stroke="#aaa" stroke-width="0.8"/>

  <!-- Grade angle indicator (bottom-left) -->
  <line x1="12" y1="153" x2="100" y2="153" stroke="#5a7090" stroke-width="1" stroke-dasharray="4,3"/>
  <path d="M65,153 A40,40 0 0,0 67,147.5" fill="none" stroke="#c8960a" stroke-width="1.8"/>
  <text x="80" y="152" font-size="12" font-weight="800" fill="#c8960a">10%</text>
  <!-- Rise/Run triangle -->
  <line x1="100" y1="153" x2="100" y2="144" stroke="#5a7090" stroke-width="0.8" stroke-dasharray="2,2"/>

  <!-- ═══ SEMI-TRUCK + TRAILER ═══ -->
  <!-- Entire rig rotated to sit on the slope -->
  <g transform="rotate(-5.7, 220, 120)" filter="url(#gtSh)">

    <!-- ══════ BOX TRAILER ══════ -->
    <!-- Main trailer body -->
    <rect x="28" y="62" width="180" height="46" rx="1" fill="url(#gtTrailer)" stroke="#555" stroke-width="1.2"/>
    <!-- Trailer roof highlight -->
    <rect x="29" y="63" width="178" height="3" fill="#fff" opacity="0.5" rx="0.5"/>
    <!-- Bottom rail / undercarriage -->
    <rect x="28" y="106" width="180" height="5" rx="1" fill="#555" stroke="#333" stroke-width="0.8"/>
    <!-- Vertical rib lines on trailer wall -->
    <line x1="55" y1="64" x2="55" y2="106" stroke="#c8ccd4" stroke-width="0.6"/>
    <line x1="82" y1="64" x2="82" y2="106" stroke="#c8ccd4" stroke-width="0.6"/>
    <line x1="109" y1="64" x2="109" y2="106" stroke="#c8ccd4" stroke-width="0.6"/>
    <line x1="136" y1="64" x2="136" y2="106" stroke="#c8ccd4" stroke-width="0.6"/>
    <line x1="163" y1="64" x2="163" y2="106" stroke="#c8ccd4" stroke-width="0.6"/>
    <line x1="190" y1="64" x2="190" y2="106" stroke="#c8ccd4" stroke-width="0.6"/>
    <!-- Rear reflectors and lights -->
    <rect x="30" y="96" width="4" height="5" rx="1" fill="#dc2626"/>
    <rect x="30" y="72" width="4" height="5" rx="1" fill="#f0a030"/>
    <rect x="30" y="84" width="6" height="3" rx="0.5" fill="#dc2626" opacity="0.6"/>
    <!-- DOT bumper bar -->
    <rect x="26" y="109" width="12" height="3" rx="0.5" fill="#888" stroke="#555" stroke-width="0.5"/>
    <!-- Mud flap behind rear axle -->
    <rect x="58" y="111" width="6" height="6" rx="0.5" fill="#333"/>
    <rect x="100" y="111" width="6" height="6" rx="0.5" fill="#333"/>

    <!-- Landing gear (folded up) -->
    <rect x="188" y="104" width="3" height="10" rx="0.5" fill="#666"/>
    <rect x="192" y="104" width="3" height="10" rx="0.5" fill="#666"/>

    <!-- Trailer tandem axle wheels (rear) -->
    <!-- Axle 1 -->
    <circle cx="68" cy="115" r="7" fill="url(#gtTire)" stroke="#111" stroke-width="1.2"/>
    <circle cx="68" cy="115" r="3.5" fill="url(#gtRim)" stroke="#888" stroke-width="0.6"/>
    <circle cx="68" cy="115" r="1" fill="#555"/>
    <!-- Axle 2 -->
    <circle cx="88" cy="115" r="7" fill="url(#gtTire)" stroke="#111" stroke-width="1.2"/>
    <circle cx="88" cy="115" r="3.5" fill="url(#gtRim)" stroke="#888" stroke-width="0.6"/>
    <circle cx="88" cy="115" r="1" fill="#555"/>

    <!-- ══════ FIFTH WHEEL / COUPLING ══════ -->
    <rect x="206" y="102" width="12" height="5" rx="1" fill="#555"/>

    <!-- ══════ SEMI-TRUCK CAB (TRACTOR) ══════ -->
    <!-- Frame rails under cab -->
    <rect x="212" y="104" width="80" height="4" rx="0.5" fill="#444"/>

    <!-- Cab main body -->
    <path d="M218,60 L218,102 L280,102 L280,60 Q280,54 274,54 L224,54 Q218,54 218,60 Z" fill="url(#gtCab)" stroke="#7a2018" stroke-width="1.5"/>

    <!-- Cab roof air deflector / fairing -->
    <path d="M218,60 L214,58 L214,50 Q214,46 218,46 L232,46 L232,54" fill="url(#gtCab)" stroke="#7a2018" stroke-width="1"/>
    <rect x="215" y="47" width="16" height="2" rx="0.5" fill="#fff" opacity="0.3"/>

    <!-- Sleeper panel (behind cab, if visible) -->
    <rect x="218" y="56" width="14" height="44" rx="1" fill="#a82820" stroke="#7a2018" stroke-width="0.8"/>

    <!-- Side window -->
    <rect x="234" y="58" width="22" height="18" rx="2" fill="url(#gtGlass)" stroke="#4a7090" stroke-width="0.8"/>
    <!-- Window divider -->
    <line x1="245" y1="58" x2="245" y2="76" stroke="#4a7090" stroke-width="0.5"/>

    <!-- Windshield (front, angled) -->
    <path d="M258,57 L272,57 Q278,57 280,62 L280,78 L258,78 Z" fill="url(#gtGlass)" stroke="#4a7090" stroke-width="0.8"/>
    <!-- Windshield wiper -->
    <line x1="262" y1="77" x2="270" y2="62" stroke="#333" stroke-width="0.5"/>

    <!-- Side mirror -->
    <rect x="280" y="58" width="2" height="3" rx="0.3" fill="#333"/>
    <rect x="281" y="55" width="4" height="8" rx="1" fill="#333" stroke="#555" stroke-width="0.3"/>

    <!-- Door panel outline -->
    <rect x="234" y="78" width="22" height="22" rx="1" fill="none" stroke="#7a2018" stroke-width="0.6"/>
    <!-- Door handle -->
    <rect x="250" y="86" width="5" height="2" rx="0.5" fill="#ddd"/>
    <!-- Step under door -->
    <rect x="236" y="102" width="18" height="3" rx="0.5" fill="#888" stroke="#555" stroke-width="0.5"/>
    <rect x="238" y="105" width="14" height="3" rx="0.5" fill="#777" stroke="#555" stroke-width="0.5"/>

    <!-- Fuel tank (cylinder on side) -->
    <rect x="258" y="90" width="18" height="12" rx="5" fill="url(#gtFuel)" stroke="#777" stroke-width="0.8"/>
    <line x1="260" y1="96" x2="274" y2="96" stroke="#999" stroke-width="0.3"/>
    <!-- Fuel cap -->
    <circle cx="267" cy="92" r="1.5" fill="#666" stroke="#555" stroke-width="0.3"/>

    <!-- Battery box -->
    <rect x="258" y="82" width="12" height="7" rx="1" fill="#333" stroke="#222" stroke-width="0.5"/>

    <!-- Hood / engine compartment -->
    <rect x="278" y="72" width="14" height="30" rx="2" fill="url(#gtCab)" stroke="#7a2018" stroke-width="1.2"/>
    <!-- Hood louvers -->
    <line x1="280" y1="78" x2="290" y2="78" stroke="#7a2018" stroke-width="0.5"/>
    <line x1="280" y1="82" x2="290" y2="82" stroke="#7a2018" stroke-width="0.5"/>
    <line x1="280" y1="86" x2="290" y2="86" stroke="#7a2018" stroke-width="0.5"/>

    <!-- Exhaust stack -->
    <rect x="278" y="38" width="3" height="36" rx="1" fill="#777" stroke="#555" stroke-width="0.8"/>
    <ellipse cx="279.5" cy="38" rx="2" ry="1" fill="#888" stroke="#666" stroke-width="0.5"/>

    <!-- Front grille -->
    <rect x="290" y="74" width="5" height="26" rx="1" fill="url(#gtGrill)" stroke="#222" stroke-width="0.8"/>
    <!-- Grill horizontal slats -->
    <line x1="291" y1="78" x2="294" y2="78" stroke="#888" stroke-width="0.4"/>
    <line x1="291" y1="82" x2="294" y2="82" stroke="#888" stroke-width="0.4"/>
    <line x1="291" y1="86" x2="294" y2="86" stroke="#888" stroke-width="0.4"/>
    <line x1="291" y1="90" x2="294" y2="90" stroke="#888" stroke-width="0.4"/>
    <line x1="291" y1="94" x2="294" y2="94" stroke="#888" stroke-width="0.4"/>

    <!-- Headlights -->
    <rect x="291" y="75" width="4" height="5" rx="1.5" fill="#f8f0a0" stroke="#c8a030" stroke-width="0.5"/>
    <rect x="291" y="94" width="4" height="4" rx="1" fill="#f8f0a0" stroke="#c8a030" stroke-width="0.5" opacity="0.8"/>

    <!-- Turn signal -->
    <rect x="291" y="82" width="3" height="2" rx="0.5" fill="#f0a030"/>

    <!-- Front bumper -->
    <rect x="292" y="100" width="6" height="4" rx="1" fill="#aaa" stroke="#777" stroke-width="0.8"/>
    <!-- Tow hooks -->
    <circle cx="295" cy="104" r="1" fill="#666"/>

    <!-- ── TRACTOR WHEELS ── -->
    <!-- Steer axle (front) -->
    <circle cx="288" cy="112" r="8" fill="url(#gtTire)" stroke="#111" stroke-width="1.2"/>
    <circle cx="288" cy="112" r="4" fill="url(#gtRim)" stroke="#888" stroke-width="0.6"/>
    <circle cx="288" cy="112" r="1.2" fill="#555"/>
    <!-- Lug pattern -->
    <circle cx="286" cy="109.5" r="0.5" fill="#777"/>
    <circle cx="290" cy="109.5" r="0.5" fill="#777"/>
    <circle cx="286" cy="114.5" r="0.5" fill="#777"/>
    <circle cx="290" cy="114.5" r="0.5" fill="#777"/>

    <!-- Drive axle 1 -->
    <circle cx="236" cy="112" r="7.5" fill="url(#gtTire)" stroke="#111" stroke-width="1.2"/>
    <circle cx="236" cy="112" r="3.8" fill="url(#gtRim)" stroke="#888" stroke-width="0.6"/>
    <circle cx="236" cy="112" r="1" fill="#555"/>
    <!-- Drive axle 2 -->
    <circle cx="254" cy="112" r="7.5" fill="url(#gtTire)" stroke="#111" stroke-width="1.2"/>
    <circle cx="254" cy="112" r="3.8" fill="url(#gtRim)" stroke="#888" stroke-width="0.6"/>
    <circle cx="254" cy="112" r="1" fill="#555"/>

    <!-- Fender arcs over wheels -->
    <path d="M276,108 Q288,96 300,108" fill="none" stroke="#7a2018" stroke-width="1.2"/>
    <path d="M224,108 Q236,97 248,108" fill="none" stroke="#444" stroke-width="0.8"/>
    <path d="M242,108 Q254,97 266,108" fill="none" stroke="#444" stroke-width="0.8"/>
  </g>

  <!-- ═══ LABELS AND PHYSICS ═══ -->
  <!-- Weight label on trailer -->
  <text x="120" y="34" text-anchor="middle" font-size="14" font-weight="800" fill="#1a3a6b">3,000 lbs</text>
  <!-- Down arrow to trailer -->
  <line x1="120" y1="37" x2="120" y2="56" stroke="#1a3a6b" stroke-width="2"/>
  <polygon points="116,55 120,63 124,55" fill="#1a3a6b"/>

  <!-- Grade force arrow (red, along slope pointing downhill) -->
  <line x1="175" y1="97" x2="140" y2="100.5" stroke="#dc2626" stroke-width="2.5"/>
  <polygon points="143,97.5 135,101 143,104" fill="#dc2626"/>

  <!-- Force label -->
  <text x="345" y="28" font-size="11" font-weight="700" fill="#dc2626">Additional Force</text>
  <text x="345" y="40" font-size="11" font-weight="700" fill="#dc2626">to Overcome</text>
  <text x="345" y="52" font-size="11" font-weight="700" fill="#dc2626">Grade = ?</text>

  <!-- Title -->
  <text x="200" y="174" text-anchor="middle" font-size="11" font-weight="600" fill="#5a7090">Trailer on 10% Grade &#8212; Find Additional Force</text>
</svg>
