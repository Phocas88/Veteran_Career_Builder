<svg xmlns="http://www.w3.org/2000/svg" width="400" height="180" viewBox="0 0 400 180">
  <style>
    @keyframes rollWheel { to { transform: rotate(360deg); } }
    .w1 { animation: rollWheel 1.5s linear infinite; transform-origin: 138px 98px; }
    .w2 { animation: rollWheel 1.5s linear infinite; transform-origin: 230px 113px; }
    .w3 { animation: rollWheel 1.5s linear infinite; transform-origin: 300px 122px; }
    text { font-family: Arial, sans-serif; }
  </style>
  <rect width="400" height="180" rx="12" fill="#f0f4fa" stroke="#d0daea" stroke-width="2"/>

  <!-- Incline surface -->
  <line x1="30" y1="155" x2="380" y2="80" stroke="#1a3a6b" stroke-width="2.5"/>

  <!-- Horizontal reference -->
  <line x1="30" y1="155" x2="200" y2="155" stroke="#5a7090" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Angle arc -->
  <path d="M90,155 A60,60 0 0,0 96,141" fill="none" stroke="#c8960a" stroke-width="1.5"/>
  <text x="108" y="152" font-size="10" font-weight="700" fill="#c8960a">10%</text>

  <!-- Truck cab (on the slope, tilted) -->
  <g transform="rotate(-5.7, 150, 95)">
    <!-- Cab body -->
    <rect x="110" y="68" width="50" height="30" rx="3" fill="#1a3a6b"/>
    <!-- Windshield -->
    <rect x="148" y="72" width="10" height="16" rx="1" fill="#dce4f0" opacity=".7"/>
    <!-- Wheel 1 -->
    <g class="w1">
      <circle cx="138" cy="98" r="8" fill="#5a7090" stroke="#1a3a6b" stroke-width="2"/>
      <line x1="138" y1="91" x2="138" y2="105" stroke="#1a3a6b" stroke-width="1"/>
      <line x1="131" y1="98" x2="145" y2="98" stroke="#1a3a6b" stroke-width="1"/>
    </g>
  </g>

  <!-- Hitch connector -->
  <line x1="160" y1="95" x2="200" y2="102" stroke="#1a3a6b" stroke-width="2"/>

  <!-- Trailer (on the slope, tilted) -->
  <g transform="rotate(-5.7, 270, 108)">
    <!-- Trailer body -->
    <rect x="200" y="82" width="130" height="28" rx="3" fill="#dce4f0" stroke="#1a3a6b" stroke-width="2"/>
    <!-- Wheel 2 -->
    <g class="w2">
      <circle cx="230" cy="113" r="7" fill="#5a7090" stroke="#1a3a6b" stroke-width="2"/>
      <line x1="230" y1="107" x2="230" y2="119" stroke="#1a3a6b" stroke-width="1"/>
    </g>
    <!-- Wheel 3 -->
    <g class="w3">
      <circle cx="300" cy="113" r="7" fill="#5a7090" stroke="#1a3a6b" stroke-width="2"/>
      <line x1="300" y1="107" x2="300" y2="119" stroke="#1a3a6b" stroke-width="1"/>
    </g>
  </g>

  <!-- Weight label on trailer -->
  <text x="265" y="100" text-anchor="middle" font-size="11" font-weight="700" fill="#1a3a6b">3000 lbs</text>

  <!-- Gravity force arrow (straight down from trailer center) -->
  <line x1="265" y1="115" x2="265" y2="150" stroke="#1a3a6b" stroke-width="2" marker-end="url(#arrowNavy)"/>
  <text x="280" y="148" font-size="9" font-weight="600" fill="#1a3a6b">W</text>

  <!-- Grade force component arrow (along slope, opposing motion) -->
  <line x1="265" y1="115" x2="310" y2="130" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arrowRedG)"/>

  <!-- Unknown label -->
  <text x="345" y="140" font-size="12" font-weight="700" fill="#dc2626">Additional</text>
  <text x="345" y="153" font-size="12" font-weight="700" fill="#dc2626">Force = ?</text>

  <defs>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="5" refY="10" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L5,10 L10,0 Z" fill="#1a3a6b"/>
    </marker>
    <marker id="arrowRedG" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="140" y="174" text-anchor="middle" font-size="12" font-weight="600" fill="#5a7090">Trailer on 10% Grade — Find Additional Force</text>
</svg>