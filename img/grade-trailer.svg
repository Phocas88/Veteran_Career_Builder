<svg xmlns="http://www.w3.org/2000/svg" width="400" height="180" viewBox="0 0 400 180">
  <defs>
    <linearGradient id="gtCab" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a5a8b"/>
      <stop offset="100%" stop-color="#1a3a6b"/>
    </linearGradient>
    <linearGradient id="gtTrailer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dce4f0"/>
      <stop offset="100%" stop-color="#b8c8dc"/>
    </linearGradient>
    <linearGradient id="gtTire" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#555"/>
      <stop offset="100%" stop-color="#333"/>
    </linearGradient>
    <linearGradient id="gtRim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ccc"/>
      <stop offset="100%" stop-color="#999"/>
    </linearGradient>
    <filter id="gtSh" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="1" stdDeviation="1.5" flood-color="#1a3a6b" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="5" refY="10" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L5,10 L10,0 Z" fill="#1a3a6b"/>
    </marker>
    <marker id="arrowRedG" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#dc2626"/>
    </marker>
  </defs>
  <style>
    @keyframes rollWheel { to { transform: rotate(360deg); } }
    .w1 { animation: rollWheel 1.5s linear infinite; transform-origin: 115px 88px; }
    .w2 { animation: rollWheel 1.5s linear infinite; transform-origin: 218px 98px; }
    .w3 { animation: rollWheel 1.5s linear infinite; transform-origin: 278px 104px; }
    .w4 { animation: rollWheel 1.5s linear infinite; transform-origin: 300px 106px; }
    text { font-family: Arial, sans-serif; }
  </style>
  <!-- Background with grid -->
  <rect width="400" height="180" rx="10" fill="#f0f4fa" stroke="#d0daea" stroke-width="2"/>
  <g stroke="#d8dfe8" stroke-width="0.3">
    <line x1="0" y1="20" x2="400" y2="20"/><line x1="0" y1="40" x2="400" y2="40"/>
    <line x1="0" y1="60" x2="400" y2="60"/><line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="100" x2="400" y2="100"/><line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="140" x2="400" y2="140"/><line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="20" y1="0" x2="20" y2="180"/><line x1="40" y1="0" x2="40" y2="180"/>
    <line x1="60" y1="0" x2="60" y2="180"/><line x1="80" y1="0" x2="80" y2="180"/>
    <line x1="100" y1="0" x2="100" y2="180"/><line x1="120" y1="0" x2="120" y2="180"/>
    <line x1="140" y1="0" x2="140" y2="180"/><line x1="160" y1="0" x2="160" y2="180"/>
    <line x1="180" y1="0" x2="180" y2="180"/><line x1="200" y1="0" x2="200" y2="180"/>
    <line x1="220" y1="0" x2="220" y2="180"/><line x1="240" y1="0" x2="240" y2="180"/>
    <line x1="260" y1="0" x2="260" y2="180"/><line x1="280" y1="0" x2="280" y2="180"/>
    <line x1="300" y1="0" x2="300" y2="180"/><line x1="320" y1="0" x2="320" y2="180"/>
    <line x1="340" y1="0" x2="340" y2="180"/><line x1="360" y1="0" x2="360" y2="180"/>
    <line x1="380" y1="0" x2="380" y2="180"/>
  </g>

  <!-- Incline surface: from bottom-left going up to the right -->
  <!-- 10% grade = ~5.7 degrees. Line from (30,140) to (370,106) -->
  <line x1="30" y1="140" x2="370" y2="106" stroke="#1a3a6b" stroke-width="2.5"/>
  <!-- Horizontal reference -->
  <line x1="30" y1="140" x2="180" y2="140" stroke="#5a7090" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- Angle arc -->
  <path d="M100,140 A60,60 0 0,0 103,131" fill="none" stroke="#c8960a" stroke-width="1.5"/>
  <text x="118" y="139" font-size="11" font-weight="700" fill="#c8960a">10%</text>

  <!-- Vehicle group tilted to match slope -->
  <g transform="rotate(-5.7,200,110)" filter="url(#gtSh)">
    <!-- Truck cab -->
    <rect x="85" y="62" width="48" height="26" rx="4" fill="url(#gtCab)" stroke="#1a3a6b" stroke-width="1.5"/>
    <!-- Windshield -->
    <rect x="123" y="65" width="8" height="16" rx="2" fill="#88b8e8" stroke="#5a7090" stroke-width="0.8" opacity="0.8"/>
    <!-- Bumper -->
    <rect x="82" y="86" width="52" height="3" rx="1" fill="#5a7090"/>

    <!-- Hitch -->
    <line x1="134" y1="80" x2="170" y2="80" stroke="#5a7090" stroke-width="2.5"/>
    <circle cx="152" cy="80" r="2" fill="#1a3a6b"/>

    <!-- Trailer body -->
    <rect x="168" y="60" width="140" height="26" rx="3" fill="url(#gtTrailer)" stroke="#1a3a6b" stroke-width="1.8"/>
    <!-- Side detail line -->
    <line x1="172" y1="73" x2="305" y2="73" stroke="#a0b0c5" stroke-width="0.5"/>

    <!-- Wheel 1 - cab -->
    <g class="w1">
      <circle cx="115" cy="92" r="7" fill="url(#gtTire)" stroke="#333" stroke-width="1.5"/>
      <circle cx="115" cy="92" r="3.5" fill="url(#gtRim)" stroke="#888" stroke-width="0.8"/>
      <line x1="115" y1="86" x2="115" y2="98" stroke="#666" stroke-width="0.8"/>
      <line x1="109" y1="92" x2="121" y2="92" stroke="#666" stroke-width="0.8"/>
    </g>
    <!-- Wheel 2 - trailer front -->
    <g class="w2">
      <circle cx="218" cy="90" r="7" fill="url(#gtTire)" stroke="#333" stroke-width="1.5"/>
      <circle cx="218" cy="90" r="3.5" fill="url(#gtRim)" stroke="#888" stroke-width="0.8"/>
      <line x1="218" y1="84" x2="218" y2="96" stroke="#666" stroke-width="0.8"/>
      <line x1="212" y1="90" x2="224" y2="90" stroke="#666" stroke-width="0.8"/>
    </g>
    <!-- Wheel 3 - trailer rear 1 -->
    <g class="w3">
      <circle cx="278" cy="90" r="7" fill="url(#gtTire)" stroke="#333" stroke-width="1.5"/>
      <circle cx="278" cy="90" r="3.5" fill="url(#gtRim)" stroke="#888" stroke-width="0.8"/>
      <line x1="278" y1="84" x2="278" y2="96" stroke="#666" stroke-width="0.8"/>
      <line x1="272" y1="90" x2="284" y2="90" stroke="#666" stroke-width="0.8"/>
    </g>
    <!-- Wheel 4 - trailer rear 2 -->
    <g class="w4">
      <circle cx="296" cy="90" r="7" fill="url(#gtTire)" stroke="#333" stroke-width="1.5"/>
      <circle cx="296" cy="90" r="3.5" fill="url(#gtRim)" stroke="#888" stroke-width="0.8"/>
      <line x1="296" y1="84" x2="296" y2="96" stroke="#666" stroke-width="0.8"/>
      <line x1="290" y1="90" x2="302" y2="90" stroke="#666" stroke-width="0.8"/>
    </g>
  </g>

  <!-- Weight label on trailer -->
  <text x="240" y="78" text-anchor="middle" font-size="11" font-weight="700" fill="#1a3a6b">3,000 lbs</text>

  <!-- Gravity force arrow (straight down from center of trailer) -->
  <line x1="240" y1="100" x2="240" y2="140" stroke="#1a3a6b" stroke-width="2" marker-end="url(#arrowNavy)"/>
  <text x="252" y="138" font-size="9" font-weight="700" fill="#1a3a6b">W</text>

  <!-- Grade force component arrow (along slope, pointing downhill) -->
  <line x1="240" y1="100" x2="195" y2="104.5" stroke="#dc2626" stroke-width="2.5"/>
  <polygon points="195,101 187,104.8 195,108" fill="#dc2626"/>

  <!-- Unknown label -->
  <text x="345" y="148" text-anchor="middle" font-size="11" font-weight="800" fill="#dc2626">Additional</text>
  <text x="345" y="162" text-anchor="middle" font-size="11" font-weight="800" fill="#dc2626">Force = ?</text>

  <!-- Title -->
  <text x="200" y="174" text-anchor="middle" font-size="11" font-weight="600" fill="#5a7090">Trailer on 10% Grade -- Find Additional Force</text>
</svg>