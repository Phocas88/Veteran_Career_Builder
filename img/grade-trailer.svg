<svg xmlns="http://www.w3.org/2000/svg" width="400" height="180" viewBox="0 0 400 180">
  <defs>
    <linearGradient id="cabPaint" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d43030"/>
      <stop offset="100%" stop-color="#a01818"/>
    </linearGradient>
    <linearGradient id="hoodPaint" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cc2828"/>
      <stop offset="100%" stop-color="#901414"/>
    </linearGradient>
    <linearGradient id="trailerBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f5f5"/>
      <stop offset="50%" stop-color="#e8e8e8"/>
      <stop offset="100%" stop-color="#d0d0d0"/>
    </linearGradient>
    <linearGradient id="chrome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eee"/>
      <stop offset="40%" stop-color="#ccc"/>
      <stop offset="100%" stop-color="#999"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b0daf0"/>
      <stop offset="100%" stop-color="#5a9ac0"/>
    </linearGradient>
    <linearGradient id="rubber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#444"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="hubcap" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ddd"/>
      <stop offset="100%" stop-color="#999"/>
    </linearGradient>
    <filter id="dropshadow" x="-2%" y="-2%" width="106%" height="106%">
      <feDropShadow dx="1" dy="1" stdDeviation="1.2" flood-color="#000" flood-opacity="0.22"/>
    </filter>
  </defs>
  <style>text{font-family:Arial,sans-serif;}</style>

  <!-- Background -->
  <rect width="400" height="180" rx="10" fill="#f0f4fa" stroke="#d0daea" stroke-width="2"/>
  <g stroke="#d8dfe8" stroke-width="0.3">
    <line x1="0" y1="20" x2="400" y2="20"/><line x1="0" y1="40" x2="400" y2="40"/>
    <line x1="0" y1="60" x2="400" y2="60"/><line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="100" x2="400" y2="100"/><line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="140" x2="400" y2="140"/><line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="20" y1="0" x2="20" y2="180"/><line x1="40" y1="0" x2="40" y2="180"/>
    <line x1="60" y1="0" x2="60" y2="180"/><line x1="80" y1="0" x2="80" y2="180"/>
    <line x1="100" y1="0" x2="100" y2="180"/><line x1="120" y1="0" x2="120" y2="180"/>
    <line x1="140" y1="0" x2="140" y2="180"/><line x1="160" y1="0" x2="160" y2="180"/>
    <line x1="180" y1="0" x2="180" y2="180"/><line x1="200" y1="0" x2="200" y2="180"/>
    <line x1="220" y1="0" x2="220" y2="180"/><line x1="240" y1="0" x2="240" y2="180"/>
    <line x1="260" y1="0" x2="260" y2="180"/><line x1="280" y1="0" x2="280" y2="180"/>
    <line x1="300" y1="0" x2="300" y2="180"/><line x1="320" y1="0" x2="320" y2="180"/>
    <line x1="340" y1="0" x2="340" y2="180"/><line x1="360" y1="0" x2="360" y2="180"/>
    <line x1="380" y1="0" x2="380" y2="180"/>
  </g>

  <!-- ═══ ROAD on 10% grade ═══ -->
  <polygon points="0,156 400,116 400,180 0,180" fill="#888" opacity="0.12"/>
  <line x1="0" y1="156" x2="400" y2="116" stroke="#777" stroke-width="2"/>
  <line x1="10" y1="154.5" x2="390" y2="114.8" stroke="#e0b020" stroke-width="1.5" stroke-dasharray="14,10"/>

  <!-- Grade angle callout -->
  <line x1="10" y1="154" x2="95" y2="154" stroke="#5a7090" stroke-width="1" stroke-dasharray="4,3"/>
  <path d="M60,154 A35,35 0 0,0 62,149" fill="none" stroke="#c8960a" stroke-width="1.8"/>
  <text x="74" y="152" font-size="12" font-weight="800" fill="#c8960a">10%</text>

  <!-- ═══ 18-WHEELER (rotated to slope) ═══ -->
  <!-- Facing right (uphill). Trailer on left, cab on right -->
  <g transform="rotate(-5.7, 210, 122)" filter="url(#dropshadow)">

    <!-- ════════════════════════════ -->
    <!-- ══  53-FT BOX TRAILER     ══ -->
    <!-- ════════════════════════════ -->
    <!-- Trailer main body: tall white box -->
    <rect x="18" y="52" width="190" height="56" rx="1" fill="url(#trailerBody)" stroke="#888" stroke-width="1.2"/>
    <!-- Roof edge highlight -->
    <line x1="19" y1="53" x2="207" y2="53" stroke="#fff" stroke-width="1" opacity="0.6"/>
    <!-- Bottom rail -->
    <rect x="18" y="106" width="190" height="4" rx="0.5" fill="#666" stroke="#444" stroke-width="0.6"/>
    <!-- Vertical rib lines (riveted panels) -->
    <line x1="45" y1="54" x2="45" y2="106" stroke="#d0d0d0" stroke-width="0.5"/>
    <line x1="72" y1="54" x2="72" y2="106" stroke="#d0d0d0" stroke-width="0.5"/>
    <line x1="99" y1="54" x2="99" y2="106" stroke="#d0d0d0" stroke-width="0.5"/>
    <line x1="126" y1="54" x2="126" y2="106" stroke="#d0d0d0" stroke-width="0.5"/>
    <line x1="153" y1="54" x2="153" y2="106" stroke="#d0d0d0" stroke-width="0.5"/>
    <line x1="180" y1="54" x2="180" y2="106" stroke="#d0d0d0" stroke-width="0.5"/>
    <!-- Rear door seam -->
    <line x1="19" y1="54" x2="19" y2="106" stroke="#aaa" stroke-width="0.8"/>
    <!-- Rear lights -->
    <rect x="18" y="62" width="3" height="5" rx="1" fill="#dc2626"/>
    <rect x="18" y="72" width="3" height="4" rx="1" fill="#f0a030"/>
    <rect x="18" y="96" width="3" height="5" rx="1" fill="#dc2626"/>
    <!-- DOT rear bumper -->
    <rect x="16" y="109" width="16" height="2.5" rx="0.5" fill="#aaa" stroke="#777" stroke-width="0.5"/>
    <!-- Mud flaps -->
    <rect x="52" y="110" width="5" height="5" rx="0.5" fill="#222"/>
    <rect x="78" y="110" width="5" height="5" rx="0.5" fill="#222"/>

    <!-- Landing gear (folded up against trailer) -->
    <rect x="196" y="100" width="2.5" height="12" rx="0.5" fill="#666"/>
    <rect x="200" y="100" width="2.5" height="12" rx="0.5" fill="#666"/>
    <rect x="195" y="110" width="4" height="2" rx="0.3" fill="#555"/>

    <!-- Trailer tandem axles (rear of trailer) -->
    <!-- Axle 1 -->
    <circle cx="60" cy="114" r="6.5" fill="url(#rubber)" stroke="#111" stroke-width="1"/>
    <circle cx="60" cy="114" r="3.2" fill="url(#hubcap)" stroke="#888" stroke-width="0.5"/>
    <circle cx="60" cy="114" r="0.8" fill="#555"/>
    <!-- Axle 2 -->
    <circle cx="80" cy="114" r="6.5" fill="url(#rubber)" stroke="#111" stroke-width="1"/>
    <circle cx="80" cy="114" r="3.2" fill="url(#hubcap)" stroke="#888" stroke-width="0.5"/>
    <circle cx="80" cy="114" r="0.8" fill="#555"/>

    <!-- ════════════════════════════ -->
    <!-- ══  FIFTH WHEEL COUPLING  ══ -->
    <!-- ════════════════════════════ -->
    <rect x="206" y="100" width="14" height="4" rx="1" fill="#555"/>
    <rect x="210" y="97" width="6" height="4" rx="0.5" fill="#444"/>

    <!-- ════════════════════════════ -->
    <!-- ══  TRACTOR / CAB         ══ -->
    <!-- ════════════════════════════ -->

    <!-- Frame rails -->
    <rect x="214" y="104" width="90" height="3.5" rx="0.5" fill="#444"/>

    <!-- ── SLEEPER + CAB BODY ── -->
    <!-- Sleeper section (behind cab) -->
    <rect x="216" y="52" width="20" height="52" rx="2" fill="url(#cabPaint)" stroke="#7a1515" stroke-width="1.2"/>
    <!-- Sleeper window -->
    <rect x="219" y="62" width="8" height="8" rx="1.5" fill="url(#glass)" stroke="#4a7090" stroke-width="0.6"/>

    <!-- Main cab -->
    <rect x="234" y="50" width="36" height="54" rx="2" fill="url(#cabPaint)" stroke="#7a1515" stroke-width="1.2"/>
    <!-- Cab roof (raised, aerodynamic) -->
    <path d="M216,52 Q216,42 226,40 L260,40 Q268,40 268,48 L268,52" fill="url(#cabPaint)" stroke="#7a1515" stroke-width="1.2"/>
    <!-- Roof visor -->
    <rect x="256" y="40" width="14" height="3" rx="1" fill="#aaa" stroke="#888" stroke-width="0.5"/>
    <!-- Sun visor over windshield -->
    <rect x="260" y="48" width="10" height="2" rx="0.5" fill="#7a1515"/>

    <!-- Side window (large) -->
    <rect x="238" y="54" width="20" height="18" rx="2" fill="url(#glass)" stroke="#4a7090" stroke-width="0.7"/>
    <!-- Window post -->
    <line x1="248" y1="54" x2="248" y2="72" stroke="#7a1515" stroke-width="0.6"/>

    <!-- Door -->
    <rect x="237" y="74" width="22" height="26" rx="1" fill="none" stroke="#7a1515" stroke-width="0.6"/>
    <!-- Door handle -->
    <rect x="253" y="84" width="5" height="2" rx="0.5" fill="url(#chrome)"/>

    <!-- Windshield (front, angled — classic semi truck style) -->
    <path d="M260,50 L270,48 Q274,48 276,52 L276,82 L260,82 Z" fill="url(#glass)" stroke="#4a7090" stroke-width="0.8"/>
    <!-- Windshield split (two-piece) -->
    <line x1="268" y1="49" x2="268" y2="82" stroke="#4a7090" stroke-width="0.5"/>

    <!-- ── HOOD (long conventional nose) ── -->
    <!-- The hood slopes down from the cab — classic Peterbilt look -->
    <path d="M268,82 L268,62 Q268,58 272,56 L296,52 Q302,51 304,54 L304,100 L268,100 Z" fill="url(#hoodPaint)" stroke="#7a1515" stroke-width="1.2"/>
    <!-- Hood top contour line -->
    <line x1="270" y1="60" x2="300" y2="53" stroke="#e04040" stroke-width="0.6" opacity="0.5"/>
    <!-- Hood side vent / louvers -->
    <line x1="275" y1="72" x2="295" y2="68" stroke="#7a1515" stroke-width="0.6"/>
    <line x1="275" y1="76" x2="295" y2="72" stroke="#7a1515" stroke-width="0.6"/>
    <line x1="275" y1="80" x2="295" y2="76" stroke="#7a1515" stroke-width="0.6"/>

    <!-- ── FRONT GRILLE (chrome, vertical slats) ── -->
    <rect x="302" y="56" width="6" height="42" rx="1.5" fill="url(#chrome)" stroke="#777" stroke-width="0.8"/>
    <!-- Grille slats -->
    <line x1="303" y1="62" x2="307" y2="62" stroke="#999" stroke-width="0.4"/>
    <line x1="303" y1="66" x2="307" y2="66" stroke="#999" stroke-width="0.4"/>
    <line x1="303" y1="70" x2="307" y2="70" stroke="#999" stroke-width="0.4"/>
    <line x1="303" y1="74" x2="307" y2="74" stroke="#999" stroke-width="0.4"/>
    <line x1="303" y1="78" x2="307" y2="78" stroke="#999" stroke-width="0.4"/>
    <line x1="303" y1="82" x2="307" y2="82" stroke="#999" stroke-width="0.4"/>
    <line x1="303" y1="86" x2="307" y2="86" stroke="#999" stroke-width="0.4"/>
    <line x1="303" y1="90" x2="307" y2="90" stroke="#999" stroke-width="0.4"/>

    <!-- Headlights (round, classic Peterbilt style) -->
    <circle cx="305" cy="60" r="3" fill="#f8f0a0" stroke="#c8a030" stroke-width="0.6"/>
    <circle cx="305" cy="60" r="1.5" fill="#fff" opacity="0.5"/>
    <!-- Lower headlight / fog -->
    <circle cx="305" cy="93" r="2.5" fill="#f8f0a0" stroke="#c8a030" stroke-width="0.5"/>

    <!-- Turn signal -->
    <rect x="303" y="68" width="4" height="2" rx="0.5" fill="#f0a030"/>

    <!-- Front bumper (heavy chrome) -->
    <rect x="304" y="98" width="8" height="5" rx="1.5" fill="url(#chrome)" stroke="#888" stroke-width="0.8"/>
    <!-- Tow hooks -->
    <circle cx="307" cy="104" r="1.2" fill="#777" stroke="#555" stroke-width="0.4"/>
    <circle cx="310" cy="104" r="1.2" fill="#777" stroke="#555" stroke-width="0.4"/>

    <!-- ── EXHAUST STACKS (chrome, behind cab) ── -->
    <rect x="264" y="22" width="3.5" height="32" rx="1.5" fill="url(#chrome)" stroke="#888" stroke-width="0.6"/>
    <!-- Stack top cap -->
    <rect x="263" y="20" width="5.5" height="3" rx="1" fill="#bbb" stroke="#888" stroke-width="0.5"/>

    <!-- ── SIDE MIRROR ── -->
    <line x1="270" y1="56" x2="276" y2="54" stroke="#555" stroke-width="0.8"/>
    <rect x="275" y="50" width="5" height="10" rx="1" fill="#222" stroke="#444" stroke-width="0.4"/>

    <!-- ── FUEL TANK (cylindrical, between cab and rear axles) ── -->
    <rect x="248" y="92" width="20" height="12" rx="5" fill="url(#chrome)" stroke="#888" stroke-width="0.8"/>
    <!-- Fuel cap -->
    <circle cx="258" cy="94" r="1.5" fill="#777" stroke="#666" stroke-width="0.4"/>
    <!-- Tank strap -->
    <line x1="252" y1="91" x2="252" y2="105" stroke="#666" stroke-width="0.6"/>
    <line x1="262" y1="91" x2="262" y2="105" stroke="#666" stroke-width="0.6"/>

    <!-- ── DEF TANK (smaller, blue cap) ── -->
    <rect x="240" y="94" width="7" height="8" rx="2" fill="#aaa" stroke="#888" stroke-width="0.5"/>
    <circle cx="243.5" cy="95.5" r="1" fill="#3a8ad0"/>

    <!-- ── BATTERY BOX ── -->
    <rect x="272" y="92" width="10" height="8" rx="1" fill="#333" stroke="#222" stroke-width="0.5"/>

    <!-- ── STEPS (2-step entry below door) ── -->
    <rect x="238" y="102" width="16" height="3" rx="0.5" fill="#888" stroke="#666" stroke-width="0.4"/>
    <rect x="240" y="105" width="12" height="3" rx="0.5" fill="#777" stroke="#555" stroke-width="0.4"/>

    <!-- ═══ WHEELS ═══ -->
    <!-- STEER AXLE (front, under hood) -->
    <circle cx="298" cy="112" r="7.5" fill="url(#rubber)" stroke="#111" stroke-width="1.2"/>
    <circle cx="298" cy="112" r="4" fill="url(#hubcap)" stroke="#888" stroke-width="0.5"/>
    <circle cx="298" cy="112" r="1" fill="#555"/>
    <!-- Hub detail -->
    <circle cx="296" cy="110" r="0.5" fill="#777"/>
    <circle cx="300" cy="110" r="0.5" fill="#777"/>
    <circle cx="296" cy="114" r="0.5" fill="#777"/>
    <circle cx="300" cy="114" r="0.5" fill="#777"/>

    <!-- DRIVE AXLE 1 (tandem, under cab) -->
    <circle cx="238" cy="112" r="7" fill="url(#rubber)" stroke="#111" stroke-width="1.2"/>
    <circle cx="238" cy="112" r="3.5" fill="url(#hubcap)" stroke="#888" stroke-width="0.5"/>
    <circle cx="238" cy="112" r="0.8" fill="#555"/>

    <!-- DRIVE AXLE 2 -->
    <circle cx="256" cy="112" r="7" fill="url(#rubber)" stroke="#111" stroke-width="1.2"/>
    <circle cx="256" cy="112" r="3.5" fill="url(#hubcap)" stroke="#888" stroke-width="0.5"/>
    <circle cx="256" cy="112" r="0.8" fill="#555"/>

    <!-- Fender over steer axle -->
    <path d="M286,107 Q298,95 310,107" fill="none" stroke="#7a1515" stroke-width="1.2"/>
    <!-- Fender over drive tandems -->
    <path d="M228,107 Q247,96 266,107" fill="url(#cabPaint)" stroke="#7a1515" stroke-width="0.8" opacity="0.6"/>
  </g>

  <!-- ═══ PHYSICS LABELS ═══ -->
  <!-- Weight label pointing at trailer -->
  <text x="115" y="28" text-anchor="middle" font-size="14" font-weight="800" fill="#1a3a6b">3,000 lbs</text>
  <line x1="115" y1="32" x2="115" y2="48" stroke="#1a3a6b" stroke-width="2"/>
  <polygon points="111,47 115,55 119,47" fill="#1a3a6b"/>

  <!-- Grade force arrow (red, pointing downhill along slope) -->
  <line x1="180" y1="94" x2="145" y2="97.5" stroke="#dc2626" stroke-width="2.5"/>
  <polygon points="148,94.5 140,98 148,101" fill="#dc2626"/>
  <text x="155" y="113" font-size="10" font-weight="700" fill="#dc2626">F = ?</text>

  <!-- Title -->
  <text x="200" y="174" text-anchor="middle" font-size="11" font-weight="600" fill="#5a7090">Trailer on 10% Grade &#8212; Find Additional Force</text>
</svg>
