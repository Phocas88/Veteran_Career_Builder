<svg xmlns="http://www.w3.org/2000/svg" width="400" height="180" viewBox="0 0 400 180">
  <style>
    @keyframes hover {
      0% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
      100% { transform: translateY(0); }
    }
    @keyframes rotorSpin {
      0% { transform: scaleX(1); }
      25% { transform: scaleX(0.2); }
      50% { transform: scaleX(-1); }
      75% { transform: scaleX(0.2); }
      100% { transform: scaleX(1); }
    }
    .heli { animation: hover 2s ease-in-out infinite; }
    .rotor { animation: rotorSpin 0.4s linear infinite; transform-origin: 100px 28px; }
    text { font-family: Arial, sans-serif; }
  </style>
  <rect width="400" height="180" rx="12" fill="#f0f4fa" stroke="#d0daea" stroke-width="2"/>

  <!-- Altitude scale on right -->
  <line x1="320" y1="25" x2="320" y2="145" stroke="#1a3a6b" stroke-width="1.5"/>
  <!-- Top tick: 4,500 ft -->
  <line x1="315" y1="30" x2="325" y2="30" stroke="#1a3a6b" stroke-width="2"/>
  <text x="335" y="34" font-size="10" font-weight="700" fill="#1a3a6b">4,500 ft</text>
  <!-- Bottom tick: 1,500 ft -->
  <line x1="315" y1="125" x2="325" y2="125" stroke="#1a3a6b" stroke-width="2"/>
  <text x="335" y="129" font-size="10" font-weight="700" fill="#1a3a6b">1,500 ft</text>
  <!-- Ground -->
  <line x1="280" y1="145" x2="395" y2="145" stroke="#8B7355" stroke-width="2"/>
  <text x="355" y="157" text-anchor="middle" font-size="9" fill="#8B7355">Ground</text>

  <!-- Descent arrow between altitudes -->
  <line x1="300" y1="40" x2="300" y2="115" stroke="#c8960a" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="295,115 300,125 305,115" fill="#c8960a"/>
  <text x="280" y="80" text-anchor="middle" font-size="9" font-weight="600" fill="#c8960a">300 ft/min</text>

  <!-- Helicopter (hovering, NOT descending) -->
  <g class="heli">
    <!-- Body -->
    <ellipse cx="100" cy="42" rx="35" ry="12" fill="#1a3a6b"/>
    <!-- Cockpit window -->
    <ellipse cx="125" cy="40" rx="10" ry="7" fill="#a8d8ea" stroke="#1a3a6b" stroke-width="1"/>
    <!-- Tail boom -->
    <line x1="65" y1="42" x2="35" y2="35" stroke="#1a3a6b" stroke-width="4"/>
    <!-- Tail rotor -->
    <line x1="32" y1="26" x2="38" y2="44" stroke="#1a3a6b" stroke-width="2"/>
    <!-- Rotor mast -->
    <line x1="100" y1="30" x2="100" y2="24" stroke="#1a3a6b" stroke-width="2.5"/>
    <!-- Main rotor (animated spin illusion) -->
    <g class="rotor">
      <line x1="55" y1="28" x2="145" y2="28" stroke="#1a3a6b" stroke-width="3" stroke-linecap="round"/>
    </g>
    <!-- Skids -->
    <line x1="80" y1="54" x2="80" y2="60" stroke="#1a3a6b" stroke-width="2"/>
    <line x1="120" y1="54" x2="120" y2="60" stroke="#1a3a6b" stroke-width="2"/>
    <line x1="70" y1="60" x2="130" y2="60" stroke="#1a3a6b" stroke-width="2.5"/>
  </g>

  <!-- Dashed line connecting helicopter to altitude scale -->
  <line x1="140" y1="42" x2="315" y2="30" stroke="#b0c4de" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Time = ? label -->
  <text x="100" y="95" text-anchor="middle" font-size="18" font-weight="700" fill="#dc2626">Time = ?</text>

  <!-- Descent info -->
  <text x="100" y="115" text-anchor="middle" font-size="10" fill="#5a7090">Distance: 4,500 - 1,500 = 3,000 ft</text>

  <!-- Title -->
  <text x="200" y="172" text-anchor="middle" font-size="12" font-weight="600" fill="#5a7090">Helicopter Descent — Find the Time</text>
</svg>