<svg xmlns="http://www.w3.org/2000/svg" width="400" height="180" viewBox="0 0 400 180">
  <defs>
    <linearGradient id="fluidG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7baed4" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#4a8abf" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="cylWall" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#bcc4d2"/>
      <stop offset="50%" stop-color="#d8dce5"/>
      <stop offset="100%" stop-color="#a8b2c4"/>
    </linearGradient>
    <linearGradient id="pistonG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8090a8"/>
      <stop offset="100%" stop-color="#5a6a82"/>
    </linearGradient>
    <filter id="hs" x="-3%" y="-3%" width="108%" height="108%">
      <feDropShadow dx="1" dy="1" stdDeviation="1" flood-color="#1a3a6b" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#c8960a"/>
    </marker>
  </defs>
  <style>
    @keyframes pushDown { 0%,100% { transform: translateY(0); } 50% { transform: translateY(6px); } }
    .smallPiston { animation: pushDown 2.5s ease-in-out infinite; }
    text { font-family: Arial, sans-serif; }
  </style>
  <!-- Background with grid -->
  <rect width="400" height="180" rx="10" fill="#f0f4fa" stroke="#d0daea" stroke-width="2"/>
  <g stroke="#d8dfe8" stroke-width="0.3">
    <line x1="0" y1="20" x2="400" y2="20"/><line x1="0" y1="40" x2="400" y2="40"/>
    <line x1="0" y1="60" x2="400" y2="60"/><line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="100" x2="400" y2="100"/><line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="140" x2="400" y2="140"/><line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="40" y1="0" x2="40" y2="180"/><line x1="80" y1="0" x2="80" y2="180"/>
    <line x1="120" y1="0" x2="120" y2="180"/><line x1="160" y1="0" x2="160" y2="180"/>
    <line x1="200" y1="0" x2="200" y2="180"/><line x1="240" y1="0" x2="240" y2="180"/>
    <line x1="280" y1="0" x2="280" y2="180"/><line x1="320" y1="0" x2="320" y2="180"/>
    <line x1="360" y1="0" x2="360" y2="180"/>
  </g>

  <!-- Fluid reservoir base -->
  <rect x="55" y="112" width="290" height="28" rx="3" fill="url(#fluidG)" stroke="#1a3a6b" stroke-width="1.8"/>
  <!-- Reservoir walls -->
  <rect x="55" y="112" width="290" height="28" rx="3" fill="none" stroke="#1a3a6b" stroke-width="2"/>

  <!-- Connecting pipe with flanges -->
  <rect x="115" y="114" width="130" height="10" fill="url(#fluidG)"/>
  <rect x="115" y="114" width="6" height="10" fill="#b0b8c8" stroke="#1a3a6b" stroke-width="0.8" rx="1"/>
  <rect x="239" y="114" width="6" height="10" fill="#b0b8c8" stroke="#1a3a6b" stroke-width="0.8" rx="1"/>

  <!-- Pressure gauge on connecting pipe -->
  <circle cx="180" cy="108" r="8" fill="#e8ecf2" stroke="#1a3a6b" stroke-width="1.5"/>
  <line x1="180" y1="114" x2="180" y2="108" stroke="#1a3a6b" stroke-width="1"/>
  <text x="180" y="110" text-anchor="middle" font-size="5" font-weight="700" fill="#1a3a6b">PSI</text>
  <line x1="180" y1="108" x2="184" y2="103" stroke="#dc2626" stroke-width="1"/>
  <!-- Gauge ticks -->
  <line x1="174" y1="102" x2="175" y2="104" stroke="#1a3a6b" stroke-width="0.6"/>
  <line x1="180" y1="100" x2="180" y2="102" stroke="#1a3a6b" stroke-width="0.6"/>
  <line x1="186" y1="102" x2="185" y2="104" stroke="#1a3a6b" stroke-width="0.6"/>

  <!-- SMALL CYLINDER (left) -->
  <g filter="url(#hs)">
    <!-- Cylinder walls -->
    <rect x="70" y="48" width="50" height="66" fill="url(#cylWall)" stroke="#1a3a6b" stroke-width="1.8" rx="2"/>
    <!-- Fluid inside -->
    <rect x="72" y="68" width="46" height="44" fill="url(#fluidG)" rx="1"/>
    <!-- Cylinder bore detail lines -->
    <line x1="72" y1="50" x2="72" y2="112" stroke="#8a9ab5" stroke-width="0.4"/>
    <line x1="118" y1="50" x2="118" y2="112" stroke="#8a9ab5" stroke-width="0.4"/>
  </g>

  <!-- Small piston (animated) -->
  <g class="smallPiston">
    <!-- Piston rod -->
    <rect x="89" y="28" width="12" height="30" fill="url(#pistonG)" stroke="#1a3a6b" stroke-width="1.2" rx="1"/>
    <!-- Piston head -->
    <rect x="73" y="56" width="44" height="12" rx="2" fill="url(#pistonG)" stroke="#1a3a6b" stroke-width="1.5"/>
    <!-- O-ring detail -->
    <line x1="74" y1="60" x2="116" y2="60" stroke="#3a3a3a" stroke-width="1.5" opacity="0.5"/>
    <line x1="74" y1="64" x2="116" y2="64" stroke="#3a3a3a" stroke-width="0.8" opacity="0.3"/>
    <!-- Force arrow -->
    <line x1="95" y1="8" x2="95" y2="26" stroke="#c8960a" stroke-width="2.5" marker-end="url(#arrowGold)"/>
    <text x="95" y="6" text-anchor="middle" font-size="11" font-weight="700" fill="#c8960a">10 lbs</text>
  </g>

  <!-- LARGE CYLINDER (right) -->
  <g filter="url(#hs)">
    <rect x="240" y="48" width="100" height="66" fill="url(#cylWall)" stroke="#1a3a6b" stroke-width="1.8" rx="2"/>
    <rect x="242" y="68" width="96" height="44" fill="url(#fluidG)" rx="1"/>
    <line x1="242" y1="50" x2="242" y2="112" stroke="#8a9ab5" stroke-width="0.4"/>
    <line x1="338" y1="50" x2="338" y2="112" stroke="#8a9ab5" stroke-width="0.4"/>
  </g>

  <!-- Large piston (static) -->
  <rect x="280" y="28" width="18" height="30" fill="url(#pistonG)" stroke="#1a3a6b" stroke-width="1.2" rx="1"/>
  <rect x="243" y="56" width="94" height="12" rx="2" fill="url(#pistonG)" stroke="#1a3a6b" stroke-width="1.5"/>
  <line x1="244" y1="60" x2="336" y2="60" stroke="#3a3a3a" stroke-width="1.5" opacity="0.5"/>
  <line x1="244" y1="64" x2="336" y2="64" stroke="#3a3a3a" stroke-width="0.8" opacity="0.3"/>

  <!-- Labels -->
  <text x="95" y="150" text-anchor="middle" font-size="10" font-weight="700" fill="#1a3a6b">2 sq in</text>
  <text x="290" y="150" text-anchor="middle" font-size="10" font-weight="700" fill="#1a3a6b">20 sq in</text>
  <text x="290" y="24" text-anchor="middle" font-size="14" font-weight="700" fill="#dc2626">F = ?</text>

  <!-- Title -->
  <text x="200" y="172" text-anchor="middle" font-size="11" font-weight="600" fill="#5a7090">Hydraulic System -- Find the Output Force</text>
</svg>