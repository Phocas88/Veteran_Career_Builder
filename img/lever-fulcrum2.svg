<svg xmlns="http://www.w3.org/2000/svg" width="400" height="180" viewBox="0 0 400 180">
  <defs>
    <linearGradient id="lf2Beam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8960a"/>
      <stop offset="40%" stop-color="#e0b840"/>
      <stop offset="100%" stop-color="#a07808"/>
    </linearGradient>
    <linearGradient id="lf2Fulcrum" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a9ab5"/>
      <stop offset="100%" stop-color="#5a7090"/>
    </linearGradient>
    <linearGradient id="lf2Weight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d8a820"/>
      <stop offset="100%" stop-color="#a07808"/>
    </linearGradient>
    <filter id="lf2Sh" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="1" stdDeviation="1.5" flood-color="#1a3a6b" flood-opacity="0.15"/>
    </filter>
    <pattern id="lf2Hatch" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#b0b8c5" stroke-width="1"/>
    </pattern>
  </defs>
  <style>
    text { font-family: Arial, sans-serif; }
  </style>
  <!-- Background with grid -->
  <rect width="400" height="180" rx="10" fill="#f0f4fa" stroke="#d0daea" stroke-width="2"/>
  <g stroke="#d8dfe8" stroke-width="0.3">
    <line x1="0" y1="20" x2="400" y2="20"/><line x1="0" y1="40" x2="400" y2="40"/>
    <line x1="0" y1="60" x2="400" y2="60"/><line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="100" x2="400" y2="100"/><line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="140" x2="400" y2="140"/><line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="20" y1="0" x2="20" y2="180"/><line x1="40" y1="0" x2="40" y2="180"/>
    <line x1="60" y1="0" x2="60" y2="180"/><line x1="80" y1="0" x2="80" y2="180"/>
    <line x1="100" y1="0" x2="100" y2="180"/><line x1="120" y1="0" x2="120" y2="180"/>
    <line x1="140" y1="0" x2="140" y2="180"/><line x1="160" y1="0" x2="160" y2="180"/>
    <line x1="180" y1="0" x2="180" y2="180"/><line x1="200" y1="0" x2="200" y2="180"/>
    <line x1="220" y1="0" x2="220" y2="180"/><line x1="240" y1="0" x2="240" y2="180"/>
    <line x1="260" y1="0" x2="260" y2="180"/><line x1="280" y1="0" x2="280" y2="180"/>
    <line x1="300" y1="0" x2="300" y2="180"/><line x1="320" y1="0" x2="320" y2="180"/>
    <line x1="340" y1="0" x2="340" y2="180"/><line x1="360" y1="0" x2="360" y2="180"/>
    <line x1="380" y1="0" x2="380" y2="180"/>
  </g>

  <!-- Ground -->
  <line x1="20" y1="140" x2="380" y2="140" stroke="#8a9ab0" stroke-width="1.5"/>
  <rect x="20" y="140" width="360" height="8" fill="url(#lf2Hatch)"/>

  <!-- Fulcrum at 2 ft from left end -->
  <g filter="url(#lf2Sh)">
    <polygon points="120,140 103,102 137,102" fill="url(#lf2Fulcrum)" stroke="#1a3a6b" stroke-width="1.8"/>
  </g>

  <g>
    <!-- Lever beam -->
    <g filter="url(#lf2Sh)">
      <rect x="45" y="89" width="325" height="14" fill="url(#lf2Beam)" stroke="#8a6000" stroke-width="1.8" rx="2"/>
      <rect x="47" y="90" width="321" height="3" fill="#e8c850" opacity="0.5" rx="1"/>
    </g>

    <!-- Weight (left side, 2 ft from fulcrum) -->
    <g filter="url(#lf2Sh)">
      <rect x="50" y="47" width="50" height="44" fill="url(#lf2Weight)" stroke="#8a6000" stroke-width="2" rx="4"/>
      <text x="75" y="67" text-anchor="middle" font-size="13" font-weight="800" fill="#fff">100</text>
      <text x="75" y="83" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">lbs</text>
    </g>

    <!-- Force arrow (right side, 8 ft from fulcrum) -->
    <line x1="345" y1="89" x2="345" y2="40" stroke="#dc2626" stroke-width="3"/>
    <polygon points="338,48 345,30 352,48" fill="#dc2626"/>
    <text x="345" y="25" text-anchor="middle" font-size="14" font-weight="800" fill="#dc2626">? lbs</text>
  </g>

  <!-- Distance dimension lines -->
  <line x1="75" y1="112" x2="75" y2="133" stroke="#5a7090" stroke-width="0.8"/>
  <line x1="120" y1="112" x2="120" y2="133" stroke="#5a7090" stroke-width="0.8"/>
  <line x1="345" y1="112" x2="345" y2="133" stroke="#5a7090" stroke-width="0.8"/>
  <!-- 2 ft span -->
  <line x1="75" y1="127" x2="120" y2="127" stroke="#c8960a" stroke-width="2"/>
  <polygon points="75,127 81,124 81,130" fill="#c8960a"/>
  <polygon points="120,127 114,124 114,130" fill="#c8960a"/>
  <text x="97" y="123" text-anchor="middle" font-size="12" font-weight="700" fill="#c8960a">2 ft</text>
  <!-- 8 ft span -->
  <line x1="120" y1="127" x2="345" y2="127" stroke="#dc2626" stroke-width="2"/>
  <polygon points="120,127 126,124 126,130" fill="#dc2626"/>
  <polygon points="345,127 339,124 339,130" fill="#dc2626"/>
  <text x="232" y="123" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">8 ft</text>

  <!-- Fulcrum label -->
  <text x="120" y="158" text-anchor="middle" font-size="10" font-weight="700" fill="#5a7090">FULCRUM</text>

  <!-- Title -->
  <text x="200" y="175" text-anchor="middle" font-size="11" font-weight="600" fill="#5a7090">Lever -- Find the Effort Force</text>
</svg>