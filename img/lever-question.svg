<svg xmlns="http://www.w3.org/2000/svg" width="400" height="180" viewBox="0 0 400 180">
  <style>text { font-family: Arial, sans-serif; }</style>
  <rect width="400" height="180" rx="12" fill="#f0f4fa" stroke="#d0daea" stroke-width="2"/>

  <!-- Ground -->
  <line x1="20" y1="140" x2="380" y2="140" stroke="#a0a0a0" stroke-width="1.5"/>
  <pattern id="hatch" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
    <line x1="0" y1="0" x2="0" y2="8" stroke="#c0c0c0" stroke-width="1"/>
  </pattern>
  <rect x="20" y="140" width="360" height="10" fill="url(#hatch)"/>

  <!-- Fulcrum (triangle) -->
  <polygon points="200,140 185,105 215,105" fill="#5a7090" stroke="#3a5070" stroke-width="2"/>
  <text x="200" y="160" text-anchor="middle" font-size="11" font-weight="700" fill="#5a7090">▲ FULCRUM</text>

  <!-- Beam -->
  <rect x="50" y="92" width="300" height="14" fill="#d4a574" stroke="#8b6914" stroke-width="2" rx="3"/>

  <!-- Weight (left side) -->
  <rect x="85" y="55" width="50" height="40" fill="#c8960a" stroke="#8a6000" stroke-width="2" rx="5"/>
  <text x="110" y="72" text-anchor="middle" font-size="14" font-weight="800" fill="#fff">50</text>
  <text x="110" y="86" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">kg</text>

  <!-- Force arrow (right side) -->
  <line x1="300" y1="92" x2="300" y2="40" stroke="#dc2626" stroke-width="3"/>
  <polygon points="293,48 300,30 307,48" fill="#dc2626"/>
  <text x="300" y="25" text-anchor="middle" font-size="14" font-weight="800" fill="#dc2626">? kg</text>

  <!-- Distance markers -->
  <line x1="110" y1="115" x2="110" y2="135" stroke="#888" stroke-width="1"/>
  <line x1="200" y1="115" x2="200" y2="135" stroke="#888" stroke-width="1"/>
  <line x1="300" y1="115" x2="300" y2="135" stroke="#888" stroke-width="1"/>
  <line x1="110" y1="128" x2="200" y2="128" stroke="#c8960a" stroke-width="2"/>
  <line x1="200" y1="128" x2="300" y2="128" stroke="#dc2626" stroke-width="2"/>
  <text x="155" y="125" text-anchor="middle" font-size="12" font-weight="700" fill="#c8960a">2 m</text>
  <text x="250" y="125" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">6 m</text>
</svg>
