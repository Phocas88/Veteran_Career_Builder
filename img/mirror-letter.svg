<svg xmlns="http://www.w3.org/2000/svg" width="400" height="180" viewBox="0 0 400 180">
  <defs>
    <linearGradient id="mirrorGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b0c4de"/>
      <stop offset="30%" stop-color="#e8eef6"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#e8eef6"/>
      <stop offset="100%" stop-color="#b0c4de"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0)">
        <animate attributeName="stop-color" values="rgba(255,255,255,0);rgba(255,255,255,0.8);rgba(255,255,255,0)" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="rgba(255,255,255,0.8)">
        <animate attributeName="stop-color" values="rgba(255,255,255,0.8);rgba(255,255,255,0);rgba(255,255,255,0.8)" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="rgba(255,255,255,0)">
        <animate attributeName="stop-color" values="rgba(255,255,255,0);rgba(255,255,255,0.8);rgba(255,255,255,0)" dur="3s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>
  <style>
    text { font-family: Arial, sans-serif; }
  </style>
  <rect width="400" height="180" rx="12" fill="#f0f4fa" stroke="#d0daea" stroke-width="2"/>

  <!-- Title -->
  <text x="200" y="22" text-anchor="middle" font-family="Arial" font-size="11" fill="#5a7090" font-weight="600">Mirror Reflection — What Does 'b' Look Like?</text>

  <!-- Left side: the letter b -->
  <text x="110" y="120" text-anchor="middle" font-family="Arial" font-size="72" font-weight="700" fill="#1a3a6b">b</text>
  <text x="110" y="155" text-anchor="middle" font-family="Arial" font-size="11" fill="#5a7090">Original</text>

  <!-- Mirror surface -->
  <rect x="190" y="35" width="12" height="130" rx="3" fill="url(#mirrorGrad)" stroke="#8a9bb5" stroke-width="1.5"/>
  <rect x="190" y="35" width="12" height="130" rx="3" fill="url(#shimmer)" opacity="0.6"/>
  <!-- Mirror frame top/bottom -->
  <rect x="187" y="32" width="18" height="5" rx="2" fill="#8a9bb5"/>
  <rect x="187" y="163" width="18" height="5" rx="2" fill="#8a9bb5"/>
  <text x="196" y="178" text-anchor="middle" font-family="Arial" font-size="9" fill="#8a9bb5">Mirror</text>

  <!-- Right side: reflection = ? -->
  <rect x="250" y="60" width="80" height="80" rx="8" fill="rgba(220,38,38,.08)" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="290" y="115" text-anchor="middle" font-family="Arial" font-size="52" font-weight="700" fill="#dc2626">?</text>
  <text x="290" y="155" text-anchor="middle" font-family="Arial" font-size="11" fill="#dc2626" font-weight="600">Reflection</text>

  <!-- Arrow -->
  <text x="222" y="105" font-family="Arial" font-size="20" fill="#c8960a">→</text>
</svg>