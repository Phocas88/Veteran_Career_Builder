<svg xmlns="http://www.w3.org/2000/svg" width="400" height="200" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="mlMirrorGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b0c4de"/>
      <stop offset="30%" stop-color="#e8eef6"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#e8eef6"/>
      <stop offset="100%" stop-color="#b0c4de"/>
    </linearGradient>
    <linearGradient id="mlShimmer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0)">
        <animate attributeName="stop-color" values="rgba(255,255,255,0);rgba(255,255,255,0.8);rgba(255,255,255,0)" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="rgba(255,255,255,0.8)">
        <animate attributeName="stop-color" values="rgba(255,255,255,0.8);rgba(255,255,255,0);rgba(255,255,255,0.8)" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="rgba(255,255,255,0)">
        <animate attributeName="stop-color" values="rgba(255,255,255,0);rgba(255,255,255,0.8);rgba(255,255,255,0)" dur="3s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="mlShadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="1" stdDeviation="1.5" flood-color="#1a3a6b" flood-opacity="0.15"/>
    </filter>
  </defs>
  <style>
    text { font-family: Arial, sans-serif; }
  </style>
  <!-- Background with grid -->
  <rect width="400" height="200" rx="10" fill="#f0f4fa" stroke="#d0daea" stroke-width="2"/>
  <g stroke="#d8dfe8" stroke-width="0.3">
    <line x1="0" y1="20" x2="400" y2="20"/><line x1="0" y1="40" x2="400" y2="40"/>
    <line x1="0" y1="60" x2="400" y2="60"/><line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="100" x2="400" y2="100"/><line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="140" x2="400" y2="140"/><line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="0" y1="180" x2="400" y2="180"/>
    <line x1="20" y1="0" x2="20" y2="200"/><line x1="40" y1="0" x2="40" y2="200"/>
    <line x1="60" y1="0" x2="60" y2="200"/><line x1="80" y1="0" x2="80" y2="200"/>
    <line x1="100" y1="0" x2="100" y2="200"/><line x1="120" y1="0" x2="120" y2="200"/>
    <line x1="140" y1="0" x2="140" y2="200"/><line x1="160" y1="0" x2="160" y2="200"/>
    <line x1="180" y1="0" x2="180" y2="200"/><line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="220" y1="0" x2="220" y2="200"/><line x1="240" y1="0" x2="240" y2="200"/>
    <line x1="260" y1="0" x2="260" y2="200"/><line x1="280" y1="0" x2="280" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/><line x1="320" y1="0" x2="320" y2="200"/>
    <line x1="340" y1="0" x2="340" y2="200"/><line x1="360" y1="0" x2="360" y2="200"/>
    <line x1="380" y1="0" x2="380" y2="200"/>
  </g>

  <!-- Title -->
  <text x="200" y="18" text-anchor="middle" font-size="11" fill="#5a7090" font-weight="600">Mirror Reflection -- What Does "b" Look Like?</text>

  <!-- Left side: the letter b in a card -->
  <g filter="url(#mlShadow)">
    <rect x="30" y="40" width="100" height="120" rx="8" fill="#fff" stroke="#1a3a6b" stroke-width="2"/>
    <text x="80" y="125" text-anchor="middle" font-size="80" font-weight="700" fill="#1a3a6b" font-style="normal">b</text>
  </g>
  <text x="80" y="175" text-anchor="middle" font-size="11" fill="#5a7090" font-weight="600">Original</text>

  <!-- Arrow -->
  <line x1="145" y1="100" x2="170" y2="100" stroke="#c8960a" stroke-width="2" marker-end="url(#mlArr)"/>
  <text x="158" y="95" text-anchor="middle" font-size="14" fill="#c8960a" font-weight="700">--&gt;</text>

  <!-- Mirror surface -->
  <rect x="185" y="30" width="14" height="148" rx="3" fill="url(#mlMirrorGrad)" stroke="#8a9bb5" stroke-width="1.5"/>
  <rect x="185" y="30" width="14" height="148" rx="3" fill="url(#mlShimmer)" opacity="0.6"/>
  <!-- Mirror frame top/bottom -->
  <rect x="182" y="26" width="20" height="6" rx="2" fill="#8a9bb5"/>
  <rect x="182" y="176" width="20" height="6" rx="2" fill="#8a9bb5"/>
  <text x="192" y="194" text-anchor="middle" font-size="9" fill="#8a9bb5">Mirror</text>

  <!-- Arrow from mirror to reflection -->
  <text x="220" y="105" font-size="14" fill="#c8960a" font-weight="700">--&gt;</text>

  <!-- Right side: reflection = ? -->
  <rect x="260" y="40" width="100" height="120" rx="8" fill="rgba(220,38,38,0.06)" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="310" y="120" text-anchor="middle" font-size="60" font-weight="700" fill="#dc2626">?</text>
  <text x="310" y="175" text-anchor="middle" font-size="11" fill="#dc2626" font-weight="600">Reflection</text>

  <!-- Bottom note -->
  <text x="200" y="194" text-anchor="middle" font-size="9" fill="#8a9ab5">What letter appears in the mirror?</text>
</svg>