<svg xmlns="http://www.w3.org/2000/svg" width="400" height="180" viewBox="0 0 400 180">
  <style>
    .dot { fill: #c8960a; }
    text { font-family: Arial, sans-serif; }
  </style>
  <rect width="400" height="180" rx="12" fill="#f0f4fa" stroke="#d0daea" stroke-width="2"/>

  <!-- Main wires -->
  <line x1="60" y1="40" x2="140" y2="40" stroke="#1a3a6b" stroke-width="2.5"/>
  <line x1="260" y1="40" x2="340" y2="40" stroke="#1a3a6b" stroke-width="2.5"/>
  <line x1="60" y1="40" x2="60" y2="140" stroke="#1a3a6b" stroke-width="2.5"/>
  <line x1="60" y1="140" x2="140" y2="140" stroke="#1a3a6b" stroke-width="2.5"/>
  <line x1="260" y1="140" x2="340" y2="140" stroke="#1a3a6b" stroke-width="2.5"/>
  <line x1="340" y1="40" x2="340" y2="140" stroke="#1a3a6b" stroke-width="2.5"/>

  <!-- Split into two branches -->
  <!-- Top branch -->
  <line x1="140" y1="40" x2="140" y2="60" stroke="#1a3a6b" stroke-width="2.5"/>
  <line x1="140" y1="60" x2="160" y2="60" stroke="#1a3a6b" stroke-width="2.5"/>
  <!-- Top resistor zigzag -->
  <polyline points="160,60 165,52 175,68 185,52 195,68 205,52 215,68 220,60 240,60"
            fill="none" stroke="#1a3a6b" stroke-width="2.5" stroke-linejoin="round"/>
  <line x1="240" y1="60" x2="260" y2="60" stroke="#1a3a6b" stroke-width="2.5"/>
  <line x1="260" y1="60" x2="260" y2="40" stroke="#1a3a6b" stroke-width="2.5"/>
  <!-- Top resistor label -->
  <text x="200" y="48" text-anchor="middle" font-size="12" font-weight="700" fill="#1a3a6b">6Ω</text>

  <!-- Bottom branch -->
  <line x1="140" y1="140" x2="140" y2="120" stroke="#1a3a6b" stroke-width="2.5"/>
  <line x1="140" y1="120" x2="160" y2="120" stroke="#1a3a6b" stroke-width="2.5"/>
  <!-- Bottom resistor zigzag -->
  <polyline points="160,120 165,112 175,128 185,112 195,128 205,112 215,128 220,120 240,120"
            fill="none" stroke="#1a3a6b" stroke-width="2.5" stroke-linejoin="round"/>
  <line x1="240" y1="120" x2="260" y2="120" stroke="#1a3a6b" stroke-width="2.5"/>
  <line x1="260" y1="120" x2="260" y2="140" stroke="#1a3a6b" stroke-width="2.5"/>
  <!-- Bottom resistor label -->
  <text x="200" y="112" text-anchor="middle" font-size="12" font-weight="700" fill="#1a3a6b">6Ω</text>

  <!-- Battery on left -->
  <line x1="48" y1="75" x2="72" y2="75" stroke="#1a3a6b" stroke-width="3"/>
  <line x1="54" y1="82" x2="66" y2="82" stroke="#1a3a6b" stroke-width="1.5"/>
  <line x1="48" y1="89" x2="72" y2="89" stroke="#1a3a6b" stroke-width="3"/>
  <line x1="54" y1="96" x2="66" y2="96" stroke="#1a3a6b" stroke-width="1.5"/>
  <text x="38" y="80" text-anchor="end" font-size="10" font-weight="700" fill="#1a3a6b">+</text>
  <text x="38" y="96" text-anchor="end" font-size="12" font-weight="700" fill="#1a3a6b">−</text>

  <!-- Junction split indicators -->
  <circle cx="140" cy="40" r="3" fill="#1a3a6b"/>
  <circle cx="260" cy="40" r="3" fill="#1a3a6b"/>
  <circle cx="140" cy="140" r="3" fill="#1a3a6b"/>
  <circle cx="260" cy="140" r="3" fill="#1a3a6b"/>

  <!-- Animated current dots - main top wire -->
  <circle class="dot" r="3"><animateMotion dur="2.5s" repeatCount="indefinite" path="M60,40 L140,40" begin="0s"/></circle>
  <!-- Top branch -->
  <circle class="dot" r="3"><animateMotion dur="2s" repeatCount="indefinite" path="M140,40 L140,60 L260,60 L260,40" begin="0s"/></circle>
  <!-- Bottom branch -->
  <circle class="dot" r="3"><animateMotion dur="2s" repeatCount="indefinite" path="M140,140 L140,120 L260,120 L260,140" begin="0s"/></circle>
  <!-- Right side down -->
  <circle class="dot" r="3"><animateMotion dur="2.5s" repeatCount="indefinite" path="M340,40 L340,140" begin="0s"/></circle>
  <!-- Bottom wire -->
  <circle class="dot" r="3"><animateMotion dur="2.5s" repeatCount="indefinite" path="M260,140 L60,140" begin="0s"/></circle>

  <!-- Unknown label -->
  <text x="200" y="90" text-anchor="middle" font-size="15" font-weight="700" fill="#dc2626">Total R = ?</text>

  <!-- Title -->
  <text x="200" y="168" text-anchor="middle" font-size="12" font-weight="600" fill="#5a7090">Parallel Resistors — Find Total Resistance</text>
</svg>