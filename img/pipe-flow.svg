<svg xmlns="http://www.w3.org/2000/svg" width="400" height="180" viewBox="0 0 400 180">
  <defs>
    <linearGradient id="pipeWallG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b0b8c8"/>
      <stop offset="50%" stop-color="#d0d6e0"/>
      <stop offset="100%" stop-color="#9aa4b6"/>
    </linearGradient>
    <linearGradient id="fluidWide" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6ba8d4" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#3a82b8" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="fluidNarrow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a98c8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#2a72a8" stop-opacity="0.8"/>
    </linearGradient>
    <filter id="pfs" x="-2%" y="-2%" width="106%" height="106%">
      <feDropShadow dx="1" dy="1" stdDeviation="1" flood-color="#1a3a6b" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowFlow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#c8960a"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,1 L8,5 L0,9 Z" fill="#4a8abf"/>
    </marker>
  </defs>
  <style>
    @keyframes flowSlow { 0% { transform: translateX(0); } 100% { transform: translateX(35px); } }
    .slowParticle { animation: flowSlow 2.5s linear infinite; }
    .particle { fill: #4a90d9; }
    text { font-family: Arial, sans-serif; }
  </style>
  <!-- Background with grid -->
  <rect width="400" height="180" rx="10" fill="#f0f4fa" stroke="#d0daea" stroke-width="2"/>
  <g stroke="#d8dfe8" stroke-width="0.3">
    <line x1="0" y1="20" x2="400" y2="20"/><line x1="0" y1="40" x2="400" y2="40"/>
    <line x1="0" y1="60" x2="400" y2="60"/><line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="100" x2="400" y2="100"/><line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="140" x2="400" y2="140"/><line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="40" y1="0" x2="40" y2="180"/><line x1="80" y1="0" x2="80" y2="180"/>
    <line x1="120" y1="0" x2="120" y2="180"/><line x1="160" y1="0" x2="160" y2="180"/>
    <line x1="200" y1="0" x2="200" y2="180"/><line x1="240" y1="0" x2="240" y2="180"/>
    <line x1="280" y1="0" x2="280" y2="180"/><line x1="320" y1="0" x2="320" y2="180"/>
    <line x1="360" y1="0" x2="360" y2="180"/>
  </g>

  <!-- PIPE STRUCTURE -->
  <g filter="url(#pfs)">
    <!-- Wide pipe - top wall -->
    <rect x="25" y="40" width="180" height="6" rx="1" fill="url(#pipeWallG)" stroke="#1a3a6b" stroke-width="1.2"/>
    <!-- Wide pipe - bottom wall -->
    <rect x="25" y="104" width="180" height="6" rx="1" fill="url(#pipeWallG)" stroke="#1a3a6b" stroke-width="1.2"/>

    <!-- Transition (converging section) - top wall -->
    <polygon points="205,40 205,46 255,66 255,60" fill="url(#pipeWallG)" stroke="#1a3a6b" stroke-width="1.2"/>
    <!-- Transition - bottom wall -->
    <polygon points="205,104 205,110 255,90 255,84" fill="url(#pipeWallG)" stroke="#1a3a6b" stroke-width="1.2"/>

    <!-- Narrow pipe - top wall -->
    <rect x="255" y="60" width="120" height="6" rx="1" fill="url(#pipeWallG)" stroke="#1a3a6b" stroke-width="1.2"/>
    <!-- Narrow pipe - bottom wall -->
    <rect x="255" y="84" width="120" height="6" rx="1" fill="url(#pipeWallG)" stroke="#1a3a6b" stroke-width="1.2"/>

    <!-- Entry flange -->
    <rect x="22" y="36" width="8" height="82" rx="2" fill="#a0a8b8" stroke="#1a3a6b" stroke-width="1"/>
    <!-- Exit flange -->
    <rect x="372" y="56" width="8" height="42" rx="2" fill="#a0a8b8" stroke="#1a3a6b" stroke-width="1"/>
  </g>

  <!-- Fluid fill inside pipe -->
  <rect x="30" y="46" width="175" height="58" fill="url(#fluidWide)" rx="1"/>
  <polygon points="205,46 205,104 255,84 255,66" fill="url(#fluidWide)"/>
  <rect x="255" y="66" width="117" height="18" fill="url(#fluidNarrow)" rx="1"/>

  <!-- Animated particles in wide section (slow) -->
  <g class="slowParticle">
    <circle cx="50" cy="65" r="3" class="particle" opacity="0.6"/>
    <circle cx="50" cy="85" r="3" class="particle" opacity="0.6"/>
    <circle cx="95" cy="58" r="3" class="particle" opacity="0.6"/>
    <circle cx="95" cy="75" r="3" class="particle" opacity="0.6"/>
    <circle cx="95" cy="92" r="3" class="particle" opacity="0.6"/>
    <circle cx="140" cy="62" r="3" class="particle" opacity="0.6"/>
    <circle cx="140" cy="82" r="3" class="particle" opacity="0.6"/>
    <circle cx="140" cy="98" r="3" class="particle" opacity="0.6"/>
  </g>

  <!-- Static particles in narrow section (the question is about their velocity) -->
  <circle cx="275" cy="75" r="2.5" class="particle" opacity="0.7"/>
  <circle cx="305" cy="75" r="2.5" class="particle" opacity="0.7"/>
  <circle cx="335" cy="75" r="2.5" class="particle" opacity="0.7"/>
  <circle cx="355" cy="75" r="2.5" class="particle" opacity="0.7"/>

  <!-- Flow direction arrows inside pipe -->
  <line x1="55" y1="75" x2="85" y2="75" stroke="#4a8abf" stroke-width="1.2" marker-end="url(#arrowBlue)" opacity="0.5"/>
  <line x1="110" y1="75" x2="140" y2="75" stroke="#4a8abf" stroke-width="1.2" marker-end="url(#arrowBlue)" opacity="0.5"/>

  <!-- Diameter dimension: wide section -->
  <line x1="20" y1="42" x2="20" y2="108" stroke="#1a3a6b" stroke-width="1.3"/>
  <line x1="16" y1="43" x2="24" y2="43" stroke="#1a3a6b" stroke-width="1.3"/>
  <line x1="16" y1="107" x2="24" y2="107" stroke="#1a3a6b" stroke-width="1.3"/>
  <text x="14" y="80" text-anchor="end" font-size="11" font-weight="700" fill="#1a3a6b">2"</text>

  <!-- Diameter dimension: narrow section -->
  <line x1="382" y1="62" x2="382" y2="88" stroke="#1a3a6b" stroke-width="1.3"/>
  <line x1="378" y1="63" x2="386" y2="63" stroke="#1a3a6b" stroke-width="1.3"/>
  <line x1="378" y1="87" x2="386" y2="87" stroke="#1a3a6b" stroke-width="1.3"/>
  <text x="392" y="79" font-size="11" font-weight="700" fill="#1a3a6b">1"</text>

  <!-- Velocity labels -->
  <text x="115" y="38" text-anchor="middle" font-size="12" font-weight="700" fill="#1a3a6b">4 ft/s</text>
  <text x="315" y="56" text-anchor="middle" font-size="13" font-weight="700" fill="#dc2626">? ft/s</text>

  <!-- Flow direction arrow below -->
  <line x1="70" y1="126" x2="330" y2="126" stroke="#c8960a" stroke-width="2" marker-end="url(#arrowFlow)"/>
  <text x="200" y="140" text-anchor="middle" font-size="10" fill="#c8960a" font-weight="600">flow direction</text>

  <!-- Title -->
  <text x="200" y="164" text-anchor="middle" font-size="11" font-weight="600" fill="#5a7090">Continuity Equation -- Find the Velocity</text>
</svg>