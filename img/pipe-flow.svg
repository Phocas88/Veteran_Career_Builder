<svg xmlns="http://www.w3.org/2000/svg" width="400" height="180" viewBox="0 0 400 180">
  <style>
    @keyframes flowSlow { 0% { transform: translateX(0); } 100% { transform: translateX(60px); } }
    @keyframes flowFast { 0% { transform: translateX(0); } 100% { transform: translateX(60px); } }
    .slow { animation: flowSlow 2s linear infinite; }
    .fast { animation: flowFast 1s linear infinite; }
    .particle { fill: #4a90d9; }
    text { font-family: Arial, sans-serif; }
  </style>
  <rect width="400" height="180" rx="12" fill="#f0f4fa" stroke="#d0daea" stroke-width="2"/>

  <!-- Wide pipe section -->
  <rect x="30" y="50" width="170" height="60" rx="4" fill="#dce4f0" stroke="#1a3a6b" stroke-width="2"/>

  <!-- Transition / narrowing -->
  <polygon points="200,50 250,70 250,90 200,110" fill="#dce4f0" stroke="#1a3a6b" stroke-width="2"/>

  <!-- Narrow pipe section -->
  <rect x="250" y="70" width="120" height="20" rx="3" fill="#dce4f0" stroke="#1a3a6b" stroke-width="2"/>

  <!-- Water fill -->
  <rect x="32" y="52" width="166" height="56" rx="3" fill="#a8c4e0" opacity=".4"/>
  <polygon points="200,52 248,71 248,89 200,108" fill="#a8c4e0" opacity=".4"/>
  <rect x="252" y="72" width="116" height="16" rx="2" fill="#a8c4e0" opacity=".4"/>

  <!-- Animated particles - wide section (slow) -->
  <g class="slow">
    <circle cx="50" cy="75" r="3" class="particle" opacity=".7"/>
    <circle cx="50" cy="85" r="3" class="particle" opacity=".7"/>
    <circle cx="100" cy="70" r="3" class="particle" opacity=".7"/>
    <circle cx="100" cy="90" r="3" class="particle" opacity=".7"/>
    <circle cx="150" cy="78" r="3" class="particle" opacity=".7"/>
    <circle cx="150" cy="88" r="3" class="particle" opacity=".7"/>
  </g>

  <!-- Animated particles - narrow section (fast) -->
  <g class="fast">
    <circle cx="270" cy="80" r="2.5" class="particle" opacity=".8"/>
    <circle cx="310" cy="80" r="2.5" class="particle" opacity=".8"/>
    <circle cx="340" cy="80" r="2.5" class="particle" opacity=".8"/>
  </g>

  <!-- Diameter labels -->
  <!-- Wide side -->
  <line x1="28" y1="48" x2="28" y2="112" stroke="#1a3a6b" stroke-width="1.5"/>
  <line x1="24" y1="50" x2="32" y2="50" stroke="#1a3a6b" stroke-width="1.5"/>
  <line x1="24" y1="110" x2="32" y2="110" stroke="#1a3a6b" stroke-width="1.5"/>
  <text x="18" y="84" text-anchor="end" font-size="11" font-weight="700" fill="#1a3a6b">2"</text>

  <!-- Narrow side -->
  <line x1="375" y1="68" x2="375" y2="92" stroke="#1a3a6b" stroke-width="1.5"/>
  <line x1="371" y1="70" x2="379" y2="70" stroke="#1a3a6b" stroke-width="1.5"/>
  <line x1="371" y1="90" x2="379" y2="90" stroke="#1a3a6b" stroke-width="1.5"/>
  <text x="385" y="84" font-size="11" font-weight="700" fill="#1a3a6b">1"</text>

  <!-- Velocity labels -->
  <text x="115" y="44" text-anchor="middle" font-size="12" font-weight="700" fill="#1a3a6b">4 ft/s</text>
  <text x="310" y="64" text-anchor="middle" font-size="13" font-weight="700" fill="#dc2626">? ft/s</text>

  <!-- Flow direction arrow -->
  <line x1="80" y1="125" x2="320" y2="125" stroke="#c8960a" stroke-width="2" marker-end="url(#arrowFlow)"/>
  <text x="200" y="140" text-anchor="middle" font-size="10" fill="#c8960a" font-weight="600">flow direction</text>

  <defs>
    <marker id="arrowFlow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#c8960a"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="200" y="168" text-anchor="middle" font-size="12" font-weight="600" fill="#5a7090">Continuity Equation — Find the Velocity</text>
</svg>