<svg xmlns="http://www.w3.org/2000/svg" width="400" height="180" viewBox="0 0 400 180">
  <defs>
    <linearGradient id="pqTank" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a0b0c8"/>
      <stop offset="30%" stop-color="#d0d8e6"/>
      <stop offset="70%" stop-color="#dce4f0"/>
      <stop offset="100%" stop-color="#8a9ab5"/>
    </linearGradient>
    <linearGradient id="pqPipe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b8c8dc"/>
      <stop offset="50%" stop-color="#d0daea"/>
      <stop offset="100%" stop-color="#98a8bf"/>
    </linearGradient>
    <linearGradient id="pqGauge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f8f8"/>
      <stop offset="100%" stop-color="#e0e0e0"/>
    </linearGradient>
    <filter id="pqSh" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="1" stdDeviation="1.5" flood-color="#1a3a6b" flood-opacity="0.15"/>
    </filter>
  </defs>
  <style>text { font-family: Arial, sans-serif; }</style>
  <!-- Background with grid -->
  <rect width="400" height="180" rx="10" fill="#f0f4fa" stroke="#d0daea" stroke-width="2"/>
  <g stroke="#d8dfe8" stroke-width="0.3">
    <line x1="0" y1="20" x2="400" y2="20"/><line x1="0" y1="40" x2="400" y2="40"/>
    <line x1="0" y1="60" x2="400" y2="60"/><line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="100" x2="400" y2="100"/><line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="140" x2="400" y2="140"/><line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="20" y1="0" x2="20" y2="180"/><line x1="40" y1="0" x2="40" y2="180"/>
    <line x1="60" y1="0" x2="60" y2="180"/><line x1="80" y1="0" x2="80" y2="180"/>
    <line x1="100" y1="0" x2="100" y2="180"/><line x1="120" y1="0" x2="120" y2="180"/>
    <line x1="140" y1="0" x2="140" y2="180"/><line x1="160" y1="0" x2="160" y2="180"/>
    <line x1="180" y1="0" x2="180" y2="180"/><line x1="200" y1="0" x2="200" y2="180"/>
    <line x1="220" y1="0" x2="220" y2="180"/><line x1="240" y1="0" x2="240" y2="180"/>
    <line x1="260" y1="0" x2="260" y2="180"/><line x1="280" y1="0" x2="280" y2="180"/>
    <line x1="300" y1="0" x2="300" y2="180"/><line x1="320" y1="0" x2="320" y2="180"/>
    <line x1="340" y1="0" x2="340" y2="180"/><line x1="360" y1="0" x2="360" y2="180"/>
    <line x1="380" y1="0" x2="380" y2="180"/>
  </g>

  <!-- Tank A (pressure vessel with domed ends) -->
  <g filter="url(#pqSh)">
    <!-- Main body -->
    <rect x="40" y="50" width="100" height="65" fill="url(#pqTank)" stroke="#1a3a6b" stroke-width="2"/>
    <!-- Left dome -->
    <ellipse cx="40" cy="82" rx="12" ry="32.5" fill="url(#pqTank)" stroke="#1a3a6b" stroke-width="2"/>
    <!-- Right dome -->
    <ellipse cx="140" cy="82" rx="12" ry="32.5" fill="url(#pqTank)" stroke="#1a3a6b" stroke-width="2"/>
    <!-- Highlight band -->
    <rect x="40" y="58" width="100" height="4" fill="#e8eef6" opacity="0.6" rx="1"/>
    <!-- Weld seam -->
    <line x1="40" y1="82" x2="140" y2="82" stroke="#9aacbf" stroke-width="0.5" stroke-dasharray="3,3"/>
  </g>
  <!-- Tank A gauge -->
  <circle cx="90" cy="42" r="12" fill="url(#pqGauge)" stroke="#1a3a6b" stroke-width="1.5"/>
  <line x1="90" y1="50" x2="90" y2="42" stroke="#1a3a6b" stroke-width="0.8"/>
  <!-- Gauge needle pointing high -->
  <line x1="90" y1="42" x2="82" y2="36" stroke="#dc2626" stroke-width="1.5"/>
  <circle cx="90" cy="42" r="1.5" fill="#1a3a6b"/>
  <text x="90" y="30" text-anchor="middle" font-size="7" font-weight="600" fill="#1a3a6b">PSI</text>
  <!-- Tank A labels -->
  <text x="90" y="75" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">TANK A</text>
  <text x="90" y="95" text-anchor="middle" font-size="22" font-weight="800" fill="#c8960a">100</text>
  <text x="90" y="108" text-anchor="middle" font-size="10" font-weight="600" fill="#1a3a6b">PSI</text>

  <!-- Connecting pipe -->
  <rect x="150" y="74" width="100" height="16" rx="3" fill="url(#pqPipe)" stroke="#1a3a6b" stroke-width="1.5"/>
  <!-- Pipe flanges -->
  <rect x="148" y="72" width="6" height="20" rx="1" fill="#a0b0c8" stroke="#1a3a6b" stroke-width="1"/>
  <rect x="246" y="72" width="6" height="20" rx="1" fill="#a0b0c8" stroke="#1a3a6b" stroke-width="1"/>

  <!-- Valve (shown as OPEN) -->
  <g filter="url(#pqSh)">
    <rect x="186" y="64" width="28" height="36" rx="4" fill="#c8960a" stroke="#8a6000" stroke-width="2"/>
    <!-- Valve handle -->
    <rect x="192" y="57" width="16" height="8" rx="2" fill="#8a6000"/>
    <circle cx="200" cy="61" r="2" fill="#c8960a"/>
    <!-- Open indicator -->
    <rect x="196" y="78" width="8" height="12" rx="1" fill="#2a7a2a" opacity="0.8"/>
  </g>
  <text x="200" y="92" text-anchor="middle" font-size="8" font-weight="800" fill="#fff">OPEN</text>

  <!-- Tank B (pressure vessel with domed ends) -->
  <g filter="url(#pqSh)">
    <rect x="260" y="50" width="100" height="65" fill="url(#pqTank)" stroke="#1a3a6b" stroke-width="2"/>
    <ellipse cx="260" cy="82" rx="12" ry="32.5" fill="url(#pqTank)" stroke="#1a3a6b" stroke-width="2"/>
    <ellipse cx="360" cy="82" rx="12" ry="32.5" fill="url(#pqTank)" stroke="#1a3a6b" stroke-width="2"/>
    <rect x="260" y="58" width="100" height="4" fill="#e8eef6" opacity="0.6" rx="1"/>
    <line x1="260" y1="82" x2="360" y2="82" stroke="#9aacbf" stroke-width="0.5" stroke-dasharray="3,3"/>
  </g>
  <!-- Tank B gauge -->
  <circle cx="310" cy="42" r="12" fill="url(#pqGauge)" stroke="#1a3a6b" stroke-width="1.5"/>
  <line x1="310" y1="50" x2="310" y2="42" stroke="#1a3a6b" stroke-width="0.8"/>
  <!-- Gauge needle pointing low -->
  <line x1="310" y1="42" x2="316" y2="48" stroke="#dc2626" stroke-width="1.5"/>
  <circle cx="310" cy="42" r="1.5" fill="#1a3a6b"/>
  <text x="310" y="30" text-anchor="middle" font-size="7" font-weight="600" fill="#1a3a6b">PSI</text>
  <!-- Tank B labels -->
  <text x="310" y="75" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">TANK B</text>
  <text x="310" y="95" text-anchor="middle" font-size="22" font-weight="800" fill="#5a7090">30</text>
  <text x="310" y="108" text-anchor="middle" font-size="10" font-weight="600" fill="#1a3a6b">PSI</text>

  <!-- Question label -->
  <text x="200" y="140" text-anchor="middle" font-size="13" font-weight="700" fill="#dc2626">What happens when the valve opens?</text>

  <!-- Title -->
  <text x="200" y="170" text-anchor="middle" font-size="11" font-weight="600" fill="#5a7090">Two Pressure Tanks -- Valve Open</text>
</svg>