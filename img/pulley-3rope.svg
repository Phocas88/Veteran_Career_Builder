<svg xmlns="http://www.w3.org/2000/svg" width="400" height="180" viewBox="0 0 400 180">
  <style>
    @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(4px); } }
    .load-bob { animation: bob 2.5s ease-in-out infinite; }
    text { font-family: Arial, sans-serif; }
  </style>
  <rect width="400" height="180" rx="12" fill="#f0f4fa" stroke="#d0daea" stroke-width="2"/>

  <!-- Ceiling / Support beam -->
  <rect x="60" y="12" width="200" height="8" rx="2" fill="#5a7090" stroke="#3a5070" stroke-width="1.5"/>

  <!-- Fixed upper pulley (attached to ceiling) -->
  <line x1="140" y1="20" x2="140" y2="32" stroke="#3a5070" stroke-width="2"/>
  <circle cx="140" cy="40" r="10" fill="#dce4f0" stroke="#1a3a6b" stroke-width="2"/>
  <circle cx="140" cy="40" r="3" fill="#1a3a6b"/>

  <g class="load-bob">
    <!-- Lower movable pulley (attached to load) -->
    <circle cx="160" cy="85" r="10" fill="#dce4f0" stroke="#1a3a6b" stroke-width="2"/>
    <circle cx="160" cy="85" r="3" fill="#1a3a6b"/>

    <!-- Load block -->
    <rect x="135" y="100" width="50" height="35" rx="4" fill="#c8960a" stroke="#8a6000" stroke-width="2"/>
    <text x="160" y="120" text-anchor="middle" font-size="12" font-weight="800" fill="#fff">Load</text>

    <!-- Rope 1: from ceiling anchor down to movable pulley left side -->
    <line x1="120" y1="20" x2="120" y2="28" stroke="#333" stroke-width="2"/>
    <line x1="120" y1="28" x2="150" y2="85" stroke="#333" stroke-width="2"/>

    <!-- Rope 2: from movable pulley up over fixed pulley -->
    <line x1="170" y1="85" x2="150" y2="40" stroke="#333" stroke-width="2"/>

    <!-- Rope 3: from fixed pulley down other side to movable pulley then up -->
    <line x1="130" y1="40" x2="150" y2="85" stroke="#333" stroke-width="2"/>
  </g>

  <!-- Pull rope from fixed pulley going right (effort end) -->
  <line x1="150" y1="40" x2="220" y2="40" stroke="#333" stroke-width="2"/>
  <line x1="220" y1="40" x2="220" y2="70" stroke="#333" stroke-width="2"/>
  <!-- Effort arrow -->
  <polygon points="213,65 220,80 227,65" fill="#1a3a6b"/>
  <text x="220" y="95" text-anchor="middle" font-size="11" font-weight="700" fill="#1a3a6b">Pull</text>

  <!-- Rope number labels -->
  <rect x="105" y="44" width="14" height="14" rx="7" fill="#1a3a6b"/>
  <text x="112" y="54" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">1</text>

  <rect x="134" y="55" width="14" height="14" rx="7" fill="#1a3a6b"/>
  <text x="141" y="65" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">2</text>

  <rect x="165" y="55" width="14" height="14" rx="7" fill="#1a3a6b"/>
  <text x="172" y="65" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">3</text>

  <!-- MA = ? label -->
  <text x="320" y="55" text-anchor="middle" font-size="18" font-weight="800" fill="#dc2626">MA = ?</text>
  <text x="320" y="75" text-anchor="middle" font-size="11" font-weight="600" fill="#5a7090">3 ropes support</text>
  <text x="320" y="88" text-anchor="middle" font-size="11" font-weight="600" fill="#5a7090">the load</text>

  <!-- Title -->
  <text x="200" y="168" text-anchor="middle" font-size="12" font-weight="600" fill="#5a7090">Pulley System — Find the Mechanical Advantage</text>
</svg>