<svg xmlns="http://www.w3.org/2000/svg" width="400" height="180" viewBox="0 0 400 180">
  <style>
    @keyframes spinSlow { to { transform: rotate(360deg); } }
    @keyframes spinFast { to { transform: rotate(360deg); } }
    .pulley-a { animation: spinSlow 5s linear infinite; transform-origin: 110px 80px; }
    .pulley-b { transform-origin: 290px 80px; } /* Pulley B is STATIC — that's the question */
    text { font-family: Arial, sans-serif; }
  </style>
  <rect width="400" height="180" rx="12" fill="#f0f4fa" stroke="#d0daea" stroke-width="2"/>

  <!-- Belt (behind pulleys) -->
  <line x1="110" y1="30" x2="290" y2="55" stroke="#333" stroke-width="5" stroke-linecap="round"/>
  <line x1="110" y1="130" x2="290" y2="105" stroke="#333" stroke-width="5" stroke-linecap="round"/>
  <text x="200" y="25" text-anchor="middle" font-size="12" font-weight="700" fill="#555">BELT</text>

  <!-- Pulley A: Large -->
  <g class="pulley-a">
    <circle cx="110" cy="80" r="50" fill="#dce4f0" stroke="#1a3a6b" stroke-width="3"/>
    <!-- Groove lines -->
    <circle cx="110" cy="80" r="46" fill="none" stroke="#a0b8d8" stroke-width="1"/>
    <circle cx="110" cy="80" r="42" fill="none" stroke="#b8cce8" stroke-width="0.5"/>
    <!-- Spokes -->
    <line x1="110" y1="35" x2="110" y2="125" stroke="#1a3a6b" stroke-width="2" opacity=".3"/>
    <line x1="65" y1="80" x2="155" y2="80" stroke="#1a3a6b" stroke-width="2" opacity=".3"/>
    <line x1="75" y1="45" x2="145" y2="115" stroke="#1a3a6b" stroke-width="1.5" opacity=".2"/>
    <line x1="75" y1="115" x2="145" y2="45" stroke="#1a3a6b" stroke-width="1.5" opacity=".2"/>
    <!-- Hub -->
    <circle cx="110" cy="80" r="14" fill="#e8edf5" stroke="#1a3a6b" stroke-width="2.5"/>
    <circle cx="110" cy="80" r="4" fill="#1a3a6b"/>
    <!-- Rotation mark -->
    <circle cx="110" cy="38" r="3" fill="#c8960a"/>
  </g>

  <!-- Pulley B: Small -->
  <g class="pulley-b">
    <circle cx="290" cy="80" r="25" fill="#dce4f0" stroke="#1a3a6b" stroke-width="3"/>
    <circle cx="290" cy="80" r="22" fill="none" stroke="#a0b8d8" stroke-width="1"/>
    <!-- Spokes -->
    <line x1="290" y1="58" x2="290" y2="102" stroke="#1a3a6b" stroke-width="2" opacity=".3"/>
    <line x1="268" y1="80" x2="312" y2="80" stroke="#1a3a6b" stroke-width="2" opacity=".3"/>
    <!-- Hub -->
    <circle cx="290" cy="80" r="8" fill="#e8edf5" stroke="#1a3a6b" stroke-width="2"/>
    <circle cx="290" cy="80" r="3" fill="#1a3a6b"/>
    <!-- Rotation mark -->
    <circle cx="290" cy="58" r="2.5" fill="#c8960a"/>
  </g>

  <!-- Labels -->
  <text x="110" y="148" text-anchor="middle" font-size="13" font-weight="700" fill="#1a3a6b">PULLEY A (large)</text>
  <text x="110" y="163" text-anchor="middle" font-size="11" fill="#c8960a" font-weight="600">Slow rotation →</text>
  <text x="290" y="120" text-anchor="middle" font-size="13" font-weight="700" fill="#1a3a6b">PULLEY B (small)</text>
  <text x="290" y="135" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">Speed = ?</text>
</svg>
