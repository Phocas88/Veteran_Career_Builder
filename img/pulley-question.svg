<svg xmlns="http://www.w3.org/2000/svg" width="400" height="200" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="pAFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d8dce5"/>
      <stop offset="100%" stop-color="#b8c2d2"/>
    </linearGradient>
    <linearGradient id="pBFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#cdd3df"/>
      <stop offset="100%" stop-color="#adb8ca"/>
    </linearGradient>
    <linearGradient id="beltFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="50%" stop-color="#555"/>
      <stop offset="100%" stop-color="#3a3a3a"/>
    </linearGradient>
    <filter id="pShadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#1a3a6b" flood-opacity="0.18"/>
    </filter>
  </defs>
  <style>
    text { font-family: Arial, sans-serif; }
  </style>
  <!-- Background with grid -->
  <rect width="400" height="200" rx="10" fill="#f0f4fa" stroke="#d0daea" stroke-width="2"/>
  <g stroke="#d8dfe8" stroke-width="0.3">
    <line x1="0" y1="20" x2="400" y2="20"/><line x1="0" y1="40" x2="400" y2="40"/>
    <line x1="0" y1="60" x2="400" y2="60"/><line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="100" x2="400" y2="100"/><line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="140" x2="400" y2="140"/><line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="0" y1="180" x2="400" y2="180"/>
    <line x1="20" y1="0" x2="20" y2="200"/><line x1="40" y1="0" x2="40" y2="200"/>
    <line x1="60" y1="0" x2="60" y2="200"/><line x1="80" y1="0" x2="80" y2="200"/>
    <line x1="100" y1="0" x2="100" y2="200"/><line x1="120" y1="0" x2="120" y2="200"/>
    <line x1="140" y1="0" x2="140" y2="200"/><line x1="160" y1="0" x2="160" y2="200"/>
    <line x1="180" y1="0" x2="180" y2="200"/><line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="220" y1="0" x2="220" y2="200"/><line x1="240" y1="0" x2="240" y2="200"/>
    <line x1="260" y1="0" x2="260" y2="200"/><line x1="280" y1="0" x2="280" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/><line x1="320" y1="0" x2="320" y2="200"/>
    <line x1="340" y1="0" x2="340" y2="200"/><line x1="360" y1="0" x2="360" y2="200"/>
    <line x1="380" y1="0" x2="380" y2="200"/>
  </g>

  <!-- Title -->
  <text x="200" y="18" text-anchor="middle" font-size="11" fill="#5a7090" font-weight="600">Pulley System -- Large Drives Small</text>

  <!-- Belt (behind pulleys) -->
  <!-- Top belt run: from top of A to top of B -->
  <line x1="110" y1="35" x2="310" y2="65" stroke="#666" stroke-width="5" stroke-linecap="round"/>
  <!-- Bottom belt run: from bottom of A to bottom of B -->
  <line x1="110" y1="135" x2="310" y2="105" stroke="#666" stroke-width="5" stroke-linecap="round"/>
  <!-- Tension marks on belt -->
  <line x1="180" y1="44" x2="182" y2="40" stroke="#888" stroke-width="0.5"/>
  <line x1="210" y1="48" x2="212" y2="44" stroke="#888" stroke-width="0.5"/>
  <line x1="240" y1="52" x2="242" y2="48" stroke="#888" stroke-width="0.5"/>
  <text x="210" y="32" text-anchor="middle" font-size="9" font-weight="600" fill="#555">BELT</text>

  <!-- Pulley A: Large (animated) center=110,85, R=50 -->
  <g filter="url(#pShadow)">
    <!-- Outer rim -->
    <circle cx="110" cy="85" r="50" fill="url(#pAFill)" stroke="#1a3a6b" stroke-width="2.5"/>
    <!-- V-groove -->
    <circle cx="110" cy="85" r="47" fill="none" stroke="#8a9ab5" stroke-width="1.2"/>
    <circle cx="110" cy="85" r="43" fill="none" stroke="#b0bdd0" stroke-width="0.6"/>
    <!-- Spokes -->
    <line x1="110" y1="40" x2="110" y2="130" stroke="#1a3a6b" stroke-width="1.8" opacity="0.3"/>
    <line x1="65" y1="85" x2="155" y2="85" stroke="#1a3a6b" stroke-width="1.8" opacity="0.3"/>
    <line x1="74" y1="49" x2="146" y2="121" stroke="#1a3a6b" stroke-width="1.2" opacity="0.2"/>
    <line x1="74" y1="121" x2="146" y2="49" stroke="#1a3a6b" stroke-width="1.2" opacity="0.2"/>
    <!-- Hub -->
    <circle cx="110" cy="85" r="14" fill="#e0e5ee" stroke="#1a3a6b" stroke-width="2"/>
    <circle cx="110" cy="85" r="5" fill="#1a3a6b"/>
    <!-- Rotation marker -->
    <circle cx="110" cy="39" r="3.5" fill="#c8960a"/>
  </g>

  <!-- Axle mount A -->
  <rect x="103" y="78" width="14" height="14" rx="2" fill="none" stroke="#5a7090" stroke-width="0.8" stroke-dasharray="2,2" opacity="0.5"/>

  <!-- Pulley B: Small (STATIC) center=310,85, R=22 -->
  <g filter="url(#pShadow)">
    <!-- Outer rim -->
    <circle cx="310" cy="85" r="22" fill="url(#pBFill)" stroke="#1a3a6b" stroke-width="2.5"/>
    <!-- V-groove -->
    <circle cx="310" cy="85" r="19" fill="none" stroke="#8a9ab5" stroke-width="1"/>
    <circle cx="310" cy="85" r="16" fill="none" stroke="#b0bdd0" stroke-width="0.5"/>
    <!-- Spokes -->
    <line x1="310" y1="66" x2="310" y2="104" stroke="#1a3a6b" stroke-width="1.5" opacity="0.3"/>
    <line x1="291" y1="85" x2="329" y2="85" stroke="#1a3a6b" stroke-width="1.5" opacity="0.3"/>
    <!-- Hub -->
    <circle cx="310" cy="85" r="7" fill="#e0e5ee" stroke="#1a3a6b" stroke-width="2"/>
    <circle cx="310" cy="85" r="3" fill="#1a3a6b"/>
    <!-- Rotation marker -->
    <circle cx="310" cy="66" r="2.5" fill="#c8960a"/>
  </g>

  <!-- Labels BELOW the pulleys, not overlapping -->
  <text x="110" y="150" text-anchor="middle" font-size="12" font-weight="700" fill="#1a3a6b">PULLEY A (large)</text>
  <text x="110" y="165" text-anchor="middle" font-size="10" fill="#c8960a" font-weight="600">Slow rotation</text>

  <text x="310" y="120" text-anchor="middle" font-size="12" font-weight="700" fill="#1a3a6b">PULLEY B (small)</text>
  <text x="310" y="138" text-anchor="middle" font-size="14" font-weight="700" fill="#dc2626">Speed = ?</text>

  <!-- Bottom note -->
  <text x="200" y="190" text-anchor="middle" font-size="9" fill="#8a9ab5">Belt connects large pulley to small pulley</text>
</svg>