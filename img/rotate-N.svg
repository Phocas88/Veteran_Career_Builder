<svg xmlns="http://www.w3.org/2000/svg" width="400" height="200" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="rnBox" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f2f5"/>
    </linearGradient>
    <filter id="rnShadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#1a3a6b" flood-opacity="0.18"/>
    </filter>
    <filter id="rnGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <style>
    @keyframes arrowPulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
    @keyframes glowPulse {
      0%, 100% { opacity: 0.15; }
      50% { opacity: 0.4; }
    }
    .arrow-path { animation: arrowPulse 2s ease-in-out infinite; }
    .arrow-glow { animation: glowPulse 2s ease-in-out infinite; }
    text { font-family: Arial, sans-serif; }
  </style>
  <!-- Background with grid -->
  <rect width="400" height="200" rx="10" fill="#f0f4fa" stroke="#d0daea" stroke-width="2"/>
  <g stroke="#d8dfe8" stroke-width="0.3">
    <line x1="0" y1="20" x2="400" y2="20"/><line x1="0" y1="40" x2="400" y2="40"/>
    <line x1="0" y1="60" x2="400" y2="60"/><line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="100" x2="400" y2="100"/><line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="140" x2="400" y2="140"/><line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="0" y1="180" x2="400" y2="180"/>
    <line x1="20" y1="0" x2="20" y2="200"/><line x1="40" y1="0" x2="40" y2="200"/>
    <line x1="60" y1="0" x2="60" y2="200"/><line x1="80" y1="0" x2="80" y2="200"/>
    <line x1="100" y1="0" x2="100" y2="200"/><line x1="120" y1="0" x2="120" y2="200"/>
    <line x1="140" y1="0" x2="140" y2="200"/><line x1="160" y1="0" x2="160" y2="200"/>
    <line x1="180" y1="0" x2="180" y2="200"/><line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="220" y1="0" x2="220" y2="200"/><line x1="240" y1="0" x2="240" y2="200"/>
    <line x1="260" y1="0" x2="260" y2="200"/><line x1="280" y1="0" x2="280" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/><line x1="320" y1="0" x2="320" y2="200"/>
    <line x1="340" y1="0" x2="340" y2="200"/><line x1="360" y1="0" x2="360" y2="200"/>
    <line x1="380" y1="0" x2="380" y2="200"/>
  </g>

  <!-- Title -->
  <text x="200" y="18" text-anchor="middle" font-size="11" fill="#5a7090" font-weight="600">Letter Rotation -- 90 deg Clockwise</text>

  <!-- Left box with letter N -->
  <g filter="url(#rnShadow)">
    <rect x="35" y="35" width="105" height="115" rx="8" fill="url(#rnBox)" stroke="#1a3a6b" stroke-width="2"/>
    <text x="87" y="112" text-anchor="middle" font-size="68" font-weight="700" fill="#1a3a6b">N</text>
  </g>
  <text x="87" y="166" text-anchor="middle" font-size="11" fill="#5a7090" font-weight="600">Original</text>

  <!-- Curved 90-degree clockwise arrow -->
  <!-- Glow behind arrow -->
  <path class="arrow-glow" d="M165,58 A48,48 0 0,1 213,106" fill="none" stroke="#c8960a" stroke-width="12" stroke-linecap="round"/>
  <!-- Arrow arc -->
  <path class="arrow-path" d="M165,58 A48,48 0 0,1 213,106" fill="none" stroke="#c8960a" stroke-width="3" stroke-linecap="round"/>
  <!-- Arrowhead -->
  <polygon points="213,94 221,106 208,109" fill="#c8960a">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
  </polygon>
  <!-- Degree label -->
  <rect x="176" y="50" width="38" height="18" rx="4" fill="rgba(200,150,10,0.1)" stroke="#c8960a" stroke-width="0.8"/>
  <text x="195" y="63" text-anchor="middle" font-size="12" font-weight="700" fill="#c8960a">90 deg</text>
  <text x="222" y="80" text-anchor="start" font-size="10" font-weight="600" fill="#c8960a">CW</text>

  <!-- Right box with question mark (dashed border) -->
  <rect x="260" y="35" width="105" height="115" rx="8" fill="rgba(220,38,38,0.04)" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,4" filter="url(#rnShadow)"/>
  <text x="312" y="115" text-anchor="middle" font-size="72" font-weight="700" fill="#dc2626">?</text>
  <text x="312" y="166" text-anchor="middle" font-size="11" fill="#dc2626" font-weight="600">After 90 deg CW rotation</text>

  <!-- Bottom note -->
  <text x="200" y="190" text-anchor="middle" font-size="9" fill="#8a9ab5">Rotate the letter mentally -- do NOT show the answer</text>
</svg>