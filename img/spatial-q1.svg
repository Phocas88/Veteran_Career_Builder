<svg xmlns="http://www.w3.org/2000/svg" width="400" height="120" viewBox="0 0 400 120">
  <rect width="400" height="120" rx="10" fill="#f0f4fa" stroke="#d0daea" stroke-width="2"/>
  <text x="200" y="18" text-anchor="middle" font-family="Arial" font-size="11" fill="#5a7090" font-weight="600">What comes next in the pattern?</text>

  <!-- Pattern: Circle, Square, Triangle, Circle, Square, ? -->
  <circle cx="45" cy="65" r="22" fill="#dce4f0" stroke="#1a3a6b" stroke-width="2.5"/>
  <rect x="90" y="43" width="44" height="44" fill="#dce4f0" stroke="#1a3a6b" stroke-width="2.5" rx="3"/>
  <polygon points="155,43 133,87 177,87" fill="#dce4f0" stroke="#1a3a6b" stroke-width="2.5"/>
  <circle cx="220" cy="65" r="22" fill="#dce4f0" stroke="#1a3a6b" stroke-width="2.5"/>
  <rect x="260" y="43" width="44" height="44" fill="#dce4f0" stroke="#1a3a6b" stroke-width="2.5" rx="3"/>

  <!-- Question mark -->
  <rect x="330" y="43" width="44" height="44" fill="rgba(220,38,38,.08)" stroke="#dc2626" stroke-width="2.5" stroke-dasharray="6,3" rx="5"/>
  <text x="352" y="73" text-anchor="middle" font-family="Arial" font-size="24" font-weight="700" fill="#dc2626">?</text>

  <!-- Arrows between shapes -->
  <text x="68" y="68" font-family="Arial" font-size="14" fill="#888">→</text>
  <text x="136" y="100" font-family="Arial" font-size="9" fill="#888">1</text>
  <text x="200" y="100" font-family="Arial" font-size="9" fill="#888">repeats</text>
  <text x="248" y="68" font-family="Arial" font-size="14" fill="#888">→</text>
  <text x="318" y="68" font-family="Arial" font-size="14" fill="#888">→</text>
</svg>
