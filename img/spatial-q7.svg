<svg xmlns="http://www.w3.org/2000/svg" width="400" height="120" viewBox="0 0 400 120">
  <style>
    @keyframes spin1{to{transform:rotate(360deg)}}
    /* Only Gear 1 animates — Gears 2-4 are static so we don't give away the alternating direction pattern */
  </style>
  <rect width="400" height="120" rx="10" fill="#f0f4fa" stroke="#d0daea" stroke-width="2"/>
  <text x="200" y="16" text-anchor="middle" font-family="Arial" font-size="11" fill="#5a7090" font-weight="600">Gear Train — Gear 1 turns clockwise. What direction does Gear 4 turn?</text>

  <!-- Gear 1 (drives) -->
  <g style="transform-origin:55px 65px;animation:spin1 3s linear infinite">
    <circle cx="55" cy="65" r="22" fill="#dce4f0" stroke="#1a3a6b" stroke-width="2"/>
    <circle cx="55" cy="65" r="4" fill="#1a3a6b"/>
    <line x1="55" y1="43" x2="55" y2="87" stroke="#1a3a6b" stroke-width="1.5" opacity=".3"/>
    <line x1="33" y1="65" x2="77" y2="65" stroke="#1a3a6b" stroke-width="1.5" opacity=".3"/>
  </g>
  <text x="55" y="100" text-anchor="middle" font-family="Arial" font-size="10" font-weight="700" fill="#1a3a6b">1 ↻</text>

  <!-- Gear 2 -->
  <g>
    <circle cx="130" cy="65" r="22" fill="#dce4f0" stroke="#1a3a6b" stroke-width="2"/>
    <circle cx="130" cy="65" r="4" fill="#1a3a6b"/>
    <line x1="130" y1="43" x2="130" y2="87" stroke="#1a3a6b" stroke-width="1.5" opacity=".3"/>
    <line x1="108" y1="65" x2="152" y2="65" stroke="#1a3a6b" stroke-width="1.5" opacity=".3"/>
  </g>
  <text x="130" y="100" text-anchor="middle" font-family="Arial" font-size="10" font-weight="600" fill="#5a7090">2</text>

  <!-- Gear 3 -->
  <g>
    <circle cx="205" cy="65" r="22" fill="#dce4f0" stroke="#1a3a6b" stroke-width="2"/>
    <circle cx="205" cy="65" r="4" fill="#1a3a6b"/>
    <line x1="205" y1="43" x2="205" y2="87" stroke="#1a3a6b" stroke-width="1.5" opacity=".3"/>
    <line x1="183" y1="65" x2="227" y2="65" stroke="#1a3a6b" stroke-width="1.5" opacity=".3"/>
  </g>
  <text x="205" y="100" text-anchor="middle" font-family="Arial" font-size="10" font-weight="600" fill="#5a7090">3</text>

  <!-- Gear 4 (question — STATIC, no animation) -->
  <g>
    <circle cx="280" cy="65" r="22" fill="rgba(220,38,38,.08)" stroke="#dc2626" stroke-width="2.5"/>
    <circle cx="280" cy="65" r="4" fill="#dc2626"/>
    <line x1="280" y1="43" x2="280" y2="87" stroke="#dc2626" stroke-width="1.5" opacity=".3"/>
    <line x1="258" y1="65" x2="302" y2="65" stroke="#dc2626" stroke-width="1.5" opacity=".3"/>
  </g>
  <text x="280" y="100" text-anchor="middle" font-family="Arial" font-size="11" font-weight="700" fill="#dc2626">4 = ?</text>

  <!-- Mesh lines -->
  <line x1="77" y1="65" x2="108" y2="65" stroke="#888" stroke-width="1" stroke-dasharray="3"/>
  <line x1="152" y1="65" x2="183" y2="65" stroke="#888" stroke-width="1" stroke-dasharray="3"/>
  <line x1="227" y1="65" x2="258" y2="65" stroke="#888" stroke-width="1" stroke-dasharray="3"/>
</svg>
