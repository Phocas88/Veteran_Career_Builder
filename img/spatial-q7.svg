<svg xmlns="http://www.w3.org/2000/svg" width="400" height="120" viewBox="0 0 400 120">
  <style>
    @keyframes spin1{to{transform:rotate(360deg)}}
    /* Only Gear 1 animates — Gears 2-4 are static so we don't give away the alternating direction pattern */
  </style>
  <rect width="400" height="120" rx="10" fill="#f0f4fa" stroke="#d0daea" stroke-width="2"/>
  <text x="200" y="16" text-anchor="middle" font-family="Arial" font-size="11" fill="#5a7090" font-weight="600">Gear Train — Gear 1 turns clockwise. What direction does Gear 4 turn?</text>

  <!-- Gear 1 (drives) - 10 trapezoidal teeth -->
  <g style="transform-origin:55px 65px;animation:spin1 3s linear infinite">
    <path d="M74.8,62.0 L82.9,62.2 L82.9,67.8 L74.8,68.0 L72.8,74.2 L79.2,79.1 L75.9,83.6 L69.2,79.1 L64.0,82.9 L66.2,90.6 L61.0,92.4 L58.2,84.7 L51.8,84.7 L49.0,92.4 L43.8,90.6 L46.0,82.9 L40.8,79.1 L34.1,83.6 L30.8,79.1 L37.2,74.2 L35.2,68.0 L27.1,67.8 L27.1,62.2 L35.2,62.0 L37.2,55.8 L30.8,50.9 L34.1,46.4 L40.8,50.9 L46.0,47.1 L43.8,39.4 L49.0,37.6 L51.8,45.3 L58.2,45.3 L61.0,37.6 L66.2,39.4 L64.0,47.1 L69.2,50.9 L75.9,46.4 L79.2,50.9 L72.8,55.8 Z" fill="#dce4f0" stroke="#1a3a6b" stroke-width="2"/>
    <circle cx="55" cy="65" r="4" fill="#1a3a6b"/>
    <line x1="55" y1="48" x2="55" y2="82" stroke="#1a3a6b" stroke-width="1" opacity=".3"/>
    <line x1="38" y1="65" x2="72" y2="65" stroke="#1a3a6b" stroke-width="1" opacity=".3"/>
  </g>
  <text x="55" y="102" text-anchor="middle" font-family="Arial" font-size="10" font-weight="700" fill="#1a3a6b">1 ↻</text>

  <!-- Gear 2 - 10 trapezoidal teeth -->
  <g>
    <path d="M149.8,62.0 L157.9,62.2 L157.9,67.8 L149.8,68.0 L147.8,74.2 L154.2,79.1 L150.9,83.6 L144.2,79.1 L139.0,82.9 L141.2,90.6 L136.0,92.4 L133.2,84.7 L126.8,84.7 L124.0,92.4 L118.8,90.6 L121.0,82.9 L115.8,79.1 L109.1,83.6 L105.8,79.1 L112.2,74.2 L110.2,68.0 L102.1,67.8 L102.1,62.2 L110.2,62.0 L112.2,55.8 L105.8,50.9 L109.1,46.4 L115.8,50.9 L121.0,47.1 L118.8,39.4 L124.0,37.6 L126.8,45.3 L133.2,45.3 L136.0,37.6 L141.2,39.4 L139.0,47.1 L144.2,50.9 L150.9,46.4 L154.2,50.9 L147.8,55.8 Z" fill="#dce4f0" stroke="#1a3a6b" stroke-width="2"/>
    <circle cx="130" cy="65" r="4" fill="#1a3a6b"/>
    <line x1="130" y1="48" x2="130" y2="82" stroke="#1a3a6b" stroke-width="1" opacity=".3"/>
    <line x1="113" y1="65" x2="147" y2="65" stroke="#1a3a6b" stroke-width="1" opacity=".3"/>
  </g>
  <text x="130" y="102" text-anchor="middle" font-family="Arial" font-size="10" font-weight="600" fill="#5a7090">2</text>

  <!-- Gear 3 - 10 trapezoidal teeth -->
  <g>
    <path d="M224.8,62.0 L232.9,62.2 L232.9,67.8 L224.8,68.0 L222.8,74.2 L229.2,79.1 L225.9,83.6 L219.2,79.1 L214.0,82.9 L216.2,90.6 L211.0,92.4 L208.2,84.7 L201.8,84.7 L199.0,92.4 L193.8,90.6 L196.0,82.9 L190.8,79.1 L184.1,83.6 L180.8,79.1 L187.2,74.2 L185.2,68.0 L177.1,67.8 L177.1,62.2 L185.2,62.0 L187.2,55.8 L180.8,50.9 L184.1,46.4 L190.8,50.9 L196.0,47.1 L193.8,39.4 L199.0,37.6 L201.8,45.3 L208.2,45.3 L211.0,37.6 L216.2,39.4 L214.0,47.1 L219.2,50.9 L225.9,46.4 L229.2,50.9 L222.8,55.8 Z" fill="#dce4f0" stroke="#1a3a6b" stroke-width="2"/>
    <circle cx="205" cy="65" r="4" fill="#1a3a6b"/>
    <line x1="205" y1="48" x2="205" y2="82" stroke="#1a3a6b" stroke-width="1" opacity=".3"/>
    <line x1="188" y1="65" x2="222" y2="65" stroke="#1a3a6b" stroke-width="1" opacity=".3"/>
  </g>
  <text x="205" y="102" text-anchor="middle" font-family="Arial" font-size="10" font-weight="600" fill="#5a7090">3</text>

  <!-- Gear 4 (question — STATIC, no animation) - 10 trapezoidal teeth -->
  <g>
    <path d="M299.8,62.0 L307.9,62.2 L307.9,67.8 L299.8,68.0 L297.8,74.2 L304.2,79.1 L300.9,83.6 L294.2,79.1 L289.0,82.9 L291.2,90.6 L286.0,92.4 L283.2,84.7 L276.8,84.7 L274.0,92.4 L268.8,90.6 L271.0,82.9 L265.8,79.1 L259.1,83.6 L255.8,79.1 L262.2,74.2 L260.2,68.0 L252.1,67.8 L252.1,62.2 L260.2,62.0 L262.2,55.8 L255.8,50.9 L259.1,46.4 L265.8,50.9 L271.0,47.1 L268.8,39.4 L274.0,37.6 L276.8,45.3 L283.2,45.3 L286.0,37.6 L291.2,39.4 L289.0,47.1 L294.2,50.9 L300.9,46.4 L304.2,50.9 L297.8,55.8 Z" fill="rgba(220,38,38,.08)" stroke="#dc2626" stroke-width="2.5"/>
    <circle cx="280" cy="65" r="4" fill="#dc2626"/>
    <line x1="280" y1="48" x2="280" y2="82" stroke="#dc2626" stroke-width="1" opacity=".3"/>
    <line x1="263" y1="65" x2="297" y2="65" stroke="#dc2626" stroke-width="1" opacity=".3"/>
  </g>
  <text x="280" y="102" text-anchor="middle" font-family="Arial" font-size="11" font-weight="700" fill="#dc2626">4 = ?</text>

  <!-- Mesh lines -->
  <line x1="77" y1="65" x2="108" y2="65" stroke="#888" stroke-width="1" stroke-dasharray="3"/>
  <line x1="152" y1="65" x2="183" y2="65" stroke="#888" stroke-width="1" stroke-dasharray="3"/>
  <line x1="227" y1="65" x2="258" y2="65" stroke="#888" stroke-width="1" stroke-dasharray="3"/>
</svg>