<svg xmlns="http://www.w3.org/2000/svg" width="400" height="180" viewBox="0 0 400 180">
  <defs>
    <linearGradient id="handleG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d8dce5"/>
      <stop offset="50%" stop-color="#e8ecf2"/>
      <stop offset="100%" stop-color="#c0c8d5"/>
    </linearGradient>
    <linearGradient id="gripG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a4a78"/>
      <stop offset="50%" stop-color="#1a3a6b"/>
      <stop offset="100%" stop-color="#0e2a52"/>
    </linearGradient>
    <linearGradient id="socketG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a96aa"/>
      <stop offset="100%" stop-color="#5a6a82"/>
    </linearGradient>
    <linearGradient id="boltG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6a7a92"/>
      <stop offset="100%" stop-color="#4a5a72"/>
    </linearGradient>
    <filter id="ts" x="-3%" y="-3%" width="108%" height="108%">
      <feDropShadow dx="1" dy="1.5" stdDeviation="1.2" flood-color="#1a3a6b" flood-opacity="0.18"/>
    </filter>
    <marker id="arrowT" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#c8960a"/>
    </marker>
  </defs>
  <style>
    @keyframes applyForce { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(-6deg); } }
    .wrenchGroup { animation: applyForce 2.5s ease-in-out infinite; transform-origin: 82px 78px; }
    text { font-family: Arial, sans-serif; }
  </style>
  <!-- Background with grid -->
  <rect width="400" height="180" rx="10" fill="#f0f4fa" stroke="#d0daea" stroke-width="2"/>
  <g stroke="#d8dfe8" stroke-width="0.3">
    <line x1="0" y1="20" x2="400" y2="20"/><line x1="0" y1="40" x2="400" y2="40"/>
    <line x1="0" y1="60" x2="400" y2="60"/><line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="100" x2="400" y2="100"/><line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="140" x2="400" y2="140"/><line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="40" y1="0" x2="40" y2="180"/><line x1="80" y1="0" x2="80" y2="180"/>
    <line x1="120" y1="0" x2="120" y2="180"/><line x1="160" y1="0" x2="160" y2="180"/>
    <line x1="200" y1="0" x2="200" y2="180"/><line x1="240" y1="0" x2="240" y2="180"/>
    <line x1="280" y1="0" x2="280" y2="180"/><line x1="320" y1="0" x2="320" y2="180"/>
    <line x1="360" y1="0" x2="360" y2="180"/>
  </g>

  <!-- Hex bolt (stationary reference) -->
  <g filter="url(#ts)">
    <polygon points="82,62 94,56 106,62 106,78 94,84 82,78" fill="url(#boltG)" stroke="#1a3a6b" stroke-width="1.8"/>
    <circle cx="94" cy="70" r="4.5" fill="#1a3a6b"/>
    <!-- Bolt threads hint below -->
    <rect x="88" y="84" width="12" height="14" fill="#5a6a82" stroke="#1a3a6b" stroke-width="1" rx="1"/>
    <line x1="89" y1="88" x2="99" y2="88" stroke="#8a96aa" stroke-width="0.6"/>
    <line x1="89" y1="91" x2="99" y2="91" stroke="#8a96aa" stroke-width="0.6"/>
    <line x1="89" y1="94" x2="99" y2="94" stroke="#8a96aa" stroke-width="0.6"/>
  </g>

  <!-- Wrench assembly (animated) -->
  <g class="wrenchGroup" filter="url(#ts)">
    <!-- Socket engaging hex bolt -->
    <rect x="76" y="56" width="36" height="28" rx="4" fill="url(#socketG)" stroke="#1a3a6b" stroke-width="1.8"/>
    <!-- Socket inner hex cutout hint -->
    <polygon points="84,64 92,60 100,64 100,76 92,80 84,76" fill="none" stroke="#a0a8b8" stroke-width="0.8" stroke-dasharray="2,2"/>

    <!-- Wrench body / beam -->
    <rect x="112" y="66" width="190" height="10" rx="2" fill="url(#handleG)" stroke="#1a3a6b" stroke-width="1.5"/>
    <!-- Scale markings on beam -->
    <line x1="140" y1="67" x2="140" y2="75" stroke="#8a96aa" stroke-width="0.5"/>
    <line x1="160" y1="67" x2="160" y2="75" stroke="#8a96aa" stroke-width="0.5"/>
    <line x1="180" y1="67" x2="180" y2="75" stroke="#8a96aa" stroke-width="0.5"/>
    <line x1="200" y1="67" x2="200" y2="75" stroke="#8a96aa" stroke-width="0.5"/>
    <line x1="220" y1="67" x2="220" y2="75" stroke="#8a96aa" stroke-width="0.5"/>
    <line x1="240" y1="67" x2="240" y2="75" stroke="#8a96aa" stroke-width="0.5"/>
    <line x1="260" y1="67" x2="260" y2="75" stroke="#8a96aa" stroke-width="0.5"/>
    <line x1="280" y1="67" x2="280" y2="75" stroke="#8a96aa" stroke-width="0.5"/>

    <!-- Handle transition -->
    <rect x="302" y="63" width="8" height="16" rx="2" fill="#8a96aa" stroke="#1a3a6b" stroke-width="1"/>

    <!-- Rubber grip -->
    <rect x="310" y="60" width="55" height="22" rx="5" fill="url(#gripG)" stroke="#0e2a52" stroke-width="1.5"/>
    <!-- Grip texture lines -->
    <line x1="318" y1="62" x2="318" y2="80" stroke="#2a4a78" stroke-width="1.5" opacity="0.4"/>
    <line x1="326" y1="62" x2="326" y2="80" stroke="#2a4a78" stroke-width="1.5" opacity="0.4"/>
    <line x1="334" y1="62" x2="334" y2="80" stroke="#2a4a78" stroke-width="1.5" opacity="0.4"/>
    <line x1="342" y1="62" x2="342" y2="80" stroke="#2a4a78" stroke-width="1.5" opacity="0.4"/>
    <line x1="350" y1="62" x2="350" y2="80" stroke="#2a4a78" stroke-width="1.5" opacity="0.4"/>
    <line x1="358" y1="62" x2="358" y2="80" stroke="#2a4a78" stroke-width="1.5" opacity="0.4"/>

    <!-- Torque gauge dial near socket -->
    <path d="M118,60 A14,14 0 0,1 118,82" fill="none" stroke="#c8960a" stroke-width="1.8"/>
    <line x1="116" y1="61" x2="112" y2="58" stroke="#c8960a" stroke-width="1.2"/>
    <line x1="114" y1="71" x2="109" y2="71" stroke="#c8960a" stroke-width="1.2"/>
    <line x1="116" y1="81" x2="112" y2="84" stroke="#c8960a" stroke-width="1.2"/>
    <line x1="118" y1="71" x2="111" y2="64" stroke="#dc2626" stroke-width="1.5"/>

    <!-- Force arrow at handle end -->
    <line x1="375" y1="48" x2="358" y2="59" stroke="#c8960a" stroke-width="2.5" marker-end="url(#arrowT)"/>
    <text x="382" y="44" text-anchor="middle" font-size="10" font-weight="700" fill="#c8960a">Force</text>
  </g>

  <!-- Dimension line for lever arm -->
  <line x1="94" y1="112" x2="338" y2="112" stroke="#1a3a6b" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="94" y1="108" x2="94" y2="116" stroke="#1a3a6b" stroke-width="1.5"/>
  <line x1="338" y1="108" x2="338" y2="116" stroke="#1a3a6b" stroke-width="1.5"/>
  <!-- Arrowheads on dimension -->
  <polygon points="97,112 94,109 94,115" fill="#1a3a6b"/>
  <polygon points="335,112 338,109 338,115" fill="#1a3a6b"/>
  <text x="216" y="125" text-anchor="middle" font-size="10" font-weight="600" fill="#1a3a6b">Lever Arm Length</text>

  <!-- Formula -->
  <text x="200" y="148" text-anchor="middle" font-size="13" font-weight="700" fill="#c8960a">Torque = Force &#xd7; Distance</text>

  <!-- Title -->
  <text x="200" y="172" text-anchor="middle" font-size="11" font-weight="600" fill="#5a7090">Torque Wrench -- Applying Specific Force</text>
</svg>