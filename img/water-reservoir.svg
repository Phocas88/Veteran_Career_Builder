<svg xmlns="http://www.w3.org/2000/svg" width="400" height="180" viewBox="0 0 400 180">
  <style>
    @keyframes rippleLeft {
      0%,100% { d: path("M35,62 Q55,58 75,62 Q95,66 115,62"); }
      50%     { d: path("M35,62 Q55,66 75,62 Q95,58 115,62"); }
    }
    @keyframes rippleRight {
      0%,100% { d: path("M255,102 Q275,98 295,102 Q315,106 335,102"); }
      50%     { d: path("M255,102 Q275,106 295,102 Q315,98 335,102"); }
    }
    .wave-l { animation: rippleLeft 2s ease-in-out infinite; }
    .wave-r { animation: rippleRight 2s ease-in-out infinite; }
    text { font-family: Arial, sans-serif; }
  </style>
  <rect width="400" height="180" rx="12" fill="#f0f4fa" stroke="#d0daea" stroke-width="2"/>

  <!-- Left reservoir (higher, 100 ft) -->
  <rect x="30" y="35" width="90" height="75" rx="3" fill="none" stroke="#1a3a6b" stroke-width="2.5"/>
  <rect x="32" y="62" width="86" height="46" fill="#a8c4e0" opacity="0.7"/>
  <!-- Water surface ripple left -->
  <path class="wave-l" d="M35,62 Q55,58 75,62 Q95,66 115,62" fill="none" stroke="#5a8abf" stroke-width="1.5"/>

  <!-- Right reservoir (lower, 50 ft) -->
  <rect x="250" y="75" width="90" height="60" rx="3" fill="none" stroke="#1a3a6b" stroke-width="2.5"/>
  <rect x="252" y="102" width="86" height="31" fill="#a8c4e0" opacity="0.7"/>
  <!-- Water surface ripple right -->
  <path class="wave-r" d="M255,102 Q275,98 295,102 Q315,106 335,102" fill="none" stroke="#5a8abf" stroke-width="1.5"/>

  <!-- Ground line -->
  <line x1="20" y1="140" x2="380" y2="140" stroke="#a0a0a0" stroke-width="1.5"/>
  <pattern id="hatch" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
    <line x1="0" y1="0" x2="0" y2="8" stroke="#c0c0c0" stroke-width="1"/>
  </pattern>
  <rect x="20" y="140" width="360" height="8" fill="url(#hatch)"/>

  <!-- Pipe connecting reservoirs -->
  <line x1="120" y1="88" x2="250" y2="112" stroke="#666" stroke-width="6" stroke-linecap="round"/>
  <line x1="120" y1="88" x2="250" y2="112" stroke="#bbb" stroke-width="3" stroke-linecap="round"/>

  <!-- Question mark on pipe -->
  <text x="185" y="94" text-anchor="middle" font-size="20" font-weight="800" fill="#dc2626">?</text>

  <!-- Height labels -->
  <!-- Left: 100 ft -->
  <line x1="25" y1="35" x2="25" y2="140" stroke="#c8960a" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="14" y="92" text-anchor="middle" font-size="11" font-weight="700" fill="#c8960a" transform="rotate(-90,14,92)">100 ft</text>

  <!-- Right: 50 ft -->
  <line x1="345" y1="75" x2="345" y2="140" stroke="#c8960a" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="356" y="112" text-anchor="middle" font-size="11" font-weight="700" fill="#c8960a" transform="rotate(-90,356,112)">50 ft</text>

  <!-- Elevation markers -->
  <line x1="22" y1="35" x2="28" y2="35" stroke="#c8960a" stroke-width="1.5"/>
  <line x1="22" y1="140" x2="28" y2="140" stroke="#c8960a" stroke-width="1.5"/>
  <line x1="342" y1="75" x2="348" y2="75" stroke="#c8960a" stroke-width="1.5"/>
  <line x1="342" y1="140" x2="348" y2="140" stroke="#c8960a" stroke-width="1.5"/>

  <!-- Title -->
  <text x="200" y="168" text-anchor="middle" font-size="12" font-weight="600" fill="#5a7090">Reservoir Elevation — Which Way Does Water Flow?</text>
</svg>