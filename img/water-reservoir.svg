<svg xmlns="http://www.w3.org/2000/svg" width="400" height="200" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="wrWaterL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6aaad4"/>
      <stop offset="100%" stop-color="#3a80b0"/>
    </linearGradient>
    <linearGradient id="wrWaterR" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6aaad4"/>
      <stop offset="100%" stop-color="#3a80b0"/>
    </linearGradient>
    <linearGradient id="wrTankL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8d0dc"/>
      <stop offset="100%" stop-color="#a0aab8"/>
    </linearGradient>
    <linearGradient id="wrTankR" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8d0dc"/>
      <stop offset="100%" stop-color="#a0aab8"/>
    </linearGradient>
    <linearGradient id="wrTerrain" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B7355"/>
      <stop offset="60%" stop-color="#6B5535"/>
      <stop offset="100%" stop-color="#5a4828"/>
    </linearGradient>
    <filter id="wrShadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="1" stdDeviation="1.5" flood-color="#1a3a6b" flood-opacity="0.15"/>
    </filter>
  </defs>
  <style>
    @keyframes rippleL {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-2px); }
    }
    @keyframes rippleR {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-1.5px); }
    }
    .waveL { animation: rippleL 2s ease-in-out infinite; }
    .waveR { animation: rippleR 2.2s ease-in-out infinite; }
    text { font-family: Arial, sans-serif; }
  </style>
  <!-- Background with grid -->
  <rect width="400" height="200" rx="10" fill="#f0f4fa" stroke="#d0daea" stroke-width="2"/>
  <g stroke="#d8dfe8" stroke-width="0.3">
    <line x1="0" y1="20" x2="400" y2="20"/><line x1="0" y1="40" x2="400" y2="40"/>
    <line x1="0" y1="60" x2="400" y2="60"/><line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="100" x2="400" y2="100"/><line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="140" x2="400" y2="140"/><line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="0" y1="180" x2="400" y2="180"/>
    <line x1="20" y1="0" x2="20" y2="200"/><line x1="40" y1="0" x2="40" y2="200"/>
    <line x1="60" y1="0" x2="60" y2="200"/><line x1="80" y1="0" x2="80" y2="200"/>
    <line x1="100" y1="0" x2="100" y2="200"/><line x1="120" y1="0" x2="120" y2="200"/>
    <line x1="140" y1="0" x2="140" y2="200"/><line x1="160" y1="0" x2="160" y2="200"/>
    <line x1="180" y1="0" x2="180" y2="200"/><line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="220" y1="0" x2="220" y2="200"/><line x1="240" y1="0" x2="240" y2="200"/>
    <line x1="260" y1="0" x2="260" y2="200"/><line x1="280" y1="0" x2="280" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/><line x1="320" y1="0" x2="320" y2="200"/>
    <line x1="340" y1="0" x2="340" y2="200"/><line x1="360" y1="0" x2="360" y2="200"/>
    <line x1="380" y1="0" x2="380" y2="200"/>
  </g>

  <!-- Title -->
  <text x="200" y="18" text-anchor="middle" font-size="11" fill="#5a7090" font-weight="600">Reservoir Elevation -- Which Way Does Water Flow?</text>

  <!-- Terrain/landscape -->
  <path d="M0,160 L40,155 L80,148 L120,145 L160,150 L200,158 L240,162 L280,160 L320,155 L360,158 L400,160 L400,200 L0,200 Z" fill="url(#wrTerrain)" opacity="0.3"/>
  <!-- Ground line -->
  <line x1="10" y1="160" x2="390" y2="160" stroke="#8B7355" stroke-width="1.5"/>
  <!-- Hatch pattern for ground -->
  <g stroke="#a08860" stroke-width="0.5" opacity="0.4">
    <line x1="15" y1="160" x2="20" y2="168"/><line x1="30" y1="160" x2="35" y2="168"/>
    <line x1="45" y1="160" x2="50" y2="168"/><line x1="60" y1="160" x2="65" y2="168"/>
    <line x1="75" y1="160" x2="80" y2="168"/><line x1="90" y1="160" x2="95" y2="168"/>
    <line x1="300" y1="160" x2="305" y2="168"/><line x1="315" y1="160" x2="320" y2="168"/>
    <line x1="330" y1="160" x2="335" y2="168"/><line x1="345" y1="160" x2="350" y2="168"/>
    <line x1="360" y1="160" x2="365" y2="168"/><line x1="375" y1="160" x2="380" y2="168"/>
  </g>

  <!-- Left reservoir (higher, 100 ft) -->
  <g filter="url(#wrShadow)">
    <rect x="30" y="40" width="95" height="120" rx="3" fill="url(#wrTankL)" stroke="#1a3a6b" stroke-width="2"/>
    <!-- Water inside -->
    <rect x="32" y="68" width="91" height="90" rx="1" fill="url(#wrWaterL)" opacity="0.7"/>
    <!-- Water surface ripple -->
    <g class="waveL">
      <path d="M34,68 Q55,64 77,68 Q99,72 121,68" fill="none" stroke="#8ac4e8" stroke-width="1.5"/>
      <path d="M34,72 Q55,68 77,72 Q99,76 121,72" fill="none" stroke="#8ac4e8" stroke-width="0.8" opacity="0.5"/>
    </g>
    <!-- Tank rim -->
    <rect x="27" y="38" width="101" height="5" rx="2" fill="#8a9ab5" stroke="#5a7090" stroke-width="1"/>
  </g>

  <!-- Right reservoir (lower, 50 ft) -->
  <g filter="url(#wrShadow)">
    <rect x="270" y="90" width="95" height="70" rx="3" fill="url(#wrTankR)" stroke="#1a3a6b" stroke-width="2"/>
    <!-- Water inside -->
    <rect x="272" y="118" width="91" height="40" rx="1" fill="url(#wrWaterR)" opacity="0.7"/>
    <!-- Water surface ripple -->
    <g class="waveR">
      <path d="M274,118 Q295,114 317,118 Q339,122 361,118" fill="none" stroke="#8ac4e8" stroke-width="1.5"/>
      <path d="M274,122 Q295,118 317,122 Q339,126 361,122" fill="none" stroke="#8ac4e8" stroke-width="0.8" opacity="0.5"/>
    </g>
    <!-- Tank rim -->
    <rect x="267" y="88" width="101" height="5" rx="2" fill="#8a9ab5" stroke="#5a7090" stroke-width="1"/>
  </g>

  <!-- Pipe connecting reservoirs -->
  <line x1="125" y1="105" x2="270" y2="132" stroke="#888" stroke-width="8" stroke-linecap="round"/>
  <line x1="125" y1="105" x2="270" y2="132" stroke="#bbb" stroke-width="4" stroke-linecap="round"/>

  <!-- Question mark on pipe -->
  <circle cx="198" cy="115" r="14" fill="rgba(220,38,38,0.08)" stroke="#dc2626" stroke-width="1.5"/>
  <text x="198" y="121" text-anchor="middle" font-size="18" font-weight="800" fill="#dc2626">?</text>

  <!-- Height dimension lines -->
  <!-- Left: 100 ft -->
  <line x1="22" y1="40" x2="22" y2="160" stroke="#c8960a" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="18" y1="40" x2="26" y2="40" stroke="#c8960a" stroke-width="1.5"/>
  <line x1="18" y1="160" x2="26" y2="160" stroke="#c8960a" stroke-width="1.5"/>
  <text x="12" y="105" text-anchor="middle" font-size="10" font-weight="700" fill="#c8960a" transform="rotate(-90,12,105)">100 ft</text>

  <!-- Right: 50 ft -->
  <line x1="372" y1="90" x2="372" y2="160" stroke="#c8960a" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="368" y1="90" x2="376" y2="90" stroke="#c8960a" stroke-width="1.5"/>
  <line x1="368" y1="160" x2="376" y2="160" stroke="#c8960a" stroke-width="1.5"/>
  <text x="383" y="130" text-anchor="middle" font-size="10" font-weight="700" fill="#c8960a" transform="rotate(-90,383,130)">50 ft</text>

  <!-- Bottom label -->
  <text x="200" y="185" text-anchor="middle" font-size="10" fill="#5a7090" font-weight="600">Which direction does the water flow through the pipe?</text>
  <text x="200" y="196" text-anchor="middle" font-size="9" fill="#8a9ab5">Elevation determines flow direction</text>
</svg>