<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Veteran to Civilian — Career Transitions</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#2e4880;font-family:Georgia,serif;}
    #loading{position:fixed;inset:0;background:#2e4880;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:999;}
    #loading img{width:160px;height:160px;object-fit:contain;}
    #loading p{color:#e8c97a;letter-spacing:.15em;font-size:1rem;}
    .spin{width:44px;height:44px;border:3px solid rgba(201,168,76,.25);border-top-color:#c9a84c;border-radius:50%;animation:sp .8s linear infinite;}
    @keyframes sp{to{transform:rotate(360deg)}}
    #admin-btn{position:fixed;bottom:16px;right:16px;z-index:9999;background:linear-gradient(135deg,#c9a84c,#e8c97a);color:#1a1a2e;border:none;padding:9px 18px;border-radius:4px;cursor:pointer;font-weight:bold;font-size:13px;box-shadow:0 4px 16px rgba(0,0,0,.4);display:none;}
    #admin-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:10000;align-items:center;justify-content:center;padding:16px;}
    #admin-overlay.open{display:flex;}
    #admin-box{background:#1e2d4e;border:2px solid #c9a84c;border-radius:8px;padding:24px;max-width:460px;width:100%;color:#f0ead8;}
    #admin-box h2{color:#e8c97a;margin:0 0 10px;font-size:1.3rem;}
    #admin-box p{font-size:13px;color:#a0b8d0;margin:0 0 14px;line-height:1.6;}
    #admin-key-input{width:100%;padding:10px;border-radius:4px;border:1.5px solid #c9a84c;background:#fff;color:#1a1a2e;font-size:14px;margin-bottom:12px;font-family:monospace;}
    .arow{display:flex;gap:8px;}
    .asave{flex:1;padding:10px;background:linear-gradient(135deg,#c9a84c,#e8c97a);border:none;border-radius:4px;color:#1a1a2e;font-weight:bold;cursor:pointer;font-size:14px;}
    .acancel{padding:10px 16px;background:transparent;border:1px solid #666;border-radius:4px;color:#aaa;cursor:pointer;}
    #astatus{font-size:12px;color:#6fcf97;margin-top:10px;min-height:16px;}
  </style>
</head>
<body>

  <div id="loading">
    <img id="loading-logo" alt=""/>
    <p>VETERAN CAREER BUILDER</p>
    <div class="spin"></div>
  </div>

  <div id="root"></div>

  <button id="admin-btn" onclick="openAdmin()">ADMIN SETUP</button>

  <div id="admin-overlay">
    <div id="admin-box">
      <h2>Admin Setup</h2>
      <p>Enter your Anthropic API key to enable AI features.<br>
        Get a free key at <a href="https://console.anthropic.com/settings/keys" target="_blank" style="color:#e8c97a;">console.anthropic.com</a>
      </p>
      <input id="admin-key-input" type="password" placeholder="sk-ant-api03-..."/>
      <div class="arow">
        <button class="asave" onclick="saveKey()">Save API Key</button>
        <button class="acancel" onclick="closeAdmin()">Cancel</button>
      </div>
      <div id="astatus"></div>
    </div>
  </div>

  <!-- Error catcher and timeout display -->
  <script>
    window.onerror = function(msg, src, line, col, err) {
      var el = document.getElementById("loading");
      if (!el) return;
      el.innerHTML =
        '<div style="padding:2rem;max-width:580px;">' +
        '<img src="' + (window.VCB_LOGO||'') + '" style="width:90px;margin-bottom:1rem;display:block;mix-blend-mode:screen"/>' +
        '<h2 style="color:#e8c97a;font-family:Georgia,serif;margin-bottom:.75rem;">App Error</h2>' +
        '<div style="background:rgba(224,85,85,.15);border:1px solid rgba(224,85,85,.4);border-radius:4px;padding:.85rem;color:#f5c6c6;font-size:.82rem;font-family:monospace;word-break:break-all;margin-bottom:1rem;line-height:1.6;">' +
        msg + ' (line ' + line + ')' +
        '</div>' +
        '<p style="color:#a0b8d0;font-size:.82rem;">Press F12 and check the Console tab for full error details.</p>' +
        '</div>';
    };
    // Show "still loading" message after 15s, timeout message after 40s

      var p=document.querySelector("#loading p");
      if(p) p.innerHTML="COMPILING... (please wait up to 30 seconds)";
    }, 15000);

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function getBadge(type) {
  if (type === "Military Service") return "badge bm";
  if (type === "Reserve/Guard (concurrent with civilian)") return "badge br";
  if (type === "DoD/Government Contractor") return "badge bd";
  if (type === "Other Government (Federal/State)") return "badge bg";
  return "badge bc";
}

function getClearanceBadge(lvl) {
  if (!lvl || lvl === "None") return "cl-badge cl-none";
  if (lvl.includes("Poly") || lvl.includes("SCI")) return "cl-badge cl-ts-sci";
  if (lvl.startsWith("Top Secret")) return "cl-badge cl-ts";
  if (lvl === "Secret") return "cl-badge cl-s";
  return "cl-badge cl-c";
}

// ── API KEY CHECK ───────────────────────────────────────────────────────────
function isApiKeySet() {
  const key = localStorage.getItem("vcb_admin_key") || "";
  return key.length > 20;
}
function getStoredApiKey() {
  return localStorage.getItem("vcb_admin_key") || "";
}

async function callClaude(prompt, system = "", maxTokens = 2000) {
  try {
    const body = {
      model: "claude-sonnet-4-20250514",
      max_tokens: maxTokens,
      messages: [{ role: "user", content: prompt }]
    };
    if (system) body.system = system;

    const r = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": getStoredApiKey(),
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify(body)
    });

    if (!r.ok) {
      const err = await r.json();
      console.error("Anthropic API error:", err);
      throw new Error((err && err.error && err.error.message) || "API request failed with status " + r.status);
    }

    const d = await r.json();
    return d.content ? d.content.map(b => b.text || "").join("") : "";
  } catch(e) {
    console.error("callClaude error:", e);
    throw e;
  }
}
// ── DATE PICKER COMPONENT ─────────────────────────────────────────────────────
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function DatePicker({ value, onChange, placeholder = "Select date" }) {
  const [open, setOpen] = useState(false);
  const [mode, setMode] = useState("year"); // year | month
  const [selYear, setSelYear] = useState(null);
  const ref = useRef(null);
  const now = new Date();
  const currentYear = now.getFullYear();
  const years = Array.from({length: 50}, (_, i) => currentYear - i);

  useEffect(() => {
    const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, []);

  const parsed = value ? { year: value.split("-")[0], month: value.split("-")[1] } : null;
  const display = parsed
    ? `${MONTHS[parseInt(parsed.month) - 1]} ${parsed.year}`
    : placeholder;

  const pickYear = (y) => { setSelYear(y); setMode("month"); };
  const pickMonth = (m) => {
    const mm = String(m + 1).padStart(2, "0");
    onChange(`${selYear}-${mm}`);
    setOpen(false);
    setMode("year");
  };

  return (
    <div className="date-picker" ref={ref}>
      <div className="date-display" onClick={() => { setOpen(o => !o); setMode("year"); }}>
        <span style={{color: parsed ? "var(--text)" : "var(--dim)"}}>{display}</span>
        <span style={{fontSize:".7rem",color:"var(--slate)"}}>▼</span>
      </div>
      {open && (
        <div className="date-dropdown">
          <div className="date-dropdown-head">
            {mode === "month" ? (
              <>
                <button className="date-nav-btn" onClick={() => setMode("year")}>← Years</button>
                <span>{selYear}</span>
                <div/>
              </>
            ) : (
              <span>Select Year</span>
            )}
          </div>
          {mode === "year" && (
            <div className="year-grid">
              {years.map(y => (
                <button key={y} className={"year-btn" + ((parsed && parsed.year) == y ? " sel" : "")}
                  onClick={() => pickYear(y)}>{y}</button>
              ))}
            </div>
          )}
          {mode === "month" && (
            <div className="month-grid">
              {MONTHS.map((m, i) => (
                <button key={m} className={"month-btn" + ((parsed && parsed.month) == String(i+1).padStart(2,"0") ? " sel" : "")}
                  onClick={() => pickMonth(i)}>{m}</button>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ── UNIVERSITY AUTOCOMPLETE COMPONENT ────────────────────────────────────────
function UniversityInput({ value, onChange, placeholder }) {
  const [suggestions, setSuggestions] = useState([]);
  const [open, setOpen] = useState(false);
  const ref = useRef(null);

  useEffect(() => {
    const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, []);

  const handleChange = (val) => {
    onChange(val);
    if (val.length > 1) {
      const q = val.toLowerCase();
      const matches = UNIVERSITIES.filter(u => u.toLowerCase().includes(q)).slice(0, 8);
      setSuggestions(matches);
      setOpen(matches.length > 0);
    } else {
      setOpen(false);
    }
  };

  const highlight = (text, query) => {
    const idx = text.toLowerCase().indexOf(query.toLowerCase());
    if (idx === -1) return text;
    return (
      <>{text.slice(0, idx)}<strong style={{color:"var(--gold-light)"}}>{text.slice(idx, idx + query.length)}</strong>{text.slice(idx + query.length)}</>
    );
  };

  return (
    <div className="field" ref={ref} style={{position:"relative",marginBottom:0}}>
      <input
        placeholder={placeholder || "Start typing institution name..."}
        value={value}
        onChange={e => handleChange(e.target.value)}
        onFocus={() => value.length > 1 && setOpen(suggestions.length > 0)}
        autoComplete="off"
      />
      {open && (
        <div className="autocomplete-list">
          {suggestions.map(s => (
            <div key={s} className="autocomplete-item"
              onMouseDown={() => { onChange(s); setOpen(false); }}>
              {highlight(s, value)}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

  const [resumeFormat, setResumeFormat] = useState("ats_chrono");
  const [translationData, setTranslationData] = useState(null);
  const [loading, setLoading] = useState({ translate:false, careers:false, resume:false, careerDetail:false });
  const [apiError, setApiError] = useState("");
  const [showAdminSetup, setShowAdminSetup] = useState(false);
  const [adminKeyInput, setAdminKeyInput] = useState("");
  const [adminKeySet, setAdminKeySet] = useState(() => {
    const k = localStorage.getItem("vcb_admin_key")||"";
    return k.length > 20;
  });
  const [careerError, setCareerError] = useState("");
  const [resumeError, setResumeError] = useState("");
  const [copied, setCopied] = useState(false);

  // ── AUTH STATE ──
  const [authMode, setAuthMode] = useState("login");
  const [showAuth, setShowAuth] = useState(false);
  const [authForm, setAuthForm] = useState({ username:"", password:"", confirmPassword:"", name:"" });
  const [authErr, setAuthErr] = useState("");
  const [authOk, setAuthOk] = useState("");
  const [currentUser, setCurrentUser] = useState(null);
  const [saveToast, setSaveToast] = useState("");
  const [hasUnsaved, setHasUnsaved] = useState(false);
  const [savedResumes, setSavedResumes] = useState([]);
  const [viewingResume, setViewingResume] = useState(null);

  // ── FIREBASE STORAGE HELPERS ────────────────────────────────────────────────

  const showToast = (msg) => {
    setSaveToast(msg);
    setTimeout(() => setSaveToast(""), 2800);
  };

  // ── LISTEN FOR FIREBASE AUTH STATE ──
  useEffect(() => {
    const unsubscribe = fbAuth.onAuthStateChanged(async (firebaseUser) => {
      if (firebaseUser) {
        // User is signed in
        const initials = (firebaseUser.displayName || firebaseUser.email)
          .split(" ").map(w => w[0]).join("").toUpperCase().slice(0, 2);
        const user = {
          uid: firebaseUser.uid,
          name: firebaseUser.displayName || firebaseUser.email.split("@")[0],
          email: firebaseUser.email,
          initials,
        };
        setCurrentUser(user);
        setHasUnsaved(false);
        // Load their saved profile
        try {
          const doc = await fbDb.collection("profiles").doc(firebaseUser.uid).get();
          if (doc.exists) {
            const data = doc.data();
            if (data.personal) setPersonal(data.personal);
            if ((data.milExperiences && data.milExperiences.length)) setMilExperiences(data.milExperiences);
          if ((data.civExperiences && data.civExperiences.length)) setCivExperiences(data.civExperiences);
          // backwards compat
          if (!data.milExperiences && (data.experiences && data.experiences.length)) setMilExperiences(data.experiences);
            if ((data.education && data.education.length)) setEducation(data.education);
            if (data.skills) setSkills(data.skills);
            if (data.target) setTarget(data.target);
          }
          // Load saved resumes
          const resumesSnap = await fbDb.collection("profiles").doc(firebaseUser.uid)
            .collection("resumes").orderBy("createdAt","desc").limit(20).get();
          setSavedResumes(resumesSnap.docs.map(d => d.data()));
        } catch(e) { console.warn("Profile load error:", e); }
      } else {
        setCurrentUser(null);
        setSavedResumes([]);
      }
    });
    return () => unsubscribe();
  }, []);

  // Mark unsaved when key fields change
  useEffect(() => { if (currentUser) setHasUnsaved(true); }, [personal, experiences, education, skills]);

  // ── AUTH HANDLERS (Firebase) ──
  const handleRegister = async () => {
    setAuthErr(""); setAuthOk("");
    if (!authForm.name.trim()) return setAuthErr("Full name is required.");
    if (!authForm.username.trim()) return setAuthErr("Email is required.");
    if (authForm.password.length < 6) return setAuthErr("Password must be at least 6 characters.");
    if (authForm.password !== authForm.confirmPassword) return setAuthErr("Passwords do not match.");
    try {
      const cred = await fbAuth.createUserWithEmailAndPassword(authForm.username.trim(), authForm.password);
      await cred.user.updateProfile({ displayName: authForm.name.trim() });
      setAuthOk("Account created! Signing you in...");
      setShowAuth(false);
      showToast("Welcome, " + authForm.name.split(" ")[0] + "! ✓");
      setAuthForm({ username:"", password:"", confirmPassword:"", name:"" });
    } catch(e) {
      if (e.code === "auth/email-already-in-use") setAuthErr("An account with this email already exists.");
      else if (e.code === "auth/invalid-email") setAuthErr("Please enter a valid email address.");
      else setAuthErr(e.message);
    }
  };

  const handleLogin = async () => {
    setAuthErr(""); setAuthOk("");
    try {
      await fbAuth.signInWithEmailAndPassword(authForm.username.trim(), authForm.password);
      setShowAuth(false);
      setAuthForm({ username:"", password:"", confirmPassword:"", name:"" });
    } catch(e) {
      if (e.code === "auth/user-not-found") setAuthErr("No account found with that email.");
      else if (e.code === "auth/wrong-password") setAuthErr("Incorrect password.");
      else if (e.code === "auth/invalid-email") setAuthErr("Please enter a valid email address.");
      else setAuthErr(e.message);
    }
  };

  const handleLogout = async () => {
    await fbAuth.signOut();
    setCurrentUser(null);
    setSavedResumes([]);
    setHasUnsaved(false);
    // Reset form fields
    setPersonal({ name:"", email:"", phone:"", location:"", linkedin:"" });
    setExperiences([newMilExp()]);
    setEducation([{ id:1, institution:"", degree:"", field:"", year:"", pme:"" }]);
    setSkills({ technical:"", leadership:"", languages:"", certs:"" });
  };

  const handleSaveProfile = async () => {
    if (!currentUser) { setShowAuth(true); return; }
    try {
      await fbDb.collection("profiles").doc(currentUser.uid).set({
        personal, milExperiences, civExperiences, education, skills, target,
        updatedAt: new Date().toISOString()
      }, { merge: true });
      showToast("Profile saved ✓");
      setHasUnsaved(false);
    } catch(e) { showToast("Save failed — check connection"); }
  };

  const handleSaveResume = async () => {
    if (!currentUser) { setShowAuth(true); return; }
    if (!resume) return;
    try {
      const id = Date.now().toString();
      const entry = {
        id,
        title: target.title || "Untitled Resume",
        industry: target.industry || "",
        format: resumeFormat,
        date: new Date().toLocaleDateString("en-US", { year:"numeric", month:"short", day:"numeric" }),
        preview: resume.slice(0, 120) + "...",
        content: resume,
        createdAt: new Date().toISOString(),
      };
      await fbDb.collection("profiles").doc(currentUser.uid)
        .collection("resumes").doc(id).set(entry);
      setSavedResumes(prev => [entry, ...prev].slice(0, 20));
      showToast("Resume saved to your profile ✓");
    } catch(e) { showToast("Save failed — check connection"); }
  };

  const handleDeleteResume = async (id) => {
    if (!currentUser) return;
    try {
      await fbDb.collection("profiles").doc(currentUser.uid)
        .collection("resumes").doc(id.toString()).delete();
      setSavedResumes(prev => prev.filter(r => r.id !== id));
      showToast("Resume deleted");
    } catch(e) { showToast("Delete failed"); }
  };

  const handleLoadResume = (r) => {
    setResume(r.content);
    setTarget(t => ({ ...t, title: r.title, industry: r.industry }));
    setTab(2);
    showToast("Resume loaded ✓");
  };



  const setL = (k,v) => setLoading(l=>({...l,[k]:v}));
  const upP = (k,v) => setPersonal(p=>({...p,[k]:v}));
  const upT = (k,v) => setTarget(p=>({...p,[k]:v}));
  const upMilExp = (id,k,v) => setMilExperiences(es=>es.map(e=>e.id===id
    ? {...e,[k]:v,...(k==="mos"?{mosTitle:(MOS_DATA[v.toUpperCase()] && MOS_DATA[v.toUpperCase()].title)||""}:{})}
    : e));
  const upCivExp = (id,k,v) => setCivExperiences(es=>es.map(e=>e.id===id
    ? {...e,[k]:v}
    : e));
  const upExp = (id,k,v) => {
    if (milExperiences.find(e=>e.id===id)) upMilExp(id,k,v);
    else upCivExp(id,k,v);
  };

  // ASI helpers
  const addAsi = (id) => {
    const exp = experiences.find(e=>e.id===id);
    if (!exp) return;
    const code = exp.customAsiCode.trim().toUpperCase();
    const desc = exp.customAsiDesc.trim() || (COMMON_ASI.find(a=>a.code===code) ? COMMON_ASI.find(a=>a.code===code).desc : undefined) || "";
    if (!code) return;
    if (exp.asi.find(a=>a.code===code)) return;
    upExp(id,"asi",[...exp.asi,{code,desc}]);
    upExp(id,"customAsiCode",""); upExp(id,"customAsiDesc","");
  };
  const addAsiCommon = (id,asi) => {
    const exp = experiences.find(e=>e.id===id);
    if (!exp||exp.asi.find(a=>a.code===asi.code)) return;
    upExp(id,"asi",[...exp.asi,asi]);
  };
  const rmAsi = (id,code) => { const exp=experiences.find(e=>e.id===id); upExp(id,"asi",exp.asi.filter(a=>a.code!==code)); };

  // SQI helpers
  const addSqi = (id) => {
    const exp = experiences.find(e=>e.id===id);
    if (!exp) return;
    const code = exp.customSqiCode.trim().toUpperCase();
    const desc = exp.customSqiDesc.trim() || (COMMON_SQI.find(s=>s.code===code) ? COMMON_SQI.find(s=>s.code===code).desc : undefined) || "";
    if (!code) return;
    if (exp.sqi.find(s=>s.code===code)) return;
    upExp(id,"sqi",[...exp.sqi,{code,desc}]);
    upExp(id,"customSqiCode",""); upExp(id,"customSqiDesc","");
  };
  const addSqiCommon = (id,sqi) => {
    const exp = experiences.find(e=>e.id===id);
    if (!exp||exp.sqi.find(s=>s.code===sqi.code)) return;
    upExp(id,"sqi",[...exp.sqi,sqi]);
  };
  const rmSqi = (id,code) => { const exp=experiences.find(e=>e.id===id); upExp(id,"sqi",exp.sqi.filter(s=>s.code!==code)); };

  // Duty helpers
  const addDuty = (id, duty) => {
    const exp = experiences.find(e=>e.id===id);
    if (!exp||!duty.trim()||exp.additionalDuties.includes(duty.trim())) return;
    upExp(id,"additionalDuties",[...exp.additionalDuties,duty.trim()]);
    upExp(id,"customDuty","");
  };
  const rmDuty = (id,d) => { const exp=experiences.find(e=>e.id===id); upExp(id,"additionalDuties",exp.additionalDuties.filter(x=>x!==d)); };

  const addMilExp = () => setMilExperiences(es=>[...es,newMilExp()]);
  const addCivExp = () => setCivExperiences(es=>[...es,newCivExp()]);
  const addExp = () => setCivExperiences(es=>[...es,newCivExp()]);
  const rmExp = id => {
    setMilExperiences(es=>es.filter(e=>e.id!==id));
    setCivExperiences(es=>es.filter(e=>e.id!==id));
  };
  const upEdu = (id,k,v) => setEducation(eds=>eds.map(e=>e.id===id?{...e,[k]:v}:e));
  const addEdu = () => setEducation(eds=>[...eds,{id:Date.now(),institution:"",degree:"",field:"",year:"",pme:""}]);
  const rmEdu = id => setEducation(eds=>eds.filter(e=>e.id!==id));
  const toggleCollapse = id => setCollapsed(c=>({...c,[id]:!c[id]}));

  // ── BUILD SUMMARIES ────────────────────────────────────────────────────────
  const buildExpSummary = () => {
    const milParts = milExperiences.map(e=>{
      const rolesStr = (e.mosRoles||[]).length
        ? `Sub-roles: ${e.mosRoles.map(r=>r.title+" ("+r.duration+")").join(", ")}`
        : "";
      const awardsStr = (e.awards||[]).length ? `Awards: ${(e.awards||[]).join(", ")}` : "";
      const qualStr = [
        (e.asi && e.asi.length)?`ASIs: ${e.asi.map(a=>a.code+"("+a.desc+")").join(", ")}`:null,
        (e.sqi && e.sqi.length)?`SQIs: ${e.sqi.map(s=>s.code+"("+s.desc+")").join(", ")}`:null,
        (e.additionalDuties && e.additionalDuties.length)?`Additional Duties: ${e.additionalDuties.join(", ")}`:null,
      ].filter(Boolean).join(" | ");
      const clearStr = e.clearanceLevel!=="None"
        ? `Clearance: ${e.clearanceLevel} (${e.clearanceStatus})${e.polygraph!=="None"?" + "+e.polygraph+" Poly":""}`
        : "No clearance";
      return `[MILITARY] ${e.branch} | ${e.rank} | MOS: ${e.mos}${e.mosTitle?" ("+e.mosTitle+")":""} | ${e.serviceType} | Unit: ${e.unit} | TOS: ${e.tos||"not listed"} | ${e.startDate||"?"}–${e.current?"Present":e.endDate||"?"} | ${clearStr}${qualStr?" | "+qualStr:""} | Duties: ${e.duties||"not listed"}${rolesStr?" | "+rolesStr:""}${awardsStr?" | "+awardsStr:""}${e.deployments?" | Deployments: "+e.deployments:""}`;
    });
    const civParts = civExperiences.map(e=>{
      const clearStr = (e.clearanceLevel&&e.clearanceLevel!=="None")
        ? `Clearance: ${e.clearanceLevel}`:"";
      return `[${e.type.toUpperCase()}] ${e.jobTitle||"Role"} at ${e.employer||"Unknown"} | ${e.startDate||"?"}–${e.current?"Present":e.endDate||"?"} | Duties: ${e.duties||"not listed"}${clearStr?" | "+clearStr:""}`;
    });
    return [...milParts,...civParts].join("\n");
  };

  // ── TRANSLATE ──────────────────────────────────────────────────────────────
  const translateMOS = async () => {
    if (!isApiKeySet()) { setShowAdminSetup(true); return; }
    if (!milExperiences.length) return;
    setApiError("");
    setTranslationData(null);
    setMosOut("");

                        const {jsPDF} = window.jspdf;
                        const doc = new jsPDF();
                        let y = 20;
                        const addLine = (text, size=10, bold=false) => {
                          if(y>270){doc.addPage();y=20;}
                          doc.setFontSize(size);
                          doc.setFont("helvetica", bold?"bold":"normal");
                          const lines = doc.splitTextToSize(text||"", 170);
                          doc.text(lines, 20, y);
                          y += lines.length * (size*0.4+2);
                        };
                        addLine("MILITARY EXPERIENCE — CIVILIAN TRANSLATION", 14, true);
                        addLine("Generated by Veteran Career Builder", 9);
                        y+=4;

                <div className="format-grid">
                  {RESUME_FORMATS.map(f=>(
                    <div key={f.id} className={`format-card ${resumeFormat===f.id?"sel":""}`} onClick={()=>setResumeFormat(f.id)}>
                      <h4>{f.label}</h4>
                      <p>{f.desc}</p>
                    </div>
                  ))}
                </div>
                <div style={{fontSize:".78rem",color:"var(--dim)",marginTop:".25rem",fontStyle:"italic"}}>
                  💡 For most veteran transitions: <strong style={{color:"var(--gold-light)"}}>ATS Chronological</strong>, <strong style={{color:"var(--gold-light)"}}>ATS Combination</strong>, or <strong style={{color:"var(--gold-light)"}}>Federal/USAJobs</strong> are the strongest choices.
                </div>
              </div>
            </div>

            <button className="btn-primary" onClick={genResume} disabled={loading.resume||!personal.name}>
              {loading.resume?"Crafting Your Resume...":`📄  Generate My ${(RESUME_FORMATS.find(f=>f.id===resumeFormat) ? RESUME_FORMATS.find(f=>f.id===resumeFormat).label : "Professional")||"Professional"} Resume`}
            </button>
            {loading.resume&&<div className="loading"><div className="spin"/><span>Generating your resume — this may take 15-30 seconds...</span></div>}
            {resume&&!loading.resume&&(
              <div style={{marginTop:"1rem"}}>
                <div className="resume-out">
                  <div className="resume-out-head">
                    <h3>Your {(RESUME_FORMATS.find(f=>f.id===resumeFormat) ? RESUME_FORMATS.find(f=>f.id===resumeFormat).label : "Professional")||"Professional"} Resume</h3>
                    <div style={{display:"flex",gap:".4rem",flexWrap:"wrap"}}>
                      <button className="btn-sec" style={{color:"#333",borderColor:"#aaa"}} onClick={handleSaveResume}>💾 Save</button>
                      <button className="btn-sec" style={{color:"#333",borderColor:"#aaa"}} onClick={copy}>{copied?"✓ Copied!":"Copy Text"}</button>
                      <button className="btn-sec" style={{color:"#333",borderColor:"#aaa"}} onClick={()=>{
                        const jsPDFScript = document.createElement("script");
                        jsPDFScript.src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
                        document.head.appendChild(jsPDFScript);
                        jsPDFScript.onload = () => {
                          const {jsPDF} = window.jspdf;
                          const doc = new jsPDF({unit:"pt",format:"letter"});
                          const lines = resume.split("\n");
                          let y = 50;
                          doc.setFont("helvetica","normal");
                          lines.forEach(line => {
                            if(y > 720){doc.addPage(); y=50;}
                            const trimmed = line.trim();
                            if(!trimmed){y+=8;return;}
                            // Detect headers (ALL CAPS lines or lines ending with :)
                            const isHeader = trimmed === trimmed.toUpperCase() && trimmed.length > 3 && trimmed.length < 50;
                            const isName = y < 100;
                            if(isName && y===50){
                              doc.setFontSize(16); doc.setFont("helvetica","bold");
                            } else if(isHeader){
                              doc.setFontSize(10); doc.setFont("helvetica","bold");
                              doc.setDrawColor(80,80,80);
                              doc.line(40, y+3, 570, y+3);
                              y+=5;
                            } else if(trimmed.startsWith("•")||trimmed.startsWith("-")){
                              doc.setFontSize(9.5); doc.setFont("helvetica","normal");
                            } else {
                              doc.setFontSize(10); doc.setFont("helvetica","normal");
                            }
                            const wrapped = doc.splitTextToSize(trimmed, 510);
                            doc.text(wrapped, 40, y);
                            y += wrapped.length * (doc.getFontSize() * 1.35);
                            doc.setFontSize(10); doc.setFont("helvetica","normal");
                          });
                          doc.save(`${personal.name||"veteran"}-resume.pdf`);
                        };
                      }}>Export PDF</button>
                    </div>
                  </div>
                  <div className="resume-out-inner">
                    {resume.split("\n").map((line,i)=>{
                      const t = line.trim();
                      if(!t) return <div key={i} style={{height:"6pt"}}/>;
                      const isAllCaps = t===t.toUpperCase() && t.length>3 && t.length<60 && !/[0-9@|]/.test(t);
                      const isBullet = t.startsWith("•") || t.startsWith("-") || t.startsWith("·");
                      const isContact = i < 5 && (t.includes("@")||t.includes("|")||t.includes("("));
                      if(i===0) return <h1 key={i}>{t}</h1>;
                      if(i<4 && isContact) return <p key={i} style={{fontSize:"9pt",color:"#444",marginBottom:"1pt"}}>{t}</p>;
                      if(isAllCaps) return <h2 key={i}>{t}</h2>;
                      if(isBullet) return <p key={i} style={{paddingLeft:"12pt",marginBottom:"2pt",fontSize:"9.5pt"}}>
                        <span style={{marginLeft:"-12pt",marginRight:"4pt"}}>•</span>{t.replace(/^[•\-·]\s*/,"")}
                      </p>;
                      return <p key={i} style={{marginBottom:"2pt"}}>{t}</p>;
                    })}
                  </div>
                </div>
              </div>
            )}
            <div className="nav-row"><button className="btn-sec" onClick={()=>setTab(1)}>← Career Pathways</button><div/></div>
          </div>

          {/* ══ TAB 3: MY PROFILE ══ */}
          <div className={`panel ${tab===3?"on":""}`}>
            {!currentUser?(
              <div style={{textAlign:"center",padding:"3rem 1rem"}}>
                <div style={{fontSize:"3rem",marginBottom:"1rem"}}>🔒</div>
                <h3 style={{fontFamily:"'Bebas Neue',sans-serif",letterSpacing:".1em",color:"var(--gold-light)",fontSize:"1.2rem",marginBottom:".5rem"}}>Sign In to Access Your Profile</h3>
                <p style={{color:"var(--dim)",fontSize:".88rem",marginBottom:"1.5rem",lineHeight:"1.65"}}>Create a free account to save your service profile, store multiple resumes, and pick up right where you left off.</p>
                <button className="btn-primary" style={{maxWidth:"280px",margin:"0 auto"}} onClick={()=>setShowAuth(true)}>🔑 Sign In / Create Account</button>
              </div>
            ):(
              <>
                {/* Profile hero */}
                <div className="prof-hero">
                  <div className="prof-avatar">{currentUser.initials}</div>
                  <div style={{flex:1}}>
                    <h2>{currentUser.name}</h2>
                    <p>@{currentUser.username} · {savedResumes.length} saved resume{savedResumes.length!==1?"s":""}</p>
                  </div>
                  <button className="btn-primary" style={{width:"auto",padding:".6rem 1.3rem",fontSize:".85rem"}} onClick={handleSaveProfile}>
                    💾 Save Profile{hasUnsaved?" *":""}
                  </button>
                </div>

                {/* Saved Resumes */}
                <div className="card">
                  <div className="ch" style={{justifyContent:"space-between"}}>
                    <h3>Saved Resumes</h3>
                    {resume&&<button className="btn-sec" style={{fontSize:".72rem",padding:".28rem .7rem"}} onClick={handleSaveResume}>+ Save Current Resume</button>}
                  </div>
                  <div className="cb">
                    {savedResumes.length===0?(
                      <div style={{textAlign:"center",padding:"1.5rem",color:"var(--dim)",fontSize:".88rem"}}>
                        <div style={{fontSize:"2rem",marginBottom:".5rem"}}>📄</div>
                        No saved resumes yet. Generate a resume on the Build Resume tab and save it here.
                      </div>
                    ):(
                      <>
                        {viewingResume?(
                          <>
                            <button className="btn-sec" style={{marginBottom:"1rem",fontSize:".75rem"}} onClick={()=>setViewingResume(null)}>← Back to List</button>
                            <div style={{marginBottom:".5rem",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:".5rem"}}>
                              <div>
                                <div style={{fontFamily:"'Bebas Neue',sans-serif",letterSpacing:".08em",color:"var(--gold-light)",fontSize:"1rem"}}>{viewingResume.title}</div>
                                <div style={{fontSize:".75rem",color:"var(--dim)"}}>{viewingResume.date} {viewingResume.industry&&`· ${viewingResume.industry}`}</div>
                              </div>
                              <div style={{display:"flex",gap:".35rem"}}>
                                <button className="btn-sec" style={{fontSize:".72rem"}} onClick={()=>{navigator.clipboard.writeText(viewingResume.content);showToast("Copied ✓");}}>Copy</button>
                                <button className="btn-sec" style={{fontSize:".72rem"}} onClick={()=>handleLoadResume(viewingResume)}>Load into Builder</button>
                              </div>
                            </div>
                            <div style={{background:"rgba(255,255,255,.03)",border:"1px solid rgba(201,168,76,.15)",borderRadius:"3px",padding:"1.2rem",whiteSpace:"pre-wrap",fontSize:".85rem",lineHeight:"1.85",color:"#d0c8b8",maxHeight:"500px",overflowY:"auto"}}>{viewingResume.content}</div>
                          </>
                        ):(
                          savedResumes.map(r=>(
                            <div className="saved-card" key={r.id}>
                              <div className="saved-card-row">
                                <div style={{flex:1,minWidth:0}}>
                                  <h4>{r.title}</h4>
                                  <p>{r.date}{r.industry?` · ${r.industry}`:""}</p>
                                  <p style={{marginTop:".3rem",fontStyle:"italic",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:"380px"}}>{r.preview}</p>
                                </div>
                                <div className="card-actions">
                                  <button className="btn-sec" style={{fontSize:".7rem",padding:".28rem .6rem"}} onClick={()=>setViewingResume(r)}>View</button>
                                  <button className="btn-sec" style={{fontSize:".7rem",padding:".28rem .6rem"}} onClick={()=>handleLoadResume(r)}>Load</button>
                                  <button className="btn-danger" onClick={()=>handleDeleteResume(r.id)}>Delete</button>
                                </div>
                              </div>
                            </div>
                          ))
                        )}
                      </>
                    )}
                  </div>
                </div>

                {/* Account Actions */}
                <div className="card">
                  <div className="ch"><h3>Account</h3></div>
                  <div className="cb" style={{display:"flex",gap:".6rem",flexWrap:"wrap"}}>
                    <button className="btn-sec" onClick={handleSaveProfile}>💾 Save Profile & Qualifications</button>
                    <button className="btn-danger" onClick={()=>{if(window.confirm("Sign out?")) handleLogout();}}>Sign Out</button>
                    <button className="btn-danger" onClick={()=>{
                      if(window.confirm("Delete all your saved data? This cannot be undone.")) {
                        localStorage.removeItem(`vcb_user_${currentUser.username}`);
                        localStorage.removeItem(storageKey(currentUser.username,"profile"));
                        localStorage.removeItem(storageKey(currentUser.username,"resumes"));
                        handleLogout();
                      }
                    }}>Delete Account</button>
                  </div>
                </div>

                <div className="nav-row">
                  <button className="btn-sec" onClick={()=>setTab(2)}>← Build Resume</button>
                  <button className="btn-sec" onClick={()=>setTab(0)}>Back to Top →</button>
                </div>
              </>
            )}
          </div>

        </div>
      </div>

      {/* SAVE TOAST */}
      {saveToast&&<div className="save-toast">{saveToast}</div>}
    </>
  );
}

    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
    hideLoading();
  </script>

</body>
</html>
