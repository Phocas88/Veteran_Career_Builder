<!DOCTYPE html>

<head>

<title>Offline | Veteran Career Path</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'DM Sans',system-ui,sans-serif;
  background:#050d18;color:rgba(245,240,232,.92);
  min-height:100vh;display:flex;align-items:center;justify-content:center;

.offline-wrap{text-align:center;max-width:480px;}
